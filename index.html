mples taken from the concrete pavement section pour on a single day were tested for compressive strength as shown below. Core Strength (psi) 1 3200 2 3150 3 2650 If the required strength is 3,500 psi, which of the following will you recommend?", "options": ["a. Accept the material as it falls within the allowable tolerance.", "b. Accept the material at adjusted price", "c. Remove and replace the pavement", "d. None of the above"], "answer": "a. Accept the material as it falls within the allowable tolerance."}, {"q": "3038.Atterberg\u2019s limit tests are conducted to determine whether the material passing No. 200 sieve has the characteristics of a clay or a silt. It is also used to determine the plasticity index. Considering these, which of the following statement is TRUE?", "options": ["a. Higher plasticity index indicates higher degree of compressibility and higher permeability", "b. Higher plasticity index indicates lower degree of compressibility and lower permeability", "c. Higher plasticity index indicates higher degree of compressibility and lower permeability", "d. Higher plasticity index indicates lower degree of compressibility and higher permeability"], "answer": "c. Higher plasticity index indicates higher degree of compressibility and lower permeability"}, {"q": "3039.This is characterized by the ejection of water and subgrade material through the joints or cracks in a pavement.", "options": ["a. Bleeding", "b. Upheaval", "c. Pumping", "d. Blow-ups"], "answer": "c. Pumping"}, {"q": "3040.Three (3) concrete cylinder samples were tested were tested for compressive strength as shown below. Strength (psi) 1 3870 2 3680 3 2960 If the required strength is 3,500 psi, which of the following will you recommend?", "options": ["a. Accept the material as it falls within the allowable tolerance.", "b. Accept the material at adjusted price", "c. Reject the material", "d. None of the above"], "answer": "c. Reject the material"}, {"q": "3041. All shotcrete shall be cur nti-setting agent"}, {"q": "3067.For timber forms, it is important that the moisture content of the timber that will be used to make the formwork is in between:", "options": ["a. 5 to 10%", "b. 10 to 15%", "c. 15 to 20%", "d. 20 to 25%"], "answer": "c. 15 to 20%"}, {"q": "3068.Index of Refraction of the beads used for pavement marking shall be within the range of ____ when tested by the liquid immersion method at 29\u00b0C.", "options": ["a. 1.20 to 1.30", "b. 1.30 to 1.40", "c. 1.40 to 1.50", "d. 1.50 to 1.60"], "answer": "d. 1.50 to 1.60"}, {"q": "3069.Which of the following will be the result of proper compaction of an embankment material?", "options": ["a. Increase compressibility", "b. Increase soil permeability", "c. Increase shear strength and soil stability", "d. All of the above"], "answer": "c. Increase shear strength and soil stability"}, {"q": "3070.Asphalt Emulsion Mixes are also known as", "options": ["a. Hot Mix Asphalt", "b. Warm Mix Asphalt", "c. Cold Mix Asphalt", "d. None of the above"], "answer": "c. Cold Mix Asphalt"}, {"q": "3071. Which of the following practices is acceptable to use to bring down the temperature of the concrete mix?", "options": ["a. Add crushed ice to the mix", "b. Sprinkler water to the aggregates", "c. Use chilled water for the mix", "d. All of the above"], "answer": "d. All of the above"}, {"q": "3072. For asphalt stabilized road mix base course, the amount of asphaltic materials to be added to the soil-aggregate shall be:", "options": ["a. From 3 to 12 mass percent of the dry soil", "b. From 6 to 10 mass percent of the dry soil", "c. From 4 to 7 mass percent of the dry soil", "d. None of the above"], "answer": "c. From 4 to 7 mass percent of the dry soil"}, {"q": "3073. Unconfined compressive strength is usually performed in:", "options": ["a. Sandy Soils", "b. Silty Soils", "c. Organic Soils", "d. Clayey Soils"], "answer": "d. Clayey Soils"}, {"q": "3074.What class of concrete shall be used for Item 507 \u2013 Rubble Con surface"], "answer": "c. By spraying plasticizer compound on top of the pavement after the concrete has been broom in finish"}, {"q": "3115.Which of the following is the frequency of sampling of concrete beams as required by DPWH Specification?", "options": ["a. At least one (1) of three (3) concrete beams every 50 cu.m. or fraction thereof", "b. At least one (1) of three (3) concrete beams every 500 cu.m. or fraction thereof", "c. At least one (1) of three (3) concrete beams every 750 cu.m. or fraction thereof", "d. At least one (1) of three (3) concrete beams every 75 cu.m. or fraction thereof"], "answer": "d. At least one (1) of three (3) concrete beams every 75 cu.m. or fraction thereof"}, {"q": "3116.As per Item 311, the road shall not be opened to traffic until test specimens molded and cured in accordance with AASHTO T23 have attained the minimum strength requirements. What will be your option as a Materials Engineers if such tests are not conducted prior to the specified age of the pavement?", "options": ["a. Require the contractor to prepare test specimens", "b. Open the road to traffic 14 days after the concrete was placed", "c. Open the road to traffic 28 days after the concrete was placed", "d. None of the above"], "answer": "a. Require the contractor to prepare test specimens"}, {"q": "3117.Most road signs are hard to read at night. What is the specification requirement in the reduction of brightness of the reflective sheeting during night time and when totally wet by rain?", "options": ["a. Shall be less than 75% of the minimum specified reflective brightness value", "b. Shall be less than 85% of the minimum specified reflective brightness value", "c. Shall be less than 90% of the minimum specified reflective brightness value", "d. Shall be less than 50% of the minimum specified reflective brightness value"], "answer": "c. Shall be less than 90% of the minimum specified reflective brightness value"}, {"q": "3118.A sample of fine aggregate was subjected to colorimetric test for inorganic impurities. Results revealed that the color produced by the sample was darker than the standard color guide. As a Materials Engineer, how will you evaluate the material?", "options": ["a. Accept the material", "b. Reject the material", "c. Subject the material to further testing", "d. None of the above"], "answer": "c. Subject the material to further testing"}, {"q": "3119.During asphalt paving, the rolling shall be continued until ______ of the density of the laboratory specimens has been obtained.", "options": ["a. 95 mass percent", "b. 97 mass percent", "c. 99 mass percent", "d. 100 mass percent"], "answer": "b. 97 mass percent"}, {"q": "3120.Which of the following practices is acceptable to use to bring down the temperature of the concrete mix?", "options": ["a. Add crushed ice to the mix", "b. Sprinkler water to the aggregates", "c. Use chilled water for the mix", "d. All of the above"], "answer": "d. All of the above"}, {"q": "3121.To determine the abrasion loss of the tested aggregates, the sample is screened on ____.", "options": ["a. Sieve #10", "b. Sieve #12", "c. Sieve #40", "d. Sieve #4"], "answer": "b. Sieve #12"}, {"q": "3122.All Shotcrete shall be cured uninterrupted for at least how long?", "options": ["a. 3 days", "b. 7 days", "c. 14 days", "d. 28 days"], "answer": "b. 7 days"}, {"q": "3123.Insufficient compaction or vibration during placing of concrete may cause what type of defect?", "options": ["a. Spalling", "b. Segregation", "c. Bleeding", "d. Honeycomb"], "answer": "d. Honeycomb"}, {"q": "3124.Blended Hydraulic Cement shall conform to the requirements specified under", "options": ["a. ASTM C150", "b. ASTM C595", "c. ASTM C91", "d. ASTM C207"], "answer": "b. ASTM C595"}, {"q": "3125.Thickness of reflectorized thermoplastic rumble strips as prescribed under the specification:", "options": ["a. 3 mm to 12 mm", "b. 4 mm to 13 mm", "c. 5 mm to 14 mm", "d. Depending on the location of the road"], "answer": "b. 4 mm to 13 mm"}, {"q": "3126.As prescribe under DPWH Standard Specification for Item 522, the number of installed anchor bolts/soil nails which shall be subjected to mandatory proof pull test shall be __________.", "options": ["a. 2% of the total number or minimum of two (2) installed anchor bolts/soil nail.", "b. 3% of the total number or minimum of two (3) installed anchor bolts/soil nail.", "c. 4% of the total number or minimum of two (4) installed anchor bolts/soil nail.", "d. 5% of the total number or minimum of two (5) installed anchor bolts/soil nail."], "answer": "b. 3% of the total number or minimum of two (3) installed anchor bolts/soil nail."}, {"q": "3127.Laboratory Compaction Test in determining the relation between the moisture content and density of soils, using mold of given size with 2.5kg (5.5lbs.) and rammer dropped from a height of 305mm (12in.). Where no method to be used is stipulated in the specification, which of the following method shall govern?.", "options": ["a. Method A - a 101.6mm (4in.) mold; soil materials passing a 4.75mm (no. 4) sieve.", "b. Method B - a 152.4mm (6in.) mold; soil materials passing a 4.75mm (no. 4) sieve.", "c. Method C - a 101.6mm (4in.) mold; soil materials passing a 19mm (no. 3/4\u201d) sieve.", "d. Method D - a 152.4mm (6in.) mold; soil materials passing a 19mm (no. 3/4\u201d) sieve."], "answer": "a. Method A - a 101.6mm (4in.) mold; soil materials passing a 4.75mm (no. 4) sieve."}, {"q": "3128.As prescribe under DPWH Standard Specification for Item 522, mesh system (active) shall be installed as per construction drawings using anchor bolts/soil nails with minimum grid spacing of _____.", "options": ["a. 1.0m x 1.0m", "b. 1.5m x 1.5m", "c. 2.0m x 2.0m", "d. 2.5m x 2.5m"], "answer": "c. 2.0m x 2.0m"}, {"q": "3129.Which component of the soil aggregates that acts as soil binder which is significant in the information of embankment, laying of subbase and base course that form a firm and stable base when compacted?.", "options": ["a. Portion of soil passing sieve no. 200", "b. Portion of soil passing sieve no. 100", "c. Portion of soil passing sieve no. 40", "d. Portion of soil passing sieve no. 4"], "answer": "d. Portion of soil passing sieve no. 4"}, {"q": "3130.A sample weighing 5000g was subjected to abrasion test, wherein 2000g of samples was retained on No. 12 sieve after washing. What is abrasion loss?.", "options": ["a. 50", "b. 40", "c. 60", "d. 30"], "answer": "c. 60"}, {"q": "3131.How many cores shall be taken for thickness determination of 1 km of PCCP pavement consisting of single traffic lane?", "options": ["a. 5 cores", "b. 10 cores", "c. 2 cores", "d. 6 cores"], "answer": "a. 5 cores"}, {"q": "3132.For Item 307 Bituminous Plant-Mix Surface Course - General, all of the bituminous materials required for one batch shall be discharged in not more than ______ after the flow has started.", "options": ["a. 10 secods.", "b. 15 secods.", "c. 20 secods.", "d. 30 secods."], "answer": "b. 15 secods."}, {"q": "3133.Thickness of reflectorized thermoplastic rumble strips as prescribed under the specification:", "options": ["a. 3 mm to 12 mm", "b. 4 mm to 13 mm", "c. 5 mm to 14 mm", "d. Depending on the location of the road"], "answer": "b. 4 mm to 13 mm"}, {"q": "3134.Samples of Aggregate Base Course materials when tested for quality passed the requirements except for grading. What will you recommend as a Materials Engineer?", "options": ["a. Accept the material as grading is not required as per specification", "b. Accept the material at adjusted price", "c. Reject the material", "d. Reprocess the material by blending"], "answer": "d. Reprocess the material by blending"}, {"q": "3135.Plastic Limit corresponds to the moisture content of the soil", "options": ["a. at 15 shocks", "b. at 25 shocks", "c. at 30 shocks", "d.when it start to crumble when rolled into a 3.174-mmdiameter thread."], "answer": "d.when it start to crumble when rolled into a 3.174-mmdiameter thread."}, {"q": "3136.What shall be done in order to determine the effective capacity of a particular compacting equipment(rollers) to attain the required density of embankment?", "options": ["a. Conduct in-situ sampling to determine the Maximum Dry Density (MDD)", "b. Conduct a minimum 500 square meters trial section.", "c. Use Nuclear Gauge equipment to determine the density.", "d. Any of the Above."], "answer": "b. Conduct a minimum 500 square meters trial section."}, {"q": "3137. Why it is important to identify the phospuros content of the reinforcing steel bars?", "options": ["a. High amount reduces the streght of steel bars.", "b. High amount reduces the corrosion resistance of the steel bars.", "c. High amount reduces the ductility of the steel bar.", "d. All of the above."], "answer": "c. High amount reduces the ductility of the steel bar."}, {"q": "3138.What class of concrete is generally used for thin reinforced section and railings?", "options": ["a. Class A", "b. Class B", "c. Class C", "d. Class P"], "answer": "c. Class C"}, {"q": "3139.In concrete pouring for columns, what should be the maximum drop height to prevent segregation?", "options": ["a. 1 meter", "b. 1.5 meters", "c. 2 meters", "d. 2.5 meters"], "answer": "b. 1.5 meters"}, {"q": "3140.The temperature at which bituminous material will evolve vapors that will temporarily ignite when a small flame is brought in contact with it.", "options": ["a. Ignition temperature", "b. Flash Point", "c. Threshold point", "d. Burning temperature"], "answer": "b. Flash Point"}, {"q": "3141.Which of the following prescribe the specification for zinc coated (galvanized) corrugated iron or steel culvert and underdrains?", "options": ["a. ASSHTO M36", "b. ASSHTO M65", "c. ASSHTO M175", "d. ASSHTO M176"], "answer": "a. ASSHTO M36"}, {"q": "3142.When compacting concrete, the vibrator shall not be operated longer than ____ in any one location", "options": ["a. 10 seconds", "b. 15 seconds", "c. 20 seconds", "d. 30 seconds"], "answer": "b. 15 seconds"}, {"q": "3143. The phenomenon wherein the soil subgrade losses strength due to ground shaking and the presence of fine grained cohesionless soil:", "options": ["a. Settlement", "b. Liquefaction", "c. Subsidence", "d. Hydraulic Compaction"], "answer": "b. Liquefaction"}, {"q": "3144.Theoretically, which of the following water-cement ratios will produce the highest compressive strength?", "options": ["a. 0.42", "b. 0.47", "c. 0.50", "d. 0.55"], "answer": "a. 0.42"}, {"q": "3145.As prescribed under Item 606 \u2013 Pavement Markings, traffic paint shall be applied to the pavement at the rate of 0.33 L/m2 and shall dry sufficiently to be free from cracking in from _____.", "options": ["a. 5 to 15 minutes", "b. 15 to 30 minutes", "c. 30 to 45 minutes", "d. 45 to 60 minutes"], "answer": "b. 15 to 30 minutes"}, {"q": "3146.Which of the following will be the result of proper compaction of an embankment material?", "options": ["a. Increase compressibility", "b. Increase soil permeability", "c. Increase shear strength and soil stability", "d. All of the above"], "answer": "c. Increase shear strength and soil stability"}, {"q": "3147.During hot waether, necessary steps shall be undertaken to prevent the temperature of the mix concrete from exceeding a maximum of what temperature?", "options": ["a. 28 Degree Celsius", "b. 30 Degree Celsius", "c. 32 Degree Celsius", "d. 35 Degree Celsius"], "answer": "c. 32 Degree Celsius"}, {"q": "3148.When curing waterproof membrane, the joint seams of the material shall have a minimum lap of ______.", "options": ["a. 50 mm", "b. 100 mm", "c. 200mm", "d. 300 mm"], "answer": "b. 100 mm"}, {"q": "3149.The minimum cement content per cubic meter of Class P Structural Concrete is:", "options": ["a. 320 kg. (8.0 Bags)", "b. 360 kg. (9.0 Bags)", "c. 380 kg. (9.5 Bags)", "d. 440 kg. (11 Bags)"], "answer": "d. 440 kg. (11 Bags)"}, {"q": "3150.The test which combines a load-formation test performed in the laboratory with an empirical design chart to determine the thickness of pavement base and other layers is known as:", "options": ["a. California Bearing Ratio", "b. Plate Bearing Test", "c. Moisture-Density Determination", "d. Standard Penetration Test"], "answer": "a. California Bearing Ratio"}, {"q": "3151.Payment for Item 311 - Portland Cement Concrete Pavement shall be base on ____ of concrete placed and accepted in the completed pavement.", "options": ["a. square meter", "b. cubic meter", "c. thickness", "d. None of the above"], "answer": "a. square meter"}, {"q": "3152.Why are undisturbed samples used primarily for determining the properties of foundation materials?", "options": ["a. To retain the structure of material.", "b. Because it is easier to obtain undisturbed sample than disturbed sample.", "c. Because it is easier to test undisturbed sample than disturbed samples.", "d. Because it represents the relative strength of the soil strata when subjected to compression test."], "answer": "d. Because it represents the relative strength of the soil strata when subjected to compression test."}, {"q": "3153.Bed course materials for Item 601 - Sidewalk consists of granularmaterial passing ____ sieve.", "options": ["a. 19 mm", "b. 25 mm", "c. 9.5 mm", "d. 12.5 mm"], "answer": "d. 12.5 mm"}, {"q": "3154.Asphalt Emulsion Mixes are also known as", "options": ["a. Hot Mix Asphalt", "b. Warm Mix Asphalt", "c. Cold Mix Asphalt", "d. None of the above"], "answer": "c. Cold Mix Asphalt"}, {"q": "3155.The optimum moisture content of soil is determined during:", "options": ["a. Laboratory Compaction", "b. Compaction Trial Section", "c. Field Compaction Test", "d. Any of the above"], "answer": "a. Laboratory Compaction"}, {"q": "3156.Which of the following is the proper way of rolling in asphalt pavement?", "options": ["a. Start at any point of the road provided each strip overlapping half of the roller.", "b. Start at the sides and proceeds towards the centerline or crown of the road, each strip overlapping half of the roller.", "c. Start at the centerline and proceeding longitudinally toward the side of the road, each strip overlapping half of the roller.", "d. All of the Above."], "answer": "b. Start at the sides and proceeds towards the centerline or crown of the road, each strip overlapping half of the roller."}, {"q": "3157.The type of joint in concrete pavement that is pre-formed to accommodate the thermal expansion and contraction of concrete.", "options": ["a. Sewed Joint", "b. Longitudinal Joint", "c. Expansion Joint", "d. Key Joint"], "answer": "c. Expansion Joint"}, {"q": "3158.Soil sample was subjected to the following procedures at the laboratory: a) compaction at its optimum moisture content: b) application of surcharge; c) soaking of the sample for four days; an then d) forcing a plunger into sample to a depth of 2.5mm. What test was conducted on the soil?", "options": ["a. Abration Test", "b. Triaxial Test", "c . Consolidation Test", "d. CBR Test"], "answer": "d. CBR Test"}, {"q": "3159. For Item 205 - Asphalt Stabilized Road Mix Base Course, the amount of asphaltic materials to be added to the soil-aggregate shall be:", "options": ["a. From 3 to 12 mass percent of the dry soil", "b. From 6 to 10 mass percent of the dry soil", "c. From 4 to 7 mass percent of the dry soil", "d. None of the above"], "answer": "c. From 4 to 7 mass percent of the dry soil"}, {"q": "3160.Which of the following is the acceptable rate of loading when testing the compressive strength of the cylinder?", "options": ["a. 0.14 to 0.34 Mpa/sec.", "b. 0.23 to 0.53 Mpa/sec.", "c . 0.34 to 0.64 Mpa/sec.", "d. 0.41 to 0.61 Mpa/sec."], "answer": "a. 0.14 to 0.34 Mpa/sec."}, {"q": "3161.After the placement of concrete, how long shall pre-cast concrete members be subjected to pre-steaming when it will be subjected to steam curing?", "options": ["a. Minimum of 1 hour", "b. Minimum of 2 hours", "c. Minimum of 3 hours", "d. Minimum of 4 hours"], "answer": "d. Minimum of 4 hours"}, {"q": "3162.In order to facilitate the acceptance of cement to be used in the implementation of various DPWH projects, the Compressive strength of mortar samples tested at 3 days and 7 days can be considered for acceptance provided that the strength of the samples at 7 days is not less than ___ of the Compressive strength requirement for 28 days.", "options": ["a. 75%", "b. 80%", "c. 85%", "d. 90%"], "answer": "c. 85%"}, {"q": "3163. For Item 204  - Portland cement stabilized road mix base course, the amount of cement to be added to the soil-aggregate shall be:", "options": ["a. From 3 to 12 mass percent of the dry soil", "b. From 6 to 10 mass percent of the dry soil", "c. From 4 to 7 mass percent of the dry soil", "d. None of the above"], "answer": "b. From 6 to 10 mass percent of the dry soil"}, {"q": "3164.Asphalt cement shall not be used while it is foaming nor shall be heated above _____ at any time after delivery in the project.", "options": ["a. 107 degree Celsius", "b. 162 degree celcius", "c. 159 degree celsius", "d. 170 degree celsius"], "answer": "c. 159 degree celsius"}, {"q": "3165.Suppose you have a sack of aggregate sample weighing 20kg. But you only need 5kg for a certain test. In the absence of sample splitter, what will be the best way to get a 5 kilograms sample?", "options": ["a. Remove the aggregates  from the sack and lay it a pile on a clean floor then get the 5kg sample from the middle of the pile.", "b. Scoop and take 5kgs the sample inside the jute sack.", "c. Perform the quartering procedure and take the sample on the two adjacent quadrants.", "d. Perform the quartering procedure and take the sample on the two opposite quadrants."], "answer": "d. Perform the quartering procedure and take the sample on the two opposite quadrants."}, {"q": "3166.In the latest approved DPWH Standard Specification, the maximum compacted thickness per layer for item 200 & 201 shall be?", "options": ["a. 150 mm", "b. 180 mm", "c. 200 mm", "d. 250 mm"], "answer": "c. 200 mm"}, {"q": "3167.For Item 311,the depth of the weakened plane joint should at all times be:", "options": ["a. not more than 50 mm", "b. not less than 50 mm", "c. not more than 25 mm", "d. not less than 25 mm"], "answer": "b. not less than 50 mm"}, {"q": "3168.Plaster not usedwithin _____ from the start of initial mixing shall be discarded.", "options": ["a. 90 minutes.", "b. 30 minutes.", "c. 120 minutes.", "d. 60 minutes."], "answer": "a. 90 minutes."}, {"q": "3169.Flexural strength of concrete beams shall not be less than ____ when tested by third-point method in accordance with ASSHTO T97.", "options": ["a. 2.5 MPa", "b. 3.8 MPa", "c. 4.5 MPa", "d. 5.2 MPa"], "answer": "b. 3.8 MPa"}, {"q": "3170.What is the boundary between Coarse and Fine Aggregates for Item 405?", "options": ["a. Passing Sieve #3/8\u201d", "b. Passing Sieve #4", "c. Passing Sieve #40", "d. Passing Sieve #100"], "answer": "b. Passing Sieve #4"}, {"q": "3171.As specified in Item 500, joint mortar for pipe culverts shall be used within _____ after it\u2019s preparation.", "options": ["a. 90 minutes.", "b. 30 minutes.", "c. 120 minutes.", "d. 60 minutes."], "answer": "b. 30 minutes."}, {"q": "3172.For Item 308, asphalt surface mixture shall not be placed when the surface temperature of the base course is;", "options": ["a. Below 10\u2103", "b. Below 25\u2103", "c. Above 35\u2103", "d. Above 40\u2103"], "answer": "a. Below 10\u2103"}, {"q": "3173.The property or ability of asphalt concrete to withstand traffic loads without distortion or defection especially at higher temperatures.", "options": ["a. Stability", "b. Soundness", "c. Durability", "d. Toughness"], "answer": "a. Stability"}, {"q": "3174.Laboratory apparatus used to determine the specific gravity of cement.", "options": ["a. Pycnometer", "b. Hydrometer", "c. Le Chatelier flask", "d. Vicat Apparatus"], "answer": "c. Le Chatelier flask"}, {"q": "3175What is the minimum compaction requirement for embankment?", "options": ["a. 80%", "b. 90%", "c. 95%", "d. 100%"], "answer": "c. 95%"}, {"q": "3176.What is the minimum test requirements for non-reinforced pipe?", "options": ["a. 1 sample for every 50 pipes.", "b.  0.5% of no. of pipes, 2 pipes minimum.", "c. 1 sample for every 25 pipes.", "d. 1% of no. Of pipes, 1 pipes minimum."], "answer": "b.  0.5% of no. of pipes, 2 pipes minimum."}, {"q": "3177.________ is the limit were further loss of water due to evaporation which will not result in reduction of volume.", "options": ["a.  Plastic Limit", "b.  Liquid Limit", "c. Shrinkage Limit", "d. Plasticity Index"], "answer": "c. Shrinkage Limit"}, {"q": "3178.The Contractor shall submit at least ______ in writing a Job-Mix Formula for each mixture supported by laboratory test data along with samples and sources of the components and viscosity temperature relationships information to the Engineer for testing and approval.", "options": ["a. At least 1 week", "b. At least 2 weeks", "c. At least 3 weeks", "d. At least 4 weeks"], "answer": "c. At least 3 weeks"}, {"q": "3179.What is the significance of the loss on ignition of cement?", "options": ["a. It is a measure of the neat generated when cement is mixed with water.", "b. It signifies pre-hydration of moisture uptake of cement while it is shelved.", "c. It is a measure of the resistance of cement when exposed to fire.", "d. None of the above."], "answer": "b. It signifies pre-hydration of moisture uptake of cement while it is shelved."}, {"q": "3180.Samples of Type I Cement when tested for quality passed the requirements except for Loss of Ignition. What will you recommend as a Materials Engineer?", "options": ["a. Accept the material as loss on ignition is not a requirement for Type I cement", "b. Accept the material at adjusted price", "c. Reject the material", "d. Reprocess the material by blending"], "answer": "c. Reject the material"}, {"q": "3181.As per DPWH Specification, all walls of the abutments shall be provide with wee holes , unless otherwise shown on the plans, the weep holes shall be spaced at not more than _______ center to center in a staggered manner.", "options": ["a. 1 m", "b. 1.5 m", "c. 2 m", "d. 3 m"], "answer": "c. 2 m"}, {"q": "3182.When testing cement, the temperature of the mixing water, moist closet or moist room and water in the storage tank shall be at:", "options": ["a. 23.0 \u00b1 3.0\u2103", "b. 23.0 \u00b1 2.0\u2103", "c. 23.0 \u00b1 4.0\u2103", "d. 23.0 \u00b1 1.0\u2103"], "answer": "b. 23.0 \u00b1 2.0\u2103"}, {"q": "3183.When supervising a project, you noticed that the Contractor was applying more tack coat than the required. Which of the following will most likely occur?", "options": ["a. Bleeding", "b. Raveling", "c. Swelling", "d. Pumping"], "answer": "a. Bleeding"}, {"q": "3184.It is load-related deterioration of asphalt pavement resulting from a weak base course, under thickness of pavement layer, overloading, or a combination of these factors.", "options": ["a. Shoving", "b. Fatigue Cracking", "c. Raveling", "d. Upheaval"], "answer": "b. Fatigue Cracking"}, {"q": "3185.Undersized Reinforcing Steel Bars (RSB\u2019s) that satisfy the tensile and elongation requirements may be accepted provide that the underweight does not exceed;", "options": ["a.  \u00b14%", "b. \u00b15%", "c. \u00b16%", "d. \u00b17%"], "answer": "c. \u00b16%"}, {"q": "3186.A concrete pavement for a National Primary Road registered an International Rough Index (IRI) value of 3.9 m/km. As a Materials Engineer, which of the following will you recommend?", "options": ["a. Accept the material as it falls within the allowable tolerance", "b. Accept the material at adjusted price", "c. Undertake grinding of concrete pavement", "d. Remove and replace the pavement"], "answer": "b. Accept the material at adjusted price"}, {"q": "3187.For G.I. Sheets, which of the following provides the highest thickness?", "options": ["a. Gauge 24", "b. Gauge 26", "c. Gauge 28", "d. Gauge 33"], "answer": "a. Gauge 24"}, {"q": "3188.The minimum length of test specimen required for the conduct of Tension Test on Steel Bars;", "options": ["a. 0.50 m", "b. 0.70 m", "c. 1.0 m", "d. 0.60 m"], "answer": "b. 0.70 m"}, {"q": "3189.What type of admixture use to reduce incidence of thermal cracking and to maintain concrete workability during large pours or long ready-mix hauls?", "options": ["a. Water-reducing admixture", "b. Retarding water-reducing admixture", "c. Air-entraining admixture", "d. Accelerating admixture"], "answer": "b. Retarding water-reducing admixture"}, {"q": "3190.When hauled using non-agitating trucks, the time elapsed from the time water is added to the mix per batch until the concrete mix is deposited in place at the site shall not exceed;", "options": ["a. 30 minutes", "b. 45 minutes", "c. 60 minutes", "d. 90 minutes"], "answer": "b. 45 minutes"}, {"q": "3191.These are permeable fabrics which, when used in association with soil, have the ability to separate, filter, reinforce, protect, or drain.", "options": ["a. Welded Wire Fabric", "b. Rip Rap", "c. Geotextiles", "d. Slope Protection"], "answer": "c. Geotextiles"}, {"q": "3192.In specifying an asphalt material, what does the term 85/100 refer to?", "options": ["a. Viscosity", "b. Ductility", "c. Solubility", "d. Penetration"], "answer": "d. Penetration"}, {"q": "3193.A painting project will require 4,640 L of white paint to complete. To accommodate this, the Contractor delivered 205 cans of 20-Lpaint and 135 cans of 4-L paint, respectively. How many quality test shall be conducted?", "options": ["a. 2", "b. 3", "c. 4", "d. 5"], "answer": "d. 5"}, {"q": "3194.How many CBR Testis required if the estimated volume of Item 201 materials as per Program of Works is 18,700 cu.m?", "options": ["a. 5", "b. 7", "c. 8", "d. 10"], "answer": "c. 8"}, {"q": "3195.Atterberg\u2019s limit tests are conducted to determine whether the material passing No. 200 sieve has the characteristics of a clay or a silt. It is also used to determine the plasticity index. Considering these, which of the following statement is TRUE?", "options": ["a. Higher plasticity index indicates higher degree of compressibility and higher permeability", "b. Higher plasticity index indicates lower degree of compressibility and lower permeability", "c. Higher plasticity index indicates higher degree of compressibility and lower permeability", "d. Higher plasticity index indicates lower degree of compressibility and higher permeability"], "answer": "c. Higher plasticity index indicates higher degree of compressibility and lower permeability"}, {"q": "3196.In concrete acceptance, core will be considered adequate if the average  strength of the cores is equal to?", "options": ["a. 80%of specified strength &if no single core is less than 75% of specified  Strength.", "b. 90%of specified strength & if no single core is less than 80%of specified  Strength.", "c. 85% of the specified strength & if no single core is less than 75% of  specified strength.", "d. 85%of specified strength & if no single core is less than 85%of specified Strength."], "answer": "c. 85% of the specified strength & if no single core is less than 75% of  specified strength."}, {"q": "3197.Which of the following is the proper way of transporting and handling beams and core samples taken from the site to the laboratory for testing?", "options": ["a. Placing the specimens in wooden boxes.", "b. PLacing the specimens on top of sandy materials.", "c. Packing them in wooden crates surrounded with damp sawdust od palay straw.", "d. All of the above."], "answer": "c. Packing them in wooden crates surrounded with damp sawdust od palay straw."}, {"q": "3198.Considering only the group index (GI) and other factors as equal, which of the following soil samples will you recommend for use as a subgrade material?", "options": ["a. Soil with computed GI = 0", "b. Soil with computed GI = 3", "c. Soil with computed GI = 10", "d. Soil with computed GI = 12"], "answer": "a. Soil with computed GI =  ["a.Lubrication", "b.Swelling", "c.Welting", "d.Saturation"], "answer": "b.Swelling"}, {"q": "3297.The most common method of assessing strength and stiffness of both  subgrade and pavement is _______.", "options": ["a.FDT", "b.SPT", "c.CBR", "d.Non of the above"], "answer": "c.CBR"}, {"q": "3298.How many days shall the Engineer be notified in advance of the date  that the treating process will be performed in order that the untreated  lumber, the treatment process and the finished treatment timber may all be  inspected?", "options": ["a.15 days", "b.10 days", "c.21 days", "d. 7 day"], "answer": "b.10 days"}, {"q": "3299.This is a new method of soil stabilization being introduced to improved  the properties of soil which is effective and at the same time cheaper.", "options": ["a.Stabilization by the use of Geotextiles", "b.Cement stabilization", "c.Bituminous stabilization", "d.Lime stabilization"], "answer": "d.Lime stabilization"}, {"q": "3300.What ACI means?", "options": ["a.American Concrete Industry", "b.American Concrete Inc.", "c. American Concrete Institute", "d. American Concrete International"], "answer": "c. American Concrete Institute"}, {"q": "3301. The minimum testing requirement for one quality test of concrete hollow block is _____ units for every 10,000 units.", "options": ["a. 3", "b. 6", "c. 10", "d. 12"], "answer": "b. 6"}, {"q": "3302. What is the allowable mass percent of air voids of bituminous mixture for item 310?", "options": ["a. 6 to 10 percent", "b. 3 to 5 percent", "c. 2 to 6 percent", "d. 5 to 8 percent"], "answer": "b. 3 to 5 percent"}, {"q": "3303. Embankment materials are classified as unsuitable materials if:", "options": ["a. The natural moisture content is 50%.", "b. The liquid limit is 40%", "c. The plasticity index is 60%", "d. The natural density is 1200 kilogram per cubic meter"], "answer": "c. The plasticity index is 60%"}, {"q": "3304. During testing of concrete cylinders in uniaxial compression, what will happen to the re crete mix.", "options": ["a. Air meter", "b. Slump test", "c. Compressive strength test", "d. Flexural molds"], "answer": "b. Slump test"}, {"q": "3311.Which of the following tests is NOT conducted on cut-back asphalt?", "options": ["a. Distillation", "b. Flash point", "c. Storage Stability", "d. Ductility"], "answer": "c. Storage Stability"}, {"q": "3312.When the slump of the concrete is zero, known as?", "options": ["a.High Slump", "b.Low Slump", "c.True Slump", "d.Zero Slump"], "answer": "d.Zero Slump"}, {"q": "3313.Required cement factor for 3000 psi Class A concrete at 28 days:", "options": ["a. 9.1 bags", "b. 10 bags", "c. 9 bags", "d. 11 bags"], "answer": "a. 9.1 bags"}, {"q": "3314.Frequency sampling of Expansion Joint, every?", "options": ["a. 50 sq.m per shipment", "b. 100 sq.m per shipment", "c. 150 sq.m per shipment", "d. 200 sq.m per sipment"], "answer": "b. 100 sq.m per shipment"}, {"q": "3315.Glass Beads shall be uncoated and shall have minimum of %  are spheres.", "options": ["a.70%", "b.50%", "c.80%", "d.90%"], "answer": "d.90%"}, {"q": "3316.The apparatus used to determine the initial and final setting of cement in the laboratory", "options": ["a.Gillmore needles", "b.Bailey Needle", "c.Vicat Needle", "d. Either A or C"], "answer": "d. Either A or C"}, {"q": "3317.________ is the limit were further loss of water due to evaporation which willnot result in reduction of volume.", "options": ["a.  Plastic Limit", "b.  Liquid Limit", "c. Shrinkage Limit", "d. Plasticity Index"], "answer": "c. Shrinkage Limit"}, {"q": "3318.Which of the following practices is acceptable to use to bring down the temperature of the concrete mix?", "options": ["a. Add crushed ice to the mix", "b. Sprinkler water to the aggregates", "c. Use chilled water for the mix", "d. All of the above"], "answer": "d. All of the above"}, {"q": "3319. Describe what happens to the asphalt core sample while immersed or soaked in water.", "options": ["a. The asphalt core sample absorbs water", "b. The asphalt core samples floats due to buoyancy", "c. Water penetrates the voids of the sample", "d. Bubbles are released from the sample"], "answer": "c. Water penetrates the voids of the sample"}, {"q": "3320. What is the color of asphalt mix when it is overheated?", "options": ["a.  yellowish brown", "b.  black", "c. grayish", "d. Red"], "answer": "c. grayish"}, {"q": "3321. The ratio of the weight of water in the soil to the weight of dry soil after oven drying to constant weight is:", "options": ["a. Liquid limit", "b. Plastic limit", "c. Moisture content", "d. Plasticity index"], "answer": "c. Moisture content"}, {"q": "3322. What appropriate test method is used in the quantitative determination of particles sizes in soils?", "options": ["a. Sieve analysis", "b. Hydrometer test", "c. Atterberg limit test", "d. Both a and b"], "answer": "d. Both a and b"}, {"q": "3323. Which is not a type of mineral admixtures for concrete?", "options": ["a. Alumina", "b. Volcanic ash", "c. Silica fume", "d. Fly ash"], "answer": "a. Alumina"}, {"q": "3324. The aggregate base course shall be laid to the designated level and transverse slope shown on the plans. The allowable tolerance permitted for surface irregularity as measures by 3-m straight edge shall be __", "options": ["a. +/- 10 mm", "b. 5 mm", "c. 10 mm", "d. +/-5 mm"], "answer": "b. 5 mm"}, {"q": "3325. When a bag of cement is placed in contact with moist aggregates, batches will be rejected unless mixed within _______ hours of such contact.", "options": ["a. 1/2", "b. 1", "c. 1 1/2", "d. 2"], "answer": "c. 1 1/2"}, {"q": "3326.The minimum length of test specimen required for the conduct of Tension Test on Steel Bars;", "options": ["a. 0.50 m", "b. 0.70 m", "c. 1.0 m", "d. 0.60 m"], "answer": "b. 0.70 m"}, {"q": "3327. This is the type of paint intended for concrete and other masonry surface.", "options": ["a. Latex paint", "b.Enamel paint", "c. Quick Dry Enamel Paint", "d. None of the above"], "answer": "a. Latex paint"}, {"q": "3328. What proportion of hydrated lime (Mass percent, dry aggregates basis) is required  to be added to the bituminous mixture during the mixing operations as per DPWH Blue Book?", "options": ["a. 0-2.0", "b. 1.0 \u2013 2.0", "c. 0.5 -1.5", "d. 0.5 \u2013 1.0"], "answer": "d. 0.5 \u2013 1.0"}, {"q": "3329. Quality test for Portland cement should be carried out for every", "options": ["a. 1,500 bags or fraction thereof", "b. 2,000 bags or fraction thereof", "c. 2,500 bags or fraction thereof", "d. 3,000 bags or fraction thereof"], "answer": "b. 2,000 bags or fraction thereof"}, {"q": "3330. The sand used in the field density test in determining the volume of hole using sand cone method must be clean, dry and passing sieve number:", "options": ["a.10", "b. 40", "c. 200", "d. 30"], "answer": "a.10"}, {"q": "3331.Undersized Reinforcing Steel Bars (RSB\u2019s) that satisfy the tensile and elongation requirements may be accepted provide that the underweight does not exceed;", "options": ["a.  \u00b14%", "b. \u00b15%", "c. \u00b16%", "d. \u00b17%"], "answer": "c. \u00b16%"}, {"q": "3332.As specified in Item 500, joint mortar for pipe culverts shall be used within _____ after it\u2019s preparation.", "options": ["a. 90 minutes.", "b. 30 minutes.", "c. 120 minutes.", "d. 60 minutes."], "answer": "b. 30 minutes."}, {"q": "3333. For Item 204  - Portland cement stabilized road mix base course, the amount of cement to be added to the soil-aggregate shall be:", "options": ["a. From 3 to 12 mass percent of the dry soil", "b. From 6 to 10 mass percent of the dry soil", "c. From 4 to 7 mass percent of the dry soil", "d. None of the above"], "answer": "b. From 6 to 10 mass percent of the dry soil"}, {"q": "3334. For Item 205 - Asphalt Stabilized Road Mix Base Course, the amount of asphaltic materials to be added to the soil-aggregate shall be:", "options": ["a. From 3 to 12 mass percent of the dry soil", "b. From 6 to 10 mass percent of the dry soil", "c. From 4 to  least 50 percent of the stones weighing more than 150 kg shall fall under what class?", "options": ["a. Class A", "b. Class B", "c. Class C", "d. Class D"], "answer": "d. Class D"}, {"q": "3584 Standard specification that outlines the requirements for fine aggregate used in hydraulic cement concrete for various applications.", "options": ["a.  AASHTO T112", "b.  AASHTO T226", "c.  AASHTO M80", "d. AASHTO M6"], "answer": "d. AASHTO M6"}, {"q": "3585 The purpose of conducting laboratory CBR test on the fill materials for embankment is to check:", "options": ["a.Permeability of the compacted subgrade material", "b.Swelling characteristics of the subgrade material", "c.Bearing capacity of subgrade material", "d.All of the above"], "answer": "d.All of the above"}, {"q": "3586 In Moisture-Density Relation, how many blows needed per layer are generally required to mold a CBR Test to 100% of the MDD determined by AASHTO T99 (Method D).", "options": ["a. 10", "b.56", "c. 25", "d. 65"], "answer": "c. 25"}, {"q": "3587 Slurry System for road surface treatment of Item 304 A is a type of:", "options": ["a. Cold asphalt mixture", "b. Hot mix asphalt mixture", "c. Warm mix asphalt", "d. Porous asphalt"], "answer": "a. Cold asphalt mixture"}, {"q": "3588 Calibration of Universal Testing Machine, every?", "options": ["a.1 year", "b. 2 years", "c. 3 years", "d. No need"], "answer": "a.1 year"}, {"q": "3589 Maximum Temperature of Polymer Modefied Bitumen?", "options": ["a.135", "b. 150", "c. 200", "d.at flash point temperature"], "answer": "d.at flash point temperature"}, {"q": "3590 The test that determine the purity of asphalt cement is called:", "options": ["a. Ductility", "b. Specific gravity", "c. Viscosity", "d. Solubility"], "answer": "d. Solubility"}, {"q": "3591 In Abrasion, How many spheres in Class B?", "options": ["a.10", "b.12", "c.11", "d.8"], "answer": "c.11"}, {"q": "3592 Flexural strength of concrete beams shall not be less than ____ when tested by third-point method d. Which of the following will most likely occur?", "options": ["a. Bleeding", "b. Raveling", "c. Swelling", "c. Pumping"], "answer": "a. Bleeding"}, {"q": "3599 Test pitting conducted on a prepared base showed that the thickness of Item 201 (Aggregate Base Course) was deficient by 5 cm. As Materials Engineer, what will you recommend?", "options": ["a.Reject the prepared section", "b.Rework the section", "c.Accept the section at an adjusted price due to thickness deficiency", "d. Provide sand cushion to attain the thickness requirement"], "answer": "b.Rework the section"}, {"q": "3600 What class of concrete shall be used for Item 507 \u2013 Rubble Concrete?", "options": ["a. Class A", "b. Class B", "c. Class C", "d. Class P"], "answer": "b. Class B"}, {"q": "\ufeff3101.Laboratory report revealed that the asphalt cement used in the asphalt mix was more than what was required by the job mix. Which of the following will most likely occur?", "options": ["a. Slippage cracking", "b. Shoving", "c. Raveling", "d. Upheaval"], "answer": "b. Shoving"}, {"q": "\ufeff301. The main problem associated with wrong practice of conveying concrete is called:", "options": ["a. Honeycomb", "b. Laitance", "c. Segregation", "d. Cracking"], "answer": "c. Segregation"}, {"q": "\ufeff401. Asphalt cement dispersed in water with the aid of an emulsifying agent.", "options": ["a. Rapid curing cutback", "b. Medium curing cutback", "c. Asphalt emulsion", "d. All of the above"], "answer": "c. Asphalt emulsion"}, {"q": "\ufeff 501. In order to comply the requirements of asphalt mixture, the Index of Retained Strength shall not be less than _______ when tested by AASHTO T165.", "options": ["a. 85", "b. 60", "c. 90", "d. None of the above"], "answer": "d. None of the above"}];
let quizQuestions=[];
let index=0;
let correct=0;
let wrong=0;
let answered=false;
let userAnswers=[];
let setStart=0;
let setEnd=0;
let batchSize=0;
let currentOffset=0;

function normalize(t){return t.replace(/\s+/g," ").trim();}

function setRanges(){
 let r=[];
 for(let i=0;i<questions.length;i+=100) r.push([i,Math.min(i+100,questions.length)]);
 return r;
}

function showQuizSetup(){
 let html="<div class='card'><h3>Select number of questions</h3>";
 [10,25,50,100].forEach(n=>html+="<button onclick='chooseSet("+n+")'>"+n+"</button>");
 html+="</div>";
 main.innerHTML=html;
}

function chooseSet(count){
 let ranges=setRanges();
 let html="<div class='card'><h3>Select Set</h3>";
 ranges.forEach(r=>{
  html+="<button class='setbtn' onclick='startQuiz("+count+","+r[0]+","+r[1]+")'>"+(r[0]+1)+"-"+r[1]+"</button>";
 });
 html+="</div>";
 main.innerHTML=html;
}

function startQuiz(count,start,end){
 batchSize=count;
 setStart=start;
 setEnd=end;
 currentOffset=start;
 loadBatch();
}

function loadBatch(){
 let pool=questions.slice(currentOffset,setEnd);
 if(confirm("Randomize questions?")) pool.sort(()=>Math.random()-0.5);
 quizQuestions=pool.slice(0,batchSize);
 index=0;
 correct=0;
 wrong=0;
 userAnswers=[];
 renderQuiz();
}

function renderQuiz(){
 let q=quizQuestions[index];
 answered=false;

 let html="<div class='card'>";
 html+="<div id='progressBarContainer'><div id='progressBar'></div></div>";
 html+="<div>Question "+(index+1)+" / "+quizQuestions.length+"</div>";
 html+="<div>Correct: "+correct+" Wrong: "+wrong+"</div>";
 html+="<h3>"+q.q+"</h3>";
 html+="<div id='options'></div>";
 html+="<button onclick='prev()'>Previous</button>";
 html+="<button onclick='next()'>Next</button>";
 html+="</div>";
 main.innerHTML=html;

 let optHTML="";
 q.options.forEach(o=>optHTML+="<div class='option'>"+o+"</div>");
 options.innerHTML=optHTML;

 document.querySelectorAll(".option").forEach(el=>{
  el.addEventListener("click",()=>answer(el));
 });

 updateProgress();
}

function answer(el){
 if(answered) return;
 answered=true;

 let val=normalize(el.textContent);
 let correctAns=normalize(quizQuestions[index].answer);
 userAnswers[index]=val;

 document.querySelectorAll(".option").forEach(o=>{
  let t=normalize(o.textContent);
  if(t===correctAns) o.classList.add("correct");
  if(t===val && t!==correctAns) o.classList.add("wrong");
 });

 if(val===correctAns) correct++; else wrong++;
}

function next(){
 if(index<quizQuestions.length-1){index++;renderQuiz();}
 else finishQuiz();
}

function prev(){if(index>0){index--;renderQuiz();}}

function updateProgress(){
 let p=((index+1)/quizQuestions.length)*100;
 let bar=document.getElementById("progressBar");
 if(bar) bar.style.width=p+"%";
}

function finishQuiz(){
 let scoreMsg="Score: "+correct+" / "+quizQuestions.length;
 if(confirm(scoreMsg+"\nContinue next "+batchSize+" questions?")){
  currentOffset+=batchSize;
  if(currentOffset<setEnd){loadBatch();return;}
 }

 let html="<div class='card'><h2>"+scoreMsg+"</h2><h3>Review</h3>";

 quizQuestions.forEach((q,i)=>{
  html+="<div style='margin-bottom:12px'><b>"+q.q+"</b>";
  q.options.forEach(o=>{
   let n=normalize(o);
   let c=normalize(q.answer);
   let ua=normalize(userAnswers[i]||"");
   if(n===c) html+="<div class='green'>"+o+"</div>";
   else if(n===ua) html+="<div style='color:red'>"+o+"</div>";
   else html+="<div>"+o+"</div>";
  });
  html+="</div>";
 });

 html+="<button onclick='showQuizSetup()'>New Quiz</button></div>";
 main.innerHTML=html;
}

function showReviewer(){
 let ranges=setRanges();
 let html="<div class='card'><h3>Select Set</h3>";
 ranges.forEach(r=>html+="<button class='setbtn' onclick='reviewSet("+r[0]+","+r[1]+")'>"+(r[0]+1)+"-"+r[1]+"</button>");
 html+="</div>";
 main.innerHTML=html;
}

function reviewSet(start,end){
 let html="";
 for(let i=start;i<end;i++){
  let q=questions[i];
  html+="<div class='card'><b>"+q.q+"</b>";
  q.options.forEach(o=>{
   if(normalize(o)===normalize(q.answer)) html+="<div class='green'>"+o+"</div>";
   else html+="<div>"+o+"</div>";
  });
  html+="</div>";
 }
 main.innerHTML=html;
}

showQuizSetup();
</script>
