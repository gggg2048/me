let questions=[{"q": "1. What test determined the crushing of strength of aggregates to ensure that coarse aggregates will not degrade to smaller ones.", "options": ["a.  Abrasion", "b.  Grading", "c.  Density", "d.  Plasticity test"], "answer": "a.  Abrasion"}, {"q": "2. A one-lane road, with of 3.5 meters and shoulder width of 0.5 meter on each side of the pavement was designed to have sub-base and base coarse with a combined thickness of 300mm. If the thickness of the sub-base is 125mm, the spreading and compaction of the sub-base and base coarse shall be carried out in", "options": ["a.  3 layer over the full width of 4.5 m", "b.  2 layers over the full width of 4.5 m", "c.  3 layers over the full width of 3.5 m", "d.  2 layers over the full width of 3.5 m"], "answer": "b.  2 layers over the full width of 4.5 m"}, {"q": "3. Weakened joints on concrete pavement should be sawed", "options": ["a.  Immediately after the pavement surface has been brooms finished", "b.  Sawing of joints shall commerce as soon as the concrete has hardened sufficiently, usually within 24 hours", "c.  Before the pavements opened to traffic usually 14 days from the day  of pouring", "d. After 48 hrs."], "answer": "b.  Sawing of joints shall commerce as soon as the concrete has hardened sufficiently, usually within 24 hours"}, {"q": "4. What depth of weakened joint should at all times not be less than", "options": ["a.  50 mm", "b.  60 mm", "c.  70 mm", "d.  75 mm"], "answer": "a.  50 mm"}, {"q": "5. Cores are taken from a concrete pavement and tested for", "options": ["a. Strength verification of concrete in place that is considered adequate", "b. Flexural strength determination", "c. Cement content determination", "d. Thickness determination"], "answer": "d. Thickness determination"}, {"q": "6. In accepting completed concrete pavement poured by lane thickness determination shall come out by obtaining one core from every", "options": ["a. 100 meters", "b. 200 meters", "c. 500 meters", "d. 1000 meters"], "answer": "b. 200 meters"}, {"q": "7. If the strength of Item 311 control specimens does not meet the  requirements by not more than 25% and it is not feasible to obtain cores  from the structure due to structural consideration:", "options": ["a.  The strength of in-place concrete will be determined by rebound a  hammer", "b.  Pavement of the concrete will be made at an adjusted price", "c.  No pavement will be made on the concrete represented by the failed specimen", "d.  The contractor will be required to remove and replace the concrete  represented by the failed specimens at his own expense."], "answer": "b.  Pavement of the concrete will be made at an adjusted price"}, {"q": "8. The flexural strength requirements of item 311 is", "options": ["a. 500 psi", "b. 550 psi", "c. 3000 psi", "d. 3500 psi"], "answer": "b. 550 psi"}, {"q": "9. The number of sets of beam test specimens that should be taken from  700 sq.m. of concrete pavements, 0.23 cm thick poured on a single day  should be:", "options": ["a. 2", "b. 3", "c. 6", "d. 9"], "answer": "b. 3"}, {"q": "10.Three cores taken from  a pavement section poured on a single day were  tested to have strength as follows: Core              1                          3650 2                          3000 86% of 3500 psi 3                          2450 70% of 3500 psi Average             3033 87% of 3500 psi If the required strength is 3500 psi concrete are represented by the cores", "options": ["a. Maybe accepted, subject to price adjustment", "b. Is considered adequate", "c. Is considered inadequate", "d. May be recored at the initiative of the implementing office"], "answer": "c. Is considered inadequate"}, {"q": "11.Forms for concrete pavement shall remain in place undisturbed for not  less than", "options": ["a. 24 hours after concrete pouring", "b. The curing period", "c. The period required to attain the design strength", "d. 72 hours after concrete pouring"], "answer": "a. 24 hours after concrete pouring"}, {"q": "12.The Ph value of water that is acceptable for use in concrete mix is", "options": ["a. 2.0 to 3.1", "b. 3.2 to 4.4", "c. 4.5 to 8.5", "d. 8.6 to 10.0"], "answer": "c. 4.5 to 8.5"}, {"q": "13.How many measurements are needed for thickness determination of   concrete cores?", "options": ["a. 4", "b. 6", "c. 8", "d. 9"], "answer": "d. 9"}, {"q": "14. What is the strength for load bearing hollow blocks?", "options": ["a.  600 psi", "b.  700 psi", "c.  800 psi", "d.  1000 psi"], "answer": "d.  1000 psi"}, {"q": "15.What is the single factor that determines the strength of concrete?", "options": ["a.  Slump", "b. Water-cement ratio", "c.  Cement factor", "d.  Gradation of aggregates"], "answer": "b. Water-cement ratio"}, {"q": "16. What is the curve formed on a maximum dry density and optimum  moisture content graph?", "options": ["a. Parabola", "b.  Hyperbola", "c.  Straight line", "d.  None of the above"], "answer": "a. Parabola"}, {"q": "17.Which of the following is accepted for concrete with fc at 28 days of 3500  psi?", "options": ["a. 3275 psi; 3020 psi; 2630 psi", "b. 2640 psi; 3010 psi; 3030 psi", "c.  3030 psi; 2790 psi; 2599 psi", "d.  3300 psi; 3330 psi; 2620 psi"], "answer": "a. 3275 psi; 3020 psi; 2630 psi"}, {"q": "18.In a design mix, the specific gravity of Portland cement must be", "options": ["a.  3.05", "b.  3.10", "c.  3.15", "d.  6.10"], "answer": "c.  3.15"}, {"q": "19.The role of application of prime coat before asphalt overlaying is", "options": ["a.  0.2 to 0.7 l/sq.m.", "b. 0.8 to 0.9 l/sq.m.", "c. 1.0 to 2.0 l/sq.m.", "d. 2.1 to 2.5 l/sq.m."], "answer": "c. 1.0 to 2.0 l/sq.m."}, {"q": "20. The most commonly used method in the design and evaluation of  bituminous concrete mixes", "options": ["a.  Design mix", "b. Marshall stability", "c.  Index of retained strength", "d.  Immersion / compression test"], "answer": "b. Marshall stability"}, {"q": "21.Which of the following penetration grade of asphalt is used in cold climate?", "options": ["a.  120/50", "b. 85/100", "c.  60/70", "d.  40/50"], "answer": "b. 85/100"}, {"q": "22. If sea water is used in a concrete mix, what will be the effect on the  hardened concrete pavement?", "options": ["a. Strength is affected", "b.  Scaling at surface", "c.  Cracks at the side", "d.  Steel bars will rust"], "answer": "d.  Steel bars will rust"}, {"q": "23.The job mix formula contain the following provision except", "options": ["a.  Grading of aggregate", "b.  Temperature of aggregates and asphalt", "c.  Index of retained strength value", "d.  Type of asphalt and percentage"], "answer": "c.  Index of retained strength value"}, {"q": "24. Scaling of newly constructed concrete pavement is an evidence of  inadequate quality control mainly due to high", "options": ["a.  Fineness modules", "b.  Slump", "c.  Fine aggregates content", "d.  Water cement ratio"], "answer": "d.  Water cement ratio"}, {"q": "25.The grade designation of a reinforcing steel bars is also its", "options": ["a.  Nominal area", "b.  Yield strength", "c.  Tensile strength", "d.  Unit mass"], "answer": "b.  Yield strength"}, {"q": "26.Which of the following is not an engineering property of granular soils?", "options": ["a.  Good load bearing qualities", "b.  Drain readily", "c.  Susceptible to strength or volume change due to change in water content", "d.  Comparatively incompressible due to static load"], "answer": "c.  Susceptible to strength or volume change due to change in water content"}, {"q": "27.Peat is an example of", "options": ["a.  Inorganic soil", "b.  Organic soil", "c.  Selected borrow", "d.  Embankment material"], "answer": "b.  Organic soil"}, {"q": "28.Which of the following is an engineering property of line grained soil?", "options": ["a. hard to drain", "b.  Susceptible to volume change under vibratory load, if not adequately  compacted", "c.  Stable when subjected to load", "d.  Settlement is high"], "answer": "a. hard to drain"}, {"q": "29.The dividing size between coarse and fine aggregates used in asphalting  is", "options": ["a.  no. 4", "b.  No. 8", "c.  No. 16", "d.  No. 30"], "answer": "b.  No. 8"}, {"q": "30.The objective of designing the asphalt mixture is determination of", "options": ["a.  Index of retained strength", "b.  Penetration grade of asphalt", "c.  Temperature of mix", "d.  Production control"], "answer": "b.  Penetration grade of asphalt"}, {"q": "31.The sample of reinforcing steel bars for every 10,000 kgs shall be", "options": ["a.  1 meter long", "b.  2 meters long", "c.  4 meters long", "d.  6 meters long"], "answer": "a.  1 meter long"}, {"q": "32.Given:  Specific gravity = 2.305 Wet compressive strength = 1000 kpa Dry compressive strength = 1400 kpa What is the index of retained strength value?", "options": ["a.  70.1%", "b.  71.4%", "c.  40%", "d.  140%"], "answer": "b.  71.4%"}, {"q": "33.The variation on tolerance of the surface from the testing edge of the  straight edge in contact with the surface of asphalt pavement is", "options": ["a. +/- 2mm", "b. +/- 4mm", "c. +/- 6 mm", "d.   5 mm"], "answer": "c. +/- 6 mm"}, {"q": "34.The specific irregularity tolerance for item 201 is", "options": ["a. 5 mm", "b. 10 mm", "c. 15 mm", "d. 20 mm"], "answer": "a. 5 mm"}, {"q": "35. The depth of the weakened plane joint with a width of 6 mm is", "options": ["a. 40 mm", "b.45 mm", "c. 50 mm", "d. 60 mm"], "answer": "c. 50 mm"}, {"q": "36.Which of t he following is not the job for a materials engineer?", "options": ["a. Submits samples for testing", "b. Prepares design mix", "c. Checks job mix formula", "d. Surveys and measures line and grade at site"], "answer": "d. Surveys and measures line and grade at site"}, {"q": "37.The proper way of sampling of aggregate base course in the laboratory if  the the splitter is not availavle is to", "options": ["a. Scoop for samples in the middle of the sack", "b. Spread the samples on the ground and take the samples in the middle", "c. Spread the samples on the ground and divide the samples into four and  take two opposite parts from it.", "d. Scoop for samples at the side of the sack"], "answer": "c. Spread the samples on the ground and divide the samples into four and  take two opposite parts from it."}, {"q": "38. Given :Original weight of sample, g 5000, Sample retained on No. 12 sieve, g 4178 What is the abrasion loss?", "options": ["a. 16.42%", "b. 16.44%", "c. 19.67%", "d. 19.76%"], "answer": "b. 16.44%"}, {"q": "39.Which is true on conducting of a slump test?", "options": ["a. Consistency of mixture is checked by the slump test", "b. It is simple, but important, n indicator of water   cement ratio", "c. Slump cone is used together with tamping rod and ruler", "d. All of the above"], "answer": "d. All of the above"}, {"q": "40.Reinforced concrete puipe culvents are tested for compressive strength to  produce _______ crack.", "options": ["a. 0.20 mm", "b. 0.25 mm", "c. 0.30 mm", "d. 0.35 mm"], "answer": "c. 0.30 mm"}, {"q": "41.The bituminous materials commonly used in item 310 is", "options": ["a. Asphalt emulsion", "b. Asphalt cement", "c. Liquid asphalt", "d. Cutback asphalt"], "answer": "b. Asphalt cement"}, {"q": "42.Item 310 mixture shall have an index of retained strength of not less than", "options": ["a. 66", "b. 70", "c. 97", "d. 107"], "answer": "b. 70"}, {"q": "43.Final compaction and smoothing of item 310 should be done by a", "options": ["a. pneumatic   tired roller", "b. Sheep foot roller", "c. Vibratory roller", "d. Tandem smooth wheel roller"], "answer": "a. pneumatic   tired roller"}, {"q": "44.Item 310 mixture shall be delivered to the paver at a temperature not less  than", "options": ["a. 66  C", "b. 97  C", "c. 107  C", "d. 110  C"], "answer": "c. 107  C"}, {"q": "45. In the asphalting of a two lane, 500 meter road which lasted for three days,  how many core samples should be taken from the pavement if no sample  was taken at the end of each days operation?", "options": ["a. 3", "b. 5", "c. 6", "d. 10"], "answer": "d. 10"}, {"q": "46. Which of the following provisions is not included in the job   mix formula?", "options": ["a. Mixing time", "b. Grading of aggregates", "c. Asphalt cement", "d. Temperature at delivery"], "answer": "a. Mixing time"}, {"q": "47. A bituminous mix subjected to immersion   compression test yielded a dry  stability of 2.0 kg and a wet stability of 1.5 kg. The index of retained  strength of the mix is", "options": ["a. 0.5", "b. 1.33", "c. 33", "d. 75"], "answer": "d. 75"}, {"q": "48. In item 310, bitumen content, expressed in terms of percentage by mass  of aggregate, shall be", "options": ["a. 3 to 5 %", "b. 4 to 7 %", "c. 5 to 8 %", "d. 6 to 8 %"], "answer": "c. 5 to 8 %"}, {"q": "49.In the asphalting of a 3   meter wide, 200 meter long road lane, a core  was obtained and tested to have a thickness of 5 cm. And a density of  2.25 gm/ cm . the quantity of bituminous mix to be paid, in tonnes, is", "options": ["a. 65.5", "b. 67.5", "c. 655", "d. 675"], "answer": "b. 67.5"}, {"q": "50. After final rolling, the compacted asphalt pavement shall have a density  equal top, or greater than % of the laboratory compacted density.", "options": ["a. 90", "b. 95", "c. 97", "d. 98"], "answer": "c. 97"}, {"q": "51.Scales for weighing aggregates and cement shall be accurate within %  throughout the range of use.  Scales shall be inspected and sealed as often  as the Engineer may deem necessary to assure their continued accuracy,", "options": ["a. 1.0%", "b. 1.5%", "c. 0.5%", "d. 2.0%"], "answer": "c. 0.5%"}, {"q": "52. When cement is placed in contact with the aggregate, batches maybe  rejected unless mixed within ____ hours of such contact.", "options": ["a. 1.5 hours", "b. 2.0 hours", "c. 0.5 hours", "d. 2.0 hours"], "answer": "a. 1.5 hours"}, {"q": "53. When mixed at the site or in a central mixing plant, the mixing time not be  less than ____ nor more than ____unless mixer performance test prove  adequate mixing of concrete in a shorter time period.", "options": ["a. 30 seconds nor more than 90 seconds", "b. 50 seconds nor more than 90 seconds", "c. 60 seconds nor more than 120 seconds", "d. 90 seconds nor more than 120 seconds"], "answer": "b. 50 seconds nor more than 90 seconds"}, {"q": "54. The flow of water shall be uniform and all water should be in the drum by  the end of the first ____seconds of the mixing period.", "options": ["a. 45 seconds", "b. 30 seconds", "c. 15 seconds", "d. 20 seconds"], "answer": "c. 15 seconds"}, {"q": "55. Concrete not place within ____minutes from the time the ingredients were  charged into the mixing drum shall not be used.", "options": ["a. 120 minutes", "b. 150 minutes", "c.  60 minutes", "d.  90 minutes"], "answer": "d.  90 minutes"}, {"q": "56. When concrete is delivered in truck mixers, additional water maybe added  to the batch and additional mixing performed to increase the slump to meet  the specified requirement if permitted by the Engineer, provided all these  operation are performed within ____after the initial mixing operation and  water and cement ratio is not exceeded.", "options": ["a. 30 minutes", "b. 15 minutes", "c. 45 minutes", "d. 60 minutes"], "answer": "c. 45 minutes"}, {"q": "57. A sample from a bituminous mix weighs 1000 grams.  At extraction, it was  found out that the dry aggregate weighed 950 grams, What is the % of  asphalt by weight of mix?", "options": ["a. 5.2%", "b. 5.0%", "c. 5.4%", "d. 4.8%"], "answer": "b. 5.0%"}, {"q": "58. The minimum penetration of the preservative with the surface of the timber  piles shall be ____.", "options": ["a. 150 mm", "b. 20 mm", "c. 250 mm", "d. 10 mm"], "answer": "b. 20 mm"}, {"q": "59. The contractor shall submit in writing a job-mix formula for the mixture  supported by the laboratory test data along with samples of resources of  components and viscosity-temperature  relationship to the  Engineer for  testing and approval at least ____.", "options": ["a. two weeks", "b. three weeks", "c. one week", "d. four weeks"], "answer": "b. three weeks"}, {"q": "60. The concrete samples should be stored in a moist conditioned temperature  within the range of ____until the time of test.", "options": ["a. 18*C to 24*C", "b. 15*C to 18*C", "c. 14*C to 24*C", "d. 18*C to 28*C"], "answer": "a. 18*C to 24*C"}, {"q": "61. This is used in soil stabilized road surface due to its high____ property, tha  is, it absorb and retain water.", "options": ["a. Potassium Chloride", "b. Calcium Chloride", "c. Magnesium Chloride", "d. Sodium Chloride"], "answer": "b. Calcium Chloride"}, {"q": "62. The mass % wear of soil aggregate used in cement/lime proportions should  not be more than ____.", "options": ["a. 40%", "b. 50%", "c. 45%", "d. 55%"], "answer": "b. 50%"}, {"q": "63. The uniform rate at which the movable head of CBR machine tray is ____.", "options": ["a. 0.10 in/min", "b. 0.05 in/min", "c. 0.08 in/min", "d.  0.09 in/min"], "answer": "b. 0.05 in/min"}, {"q": "64. Cast in place concrete shall not be post-tensioned until at least ____ and  until the compressive strength has reached the strength specified", "options": ["a. 7 days", "b. 10 days", "c. 14 days", "d. 20 days"], "answer": "b. 10 days"}, {"q": "65. The penetration test is an indication of the ____of asphalt.", "options": ["a. Consistency", "b. Softness", "c. Hardness", "d. Flash Point"], "answer": "a. Consistency"}, {"q": "66. Specification requires one (1) Quality test for every ___of asphalt.", "options": ["a. 20 tons", "b. 200 tons", "c. 50 tons", "d.  40 tons"], "answer": "d.  40 tons"}, {"q": "67. The ___is the most commonly used method in the design and evaluation of  bituminous concrete mixes.", "options": ["a. Job Mix Formula", "b. Design Mix", "c. Marshall Stability", "d. Extraction"], "answer": "c. Marshall Stability"}, {"q": "68. Vibration shall operate a frequency of 8,300 to 9,600 impulses per minute  under load at a maximum spacing of ___cm.", "options": ["a. 30 cm", "b. 50 cm", "c. 60 cm", "d. 40 cm"], "answer": "c. 60 cm"}, {"q": "69. The specific gravity of Sodium Sulfate used  in soundness test for  aggregate should be within the range of ___.", "options": ["a. 1.151 to 1.174", "b. 1.250 to 1.178", "c.  1.051 to 1.154", "d.  1.058 to 1.184"], "answer": "a. 1.151 to 1.174"}, {"q": "70. The specific gravity magnesium sulfate solution used in soundness test for  aggregate should be within the range of ___.", "options": ["a. 1.280 to 1.408", "b. 1.180 to 1.308", "c. 1.295 to 1.308", "d. 1.195 to 1.318"], "answer": "c. 1.295 to 1.308"}, {"q": "71. Aggregate accounts for 92-95% of the weight of the bituminous mixture  asphalt accounts for 5-8% of the weight of the mix.  The exact percentage  to be used is determined by the ___.", "options": ["a. Trial Mix", "b. Design Mix", "c. Job Mix", "d. Job Order"], "answer": "c. Job Mix"}, {"q": "72. ___is an indication that the asphalt mix is overheated.", "options": ["a. Blue smoke", "b. Stiff appearance", "c.  Rising steam", "d.  Mix slumps in truck"], "answer": "a. Blue smoke"}, {"q": "73. In  checking the temperature of the mix, the thermometer should be  inserted into the mix at least___.", "options": ["a. 2 inches", "b. 6 inches", "c. 4 inches", "d. 6.0 mm"], "answer": "b. 6 inches"}, {"q": "74. ___is applied on existing bit, or cement concrete surface with bituminous  materials.", "options": ["a. Bituminous Prime Coat", "b. Bituminous Tack Coat", "c. Bituminous Seal Coat", "d. Bituminous Surface Treatment"], "answer": "b. Bituminous Tack Coat"}, {"q": "75. The solution used in the soundness test of aggregate shall be cooled to a  temperature of 21+of-1*C and maintain at that temperature for at least ___.", "options": ["a. 24 hours", "b. 36 hours", "c.  48 hours", "d.  18 hours"], "answer": "d.  18 hours"}, {"q": "76. Proper compaction of the fill materials is very important, as it will ____.", "options": ["a. Increase in the shear strength", "b. Decrease permeability", "c. Minimize compressibility", "d. All of the above"], "answer": "d. r  found in nature or as a residue in petroleum refining."}, {"q": "255.It is a kind of liquid asphalt which is a mixture of asphalt cement and water  with emulsified with pungent  odor.", "options": ["a.  Emulsified Asphalt", "b.  Asphalt Cement", "c.  Rapid  Curing Asphalt"], "answer": "a.  Emulsified Asphalt"}, {"q": "256. Joint Filler in concrete pavement is a _______.", "options": ["a. Blown Asphalt", "b.  Hot Asphalt", "c.  Liquid Asphalt"], "answer": "a. Blown Asphalt"}, {"q": "257.A device used  to measure the relative hardness of asphalt is ____.", "options": ["a.  Penetrometer", "b.  Spectometer", "c.  Vicat Apparatus"], "answer": "a.  Penetrometer"}, {"q": "258.A property of asphalt cement to stretch without breaking is called ____.", "options": ["a.  Ductility", "b.  Durability", "c.  Tencile"], "answer": "a.  Ductility"}, {"q": "259.An apparatus used to determine the specific gravity of asphalt is called  ______.", "options": ["a.  Metal Pycnometer", "b.  Glass Pycnometer", "c.  Any bottle"], "answer": "a.  Metal Pycnometer"}, {"q": "260.Consistency test for asphalt is called _______.", "options": ["a.  Viscosity", "b.  Slump Test", "c.  Washing"], "answer": "a.  Viscosity"}, {"q": "261. A process of volatilization test which measures the relative proportion of  asphalt  to oil.", "options": ["a.  Distillation", "b.  Extraction", "c.  Float Test"], "answer": "a.  Distillation"}, {"q": "262._____ is a period wherein the asphalt begins to melt.", "options": ["a.  Softening Point", "b.  Fire Point", "c.  Boiling Point"], "answer": "a.  Softening Point"}, {"q": "263.The sampling requirement of asphalt is ______.", "options": ["a.  1 sample for every 200 drums or 40 metric tons", "b.  1 sample for every 100 drums", "c.  1 sample for every shipment"], "answer": "a.  1 sample for every 200 drums or 40 metric tons"}, {"q": "264.The component of bituminous mixes which range from 92 to 96 % is called  ______.", "options": ["a.  Bituminous Blended Aggregates", "b.  Concrete Aggregates", "c.  Sand"], "answer": "a.  Bituminous Blended Aggregates"}, {"q": "265.______ is a property of bituminous mixes in pavement to resist deformation  or displacement due to impose load or repeated loading.", "options": ["a.  Stability", "b.  Flexibility", "c.  Ductility"], "answer": "a.  Stability"}, {"q": "266._______ is a property of bituminous mixes in pavement to resist  disintegration or deterioration due to the action of water, traffic and  changing climate.", "options": ["a.  Durability", "b.  Flexibility", "c.  Ductility"], "answer": "a.  Durability"}, {"q": "267.______ is a property of bituminous mixes in pavement adjust itself to  settlement.", "options": ["a.  Flexibility", "b.  Rigidity", "c.  Hardness"], "answer": "a.  Flexibility"}, {"q": "268.These are the factor affecting the workability of bituminous mixes", "options": ["a.  Gradation of aggregate quality of asphalt and temperature of mix.", "b.  Surface texture and temperature mix.", "c.  Quantity of aggregate and asphalt content."], "answer": "a.  Gradation of aggregate quality of asphalt and temperature of mix."}, {"q": "269.The percent index retention is computed in the formula ______.", "options": ["a. Wet Stability /Dry Stability x 100.", "b.  Dry Stability/Wet Stability x 100. c.  Wet Stability-Dry Stability x 100. d. Dry Stability-Wet Stability x 100"], "answer": "a. Wet Stability /Dry Stability x 100."}, {"q": "270.The sampling requirement of bituminous mixes is _____.", "options": ["a.  1 sample for every 75 cum.", "b.  1 sample for every 150 cum.", "c.  1 sample per delivery per day.", "d.  1 sample for every 35 cu.m."], "answer": "a.  1 sample for every 75 cum."}, {"q": "271.The application of liquid asphaltic material on a prepared untreated base is   _________.", "options": ["a.  Prime Coating", "b.  Seal Coating", "c.  Tack Coating", "d. Asphalting"], "answer": "a.  Prime Coating"}, {"q": "272.The application of liquid asphaltic material to an existing concrete surface  is ________.", "options": ["a.  Tack Coating", "b.  Seal Coating", "c.  Prime Coating", "d. Asphalting"], "answer": "a.  Tack Coating"}, {"q": "273.The application of asphaltic material and aggregate to an existing surface  for the purpose of sealing it against the infiltration of water surface moisture  is called _______.", "options": ["a.  Seal Coating", "b.  Tack Coating", "c.  Prime Coating", "d. Asphalting"], "answer": "a.  Seal Coating"}, {"q": "274. The rate of application of prime coating using cutback asphalt is  _______.", "options": ["a.  1-2 liters/sqm.", "b.  0.5-1.0 liter/sqm.", "c. 2.0-3.0 liters/sq.m.", "d. 1-3 liters/sqm."], "answer": "a.  1-2 liters/sqm."}, {"q": "275. The  rate of application of tack coating using liquid or emulsified asphalt is  _______.", "options": ["a.  0.2-0.7 li./sqm.", "b.  0.1-0.5 li./sqm.", "c.  2.0 li/sqm.", "d. 2.0-3.0 liters/sq.m."], "answer": "a.  0.2-0.7 li./sqm."}, {"q": "276.The rate of application of seal coat using asphalt cement is  ______.", "options": ["a.  0.9-1.8 li./sqm.", "b.  10-11 li.sqm.", "c.  8.0-9.0 li./sqm.", "d.  1.5-3.0 li./sq.m."], "answer": "a.  0.9-1.8 li./sqm."}, {"q": "277. When consolidating concrete during pouring operations, vibrator should not be operated in any one location longer than:", "options": ["a. 10 seconds", "b. 15 seconds", "c. 20 seconds", "d. 30 seconds"], "answer": "b. 15 seconds"}, {"q": "278. The primary quality control mechanism for the production of asphalt mixes  with high degree of uniformity that will satisfy job requirement is ________.", "options": ["a.  Job mix formula", "b.  Quality control formula", "c.  Assurance", "d. Quality Control Program"], "answer": "a.  Job mix formula"}, {"q": "279.The percent asphalt content in hot laid bituminous mixture range from ________.", "options": ["a. 5.0-8.0%", "b. 4.0-6.0 %", "c. 5.0-10.0 %", "c. 5.0-9.0 %"], "answer": "a. 5.0-8.0%"}, {"q": "280. The placing of temperature for bituminous mixture measured in the truck  prior to dumping is ________.", "options": ["a.  at least 107*C", "b.  at least 120*C", "c.  at least 150*C", "d.  at least 170*C"], "answer": "a.  at least 107*C"}, {"q": "281.The second phase of rolling the spread bituminous mixture is called  breakdown rolling which is the one responsible to attain the maximum  density.  The rolling is carried out by the use of ________.", "options": ["a.  pneumatic roller", "b.  steel wheeled  roller", "c. Sheep foot roller", "d. Vibratory Roller"], "answer": "b.  steel wheeled  roller"}, {"q": "282.The significance of the final rolling is to remove the roller marks to previous  rolling in order to have a good finish pavement with a temperature of 160*C.", "options": ["a.  True", "b.  False", "c.  Maybe"], "answer": "a.  True"}, {"q": "283. The proper way of rolling should begin at ________ .", "options": ["a.  The sides and proceeds longitudinally towards the road center  each  overlapping on half the roller width, gradually progressing the crown of road.", "b.  The center and proceeding longitudinally towards the side of the road", "c.  Any part of the road provided  each strip overlapping on half the roller  width."], "answer": "a.  The sides and proceeds longitudinally towards the road center  each  overlapping on half the roller width, gradually progressing the crown of road."}, {"q": "284.What is the minimum degree of compaction of asphalt pavement?", "options": ["a.  not less than 92% of the density of the laboratory compacted specimen", "b.  not less than 100% of the density of the laboratory compacted specimen", "c.  not less than 85% of the density of the laboratory compacted specimen", "d.  not less than 75% of the density of the laboratory compacted specimen"], "answer": "b.  not less than 100% of the density of the laboratory compacted specimen"}, {"q": "285. What is the color of asphalt when it is overcook?", "options": ["a.  yellowish brown", "b.  black", "c. gray", "d. Red"], "answer": "c. gray"}, {"q": "286.________ determines the thickness and density of compacted pavement.", "options": ["a.  Core Test", "b. X-ray", "c.  FDT", "d. Using Caliper"], "answer": "a.  Core Test"}, {"q": "287. The cored sample of asphalt pavement is measured at _______.", "options": ["a.  approximately quarter points", "b.  three points", "c. two points", "d. 9 points"], "answer": "a.  approximately quarter points"}, {"q": "288.Too much content in the bituminous mixes causes ________.", "options": ["a. bleeding", "b. Potholes", "c.  Cracks", "d. Rutting"], "answer": "a. bleeding"}, {"q": "289.The wearing away of the pavement surface caused by the disclodging of  aggregate particle is called ___________.", "options": ["a.  raveling", "b.  Alligator crack", "c.  Rutting", "d. Scalling"], "answer": "a.  raveling"}, {"q": "290.Interconnected cracks forming a series of small blocks resembling  alligator\u2019s skin or chicken wire is called _________.", "options": ["a.  alligator cracking", "b.  reflection cracking", "c.  rutting", "d. Raveling"], "answer": "a.  alligator cracking"}, {"q": "291. In Item 200 \u2013 Aggregate Subbase Course, the fraction passing the 0.425 mm (No. 40) sieve should have a liquid limit not greater than:", "options": ["a. 25 %", "b. 35 %", "c. 40 %", "d. 50 %"], "answer": "b. 35 %"}, {"q": "292. If the fine aggregates are subjected to five cycles of sodium sulfate  soudness test, the weighted loss shall not exceed  _________.", "options": ["a.  10 mass percent", "b.  5 mass percent", "c.  3 mass percent", "d.  12 mass percent"], "answer": "a.  10 mass percent"}, {"q": "293. Specimen of coarse aggregates are subjected to five cycles of sodium  sulfate soundness test, the weighted loss shall not exceed _______.", "options": ["a.  12 mass percent", "b.  15 mass percent", "c.  10 mass percent", "d. 14 mass percent"], "answer": "a.  12 mass percent"}, {"q": "294. The mass percent of wear of coarse aggregates for Item 311 when tested  by AASHTO 96 is not greater than __________.", "options": ["a.  40 %", "b.  45 %", "c.  50 %", "d. 30 %"], "answer": "a.  40 %"}, {"q": "295. The design of concrete mix specified by the blue book is based on  _______.", "options": ["a.  Absolute Volume Method", "b.  Area Method", "c.  American Method", "d. Average Method"], "answer": "a.  Absolute Volume Method"}, {"q": "296.The minimum flexural strength requirement of beam sample when tested  by the third point of loading method is __________.", "options": ["a.  3.5 Mpa", "b.  3.8 Mpa", "c.  4.0 Mpa", "d. 4.5 Mpa"], "answer": "b.  3.8 Mpa"}, {"q": "297. The minimum flexural strength requirement of beam sample when tested  by midpoint method is ________.", "options": ["a.  4.5 Mpa", "b.  3.5 Mpa", "c.  5.0 Mpa", "d. 5.5 Mpa"], "answer": "a.  4.5 Mpa"}, {"q": "298. ________ are additives used in mixing concrete. a.  Sodium chloride", "options": ["b.  Admixture", "c.  Curing admix", "d.  Water"], "answer": "b.  Admixture"}, {"q": "299.The standard sand used in testing the mortar strength of Portland Cement is  called ________.", "options": ["a.  Ottawa Sand", "b.  Beach Sand", "c.  River Sand", "d. 3/4 Gravel"], "answer": "a.  Ottawa Sand"}, {"q": "300.The apparatus used in determining the fineness of Portland Cement air  permeability is _________.", "options": ["a.  Blaine Air Permeability Apparatus", "b.  Sieve No. 200", "c.  Gilmore", "d.  Wash Test"], "answer": "a.  Blaine Air Permeability Apparatus"}, {"q": "302. The specifications call for a 1:2:4 concrete mix. In a one bagger mixer, which of the following amount of water is most likely required for the mix?", "options": ["a. 20 liters", "b. 5 liters", "c. 10 liters", "d. 35 liters"], "answer": "a. 20 liters"}, {"q": "303. Quality control testing in the DPWH project is the responsibility of the:", "options": ["a. DPWH", "b. Contractor", "c. DPWH and Contractor", "d. Construction supervision consultant"], "answer": "b. Contractor"}, {"q": "304. In performing a grading test on coarse aggregates from Item 311 \u2013 PCCP, the mass percent passing of the materials for 3\u201d and 2 \u00bd sieves is 100% What is the maximum size of the aggregates?", "options": ["a. 3 inches", "b. 2 \u00bd inches", "c. Either a or b", "d. None of the above"], "answer": "b. 2 \u00bd inches"}, {"q": "305. Given: Asphalt content of  bituminous mix = 5.5% Weight of specimen in air = 1200 grams Weight of specimen in water = 700 grams Weight of specimen in SSD = 1205 grams Calculate the bulk specific gravity of the asphalt specimen.", "options": ["a. 1.714", "b. 1.721", "c. 1.576", "d. 2.376"], "answer": "d. 2.376"}, {"q": "306. What is the minimum soaked CBR value required for the base materials obtained at the maximum dry density determined by AASHTO T180 Method D?", "options": ["a. 25", "b. 50", "c. 75", "d. 80"], "answer": "d. 80"}, {"q": "307. The minimum moisture content at which soil can be rolled into thread of 1/8\u201d in diameter without breaking is known as________.", "options": ["a. Liquid limit", "b. Plastic limit", "c. Shrinkage limit", "d. Atterberg limit"], "answer": "b. Plastic limit"}, {"q": "308. The mortar proportion of stone masonry shall be:", "options": ["a. One part cement, 2 parts sand", "b. One part cement, 3 parts sand", "c. One part cement, 4 parts sand", "d. One part cement, 1 part sand"], "answer": "a. One part cement, 2 parts sand"}, {"q": "309. Why are undisturbed samples used primarily for determining the properties of foundation materials?", "options": ["a. The retain the structure of materials", "b. Because it is easier to obtain undisturbed sample than disturbed sample", "c. Because it is easier to test undisturbed sample that disturbed sample", "d. Because it is represents the relative of the soil strata when subjected to compression test"], "answer": "d. Because it is represents the relative of the soil strata when subjected to compression test"}, {"q": "310. Test reports on thirteen (13) concrete beam samples indicate that loading was stopped after reaching the required flexural strength of 550 psi. this practice is:", "options": ["a. Improper because test procedure provides that the test should be carried out to failure", "b. Improper because test procedure was stopped without basis", "c. Proper because the strength specification for concrete pavement is 550 psi", "d. Proper because the test should not be carried out to failure since machine maybe damages"], "answer": "a. Improper because test procedure provides that the test should be carried out to failure"}, {"q": "311. Universal Testing Machines should be calibrated at least:", "options": ["a. Every three months", "b. Every six months", "c. Every year", "d. Every two years"], "answer": "c. Every year"}, {"q": "312. Three cores taken from a pavement section poured on a single day were tested to have strengths as follows: Core\tStrength (psi) 1\t3650 2\t3000(86% of 3500 psi) 3\t2450 (70% of 3500 psi) Average\t3033 (87% of 3500 psi) If the required strength is 3500 psi, concrete in the area represented by these cores:", "options": ["a. Maybe accepted, subject to price adjustment", "b. Is considered adequate", "c. Is considered inadequate", "d. May be record, at the initiative of the DPWH"], "answer": "c. Is considered inadequate"}, {"q": "313. The election by a standard method of a representative portion of a material for the purpose of ascertaining its characteristics id called:", "options": ["a. Batching", "b. Sampling", "c. Quarrying", "d. Quartering"], "answer": "b. Sampling"}, {"q": "314.. Which of the following does not fall under the primary responsibility of the materials engineer", "options": ["a. Sampling", "b. Testing", "c. Inspection", "d. Lineal measurements"], "answer": "d. Lineal measurements"}, {"q": "315. What other type of cement is allowed to be used from Item 311 and 405 in the absence of Portland cement?", "options": ["a. Portland Cement Type 1", "b. Pozzolan Cement", "c. Portland Pozzolan Cement Type 1P", "d. Hydraulic Cement"], "answer": "c. Portland Pozzolan Cement Type 1P"}, {"q": "316. A soil compacted dry will reach a certain dry density. If compacted again with the same compactive effort, but this time with water in the soil, the dry density will be higher because:", "options": ["a. The water lubricates the grains and allows them to slide in a denser structure", "b. Air is forced out of the soil", "c. More space if left for the solids", "d. All of the above"], "answer": "b. Air is forced out of the soil"}, {"q": "317. Emulsified asphalt applied as tack coat prior to laying of bituminous mix is completely cured one it turns to what color?", "options": ["a. Brown", "b. Gray", "c. Black", "d. None of the above"], "answer": "c. Black"}, {"q": "318. If one measurements of a core specimen taken from a concrete pavement is 23.6 cm, what is the corrected measurement to be used in calculating the average thickness of the pavement if the design thickness is 23. cm.?", "options": ["a. 23.6 cm.", "b. 23.0 cm.", "c. 23.5 cm.", "d. 24.0 cm."], "answer": "c. 23.5 cm."}, {"q": "319. An Inspection Report can be issued as basis for acceptance for the following except:", "options": ["a. Water", "b. Topsoil", "c. Pavement marking", "d. Sodding"], "answer": "c. Pavement marking"}, {"q": "320. The purpose of conducting laboratory CBR test on the fill materials for embankment is the check:", "options": ["a. Permeability of the compacted subgrade material", "b. Swelling characteristics of the subgrade material", "c. Bearing capacity of subgrade material", "d. All of the above"], "answer": "d. All of the above"}, {"q": "321. When the top surface of a concrete specimen is rough and not truly plane, stress concentrations are introduced and the strength of the concrete is reduced by about:", "options": ["a. \u00bd", "b. 1/3", "c. \u00bc", "d. 1/5"], "answer": "d. 1/5"}, {"q": "322. Per program of work, the estimated volume of Item 201 material is 6,200 cu.m. How many compaction tests are required based on the DPWH minimum testing requirements?", "options": ["a. 4", "b. 5", "c. 20", "d. 21"], "answer": "b. 5"}, {"q": "323. Cutback asphalt emulsified asphalt is usually used for:", "options": ["a. Prime coating", "b. Tack Coating", "c. Seal Coating", "d. Either a or b"], "answer": "b. Tack Coating"}, {"q": "324. Under what climate condition (s) do we use the higher penetration grade or soft asphalts?", "options": ["a. Cold Climate", "b. Hot climate", "c. Both cold and hot climate", "d. Rainy weather"], "answer": "a. Cold Climate"}, {"q": "325. What will possibly be the result of using different brands of cement in concrete paving?", "options": ["a. Different strength", "b. Different texture", "c. Different color after it has hardened", "d. No effect"], "answer": "c. Different color after it has hardened"}, {"q": "326. What is the basis for acceptance or rejection of any construction material?", "options": ["a. Minimum Testing requirement", "b. Certification of Materials Availability", "c. Certification of Acceptance", "d. Materials Reports"], "answer": "d. Materials Reports"}, {"q": "327. The index of the retained strength of the compacted bituminous mixtures is the ration of the compressive strength of immersed and dry bituminous mixtures. What is the minimum index of the retained strength required for bituminous mixtures?", "options": ["a. 40%", "b. 50%", "c. 60%", "d. 70%"], "answer": "d. 70%"}, {"q": "328. What is the specification range for asphalt content in a bituminous concrete mix for surface course paving?", "options": ["a. 4 to 10 percent of the total dry aggregates mass weight", "b. 5 to 8 percent of the total dry aggregates mass weight", "c. 3.5 to 7.5 percent of the total dry aggregates mass weight", "d. 4 to 8 percent of the total dry aggregates mass weight"], "answer": "b. 5 to 8 percent of the total dry aggregates mass weight"}, {"q": "329. Undersized reinforcing steel bars that satisfy the tensile and elongation requirements may be accepted provided that its underweight does not exceed:", "options": ["a. 3%", "b. 5%", "c. 6%", "d. 10%"], "answer": "c. 6%"}, {"q": "330. Which of the following is not a purpose of the trial sections for subbase construction?", "options": ["a. To check the suitability of the materials", "b. To check the efficiency of the equipment to be used", "c. To check the effectiveness of the proposed construction method", "d. To check the quantity of the subbase material"], "answer": "d. To check the quantity of the subbase material"}, {"q": "331. Which of the following is the frequency of sampling of concrete beams required by DPWH specification?", "options": ["a. At least one set of 3 concrete beams every 50 cu.m or fraction thereof", "b. At least one set of 3 concrete beams every 500 cu.m or fraction thereof", "c. At least one set of 3 concrete beams every 75 cu.m of fraction thereof", "d. At least one set of 3 concrete beams every 750 cu.m of fraction thereof"], "answer": "c. At least one set of 3 concrete beams every 75 cu.m of fraction thereof"}, {"q": "332. Measurement of concrete material for Item 405  Structural Concrete shall be by:", "options": ["a. Weight", "b. Volume", "c. Quantity", "d. Density"], "answer": "a. Weight"}, {"q": "333. What documentation should be maintained and kept updated by the material engineer during project implementation?", "options": ["a. Minimum Testing Requirements", "b. Materials Logbook", "c. Quality Control handbook", "d. Materials Test results"], "answer": "b. Materials Logbook"}, {"q": "334. Aggregates for concrete mixes are classified as either fine or coarse aggregates. Which sieve is used to separate fine from coarse aggregates?", "options": ["a. No. 4 (4.75mm)", "b. No. 6 (3.35mm)", "c. No. 8 (2.36mm)", "d. None of the above"], "answer": "a. No. 4 (4.75mm)"}, {"q": "335. What is the frequency of core sampling required on the completed bituminous pavement", "options": ["a. Every 100 linear meters per lane", "b. Every 200 linear meters per lane", "c. Every 300 linear meters per lane", "d. Every 400 linear meters per lane"], "answer": "a. Every 100 linear meters per lane"}, {"q": "336. According to the AASHTO Method of Soil Classification, an A-3 materials is classified as:", "options": ["a. Fine sand", "b. Coarse sand", "c. Silty clay", "d. Sandy silt"], "answer": "a. Fine sand"}, {"q": "337. What class of concrete and range of slump will you use in concreting thin reinforced section, railings, precast R.C. piles and cribbing?", "options": ["a. Class A with slump 2\u201d-4\u201d", "b. Class B with slump 2\u201d-4\u201d", "c. Class C with slump 2\u201d-4\u201d", "d. Class P with slump 2\u201d-4\u201d"], "answer": "c. Class C with slump 2\u201d-4\u201d"}, {"q": "338. When taking three or more samples of aggregates to be combines for one material sample:", "options": ["a. The small samples must be packed in separate sample bags", "b. The small sample must be obtained from different lots", "c. The small sample should be of approximately equal size", "d. None of the above"], "answer": "b. The small sample must be obtained from different lots"}, {"q": "339.Where do we take additional cores when the measurement of any core taken from the pavement is deficient in thickness by more than 25 mm?", "options": ["a. At no less than 20 meter intervals parallel to the centreline in each direction from the affected location", "b. At no less than 15 meter intervals parallel to the centreline in each direction from the affected location", "c. At no less than 10 meter intervals parallel to the centreline in each direction from the affected location", "d. At no less than 5 meter intervals parallel to the centreline in each direction from the affected location"], "answer": "d. At no less than 5 meter intervals parallel to the centreline in each direction from the affected location"}, {"q": "340. The Standard Penetration test is an in-situ test that measures:", "options": ["a. Shear resistance", "b. Compressive strength", "c. Depth of soil layer", "d. Consistency of soil"], "answer": "c. Depth of soil layer"}, {"q": "341. Which of the following bituminous material is best recommended for sealing weakened plane joints?", "options": ["a. Asphalt Cement", "b. Emulsified Asphalt", "c. Cutback Asphalt", "d. Joint Filler Asphalt"], "answer": "d. Joint Filler Asphalt"}, {"q": "342. When Testing cement sample, the lead time required to test them should be considered to prevent delays in project implementation. How long does it normally take to test cement samples?", "options": ["a. 15 days", "b. 21 days", "c. 28 days", "d. 35 days"], "answer": "c. 28 days"}, {"q": "343. Quality of factory-produced reinforced concrete pipes may be best established through:", "options": ["a. Engineer\u2019s certification", "b. Inspection report", "c. Test of concrete cylinder samples", "d. Test of concrete pipe samples"], "answer": "d. Test of concrete pipe samples"}, {"q": "344. As materials engineer, what is the area of the trial section that you would recommended to check the suitability of the materials and efficiency of the equipment to be used for Item 310, Bituminous Concrete Surface Course?", "options": ["a. About 100 sq.m.", "b.  About 400 sq..m.", "c. About 500 sq.m.", "d. About 1000 sq.m."], "answer": "c. About 500 sq.m."}, {"q": "345. A well-graded aggregates for base course has proper proportioning of:", "options": ["a. Sand and gravel", "b. Sand-gravel and silty-clay", "c. Sand-silt-clay", "d. Sand-gravel and deleterious material"], "answer": "b. Sand-gravel and silty-clay"}, {"q": "346. What chemical admixture is needed to produce a concrete mix with improved slump without additional water?", "options": ["a. Set accelerating admixture", "b. Set retarding admixture", "c. Water reducing admixture", "d. Fly ash"], "answer": "c. Water reducing admixture"}, {"q": "347. In slip-form construction, what is the slump of concrete used?", "options": ["a. Not more than 3 inches", "b. 3 to 4 inches", "c. Almost zero", "d. Any of the above"], "answer": "c. Almost zero"}, {"q": "348. On order to facilitate the acceptance of cement to be used in the implementation of various DPWH projects, the compressive strength of mortar samples tested at 3 days and 7 days can be considered for acceptance provided that the strength of the samples at 7 days is not less than ______ of the compressive strength requirement for 28 days.", "options": ["a. 80%", "b. 75%", "c. 85%", "d. 90%"], "answer": "c. 85%"}, {"q": "349. A set of three (3) n=beam samples representing a particular section of the concrete pavement failed to meet the flexural strength requirement. As materials engineer, what would you recommend?", "options": ["a. Monitor the pavement section with strength deficiency", "b. Adjust payment corresponding to the strength deficiency of the beam samples", "c. Conduct core test for strength determination on section represented by the failed samples to determine the actual strength of the in-placed concrete", "d. Submit new beam samples for testing"], "answer": "c. Conduct core test for strength determination on section represented by the failed samples to determine the actual strength of the in-placed concrete"}, {"q": "350. For each full day\u2019s operation, how many asphalt core samples must be taken for thickness determination?", "options": ["a. At least one but not more than three core samples", "b. At least two but not more than four core samples", "c. At least three but not more than six core samples", "d. Depends on the total area to be paved"], "answer": "a. At least one but not more than three core samples"}, {"q": "351. The percentage residence requirement for hydrated lime on A 0.075 mm (no. 200) sieve shall not be more than.", "options": ["a. 2%", "b. 15%", "c. 10%", "d. 5%"], "answer": "b. 15%"}, {"q": "352. The latest state of the Art method in determining density.", "options": ["a. Falling wt. Deflectometer", "b. Ground radar", "c. Ultrasonic tester", "d. Nuclear Densometer"], "answer": "d. Nuc phalt seal coat"}, {"q": "435.The upward movement of asphalt in an asphalt pavement resulting in the formation of a film of asphalt on the surface.", "options": ["a. Blow-up", "b. Asphalt seal coat", "c. Bleeding or flushing asphalt"], "answer": "c. Bleeding or flushing asphalt"}, {"q": "436. An application of asphalt materials to any type of road or pavement surface with or without a cover of mineral aggregates that produce an increase in thickness of less than25mm or 1 inch.", "options": ["a. Asphalt overlay", "b. Asphalt Surface Treatment", "c. Macadam Asphalt"], "answer": "b. Asphalt Surface Treatment"}, {"q": "437. The localized buckling or shattering of rigid-type pavement, occurring usually at transverse crack or joint.", "options": ["a. Longitudinal crack", "b. Blow-up", "c. Alligator crack"], "answer": "b. Blow-up"}, {"q": "438.A very light application of asphalt applied to an existing asphalt or Portland cement surface, used to ensure a bond between the surface of being paved and the overlaying course", "options": ["a. Asphalt seal coat", "b. Asphalt tack coat", "c. Asphalt Leveling Course"], "answer": "b. Asphalt tack coat"}, {"q": "439. A mixture of slow-setting emulsified asphalt, water. Aggregates and mineral filler, produced to a slurry consistency and placed on pavement surface.", "options": ["a. Asphalt sea coat", "b. Asphalt emulsion slutty seal", "c. All of the above"], "answer": "b. Asphalt emulsion slutty seal"}, {"q": "440. The separation of the pavement due to natural causes, traffic action, or localized disintegration", "options": ["a. Construction joint", "b. Crack", "c. Bleeding"], "answer": "b. Crack"}, {"q": "441. The blow-shape of varying sizes in the pavement, resulting from localized disintegration", "options": ["a. Potholes", "b. Cracks", "c. ravelling"], "answer": "a. Potholes"}, {"q": "442. A crack in asphalt overlays the reflects the crack pattern in the pavement structure underneath", "options": ["a. Reflective cracks", "b. Transv re uniform production of mix meeting specifications", "c. Maintaining complete and accurate formal records", "d. Ajusting any plant control, setting any dial, gauges or meters."], "answer": "d. Ajusting any plant control, setting any dial, gauges or meters."}, {"q": "452. The extraction test on asphalt mixes is made to determine:", "options": ["a. The amount of coarse and fine aggregates in the mix", "b. The amount of mineral filler in the mix", "c. The amount of asphalt in the mix", "d. All of the above"], "answer": "d. All of the above"}, {"q": "453. If the bulk specific gravity of a bituminous mix is 2.243, and the dry stability is 3,100 lbs., what will the approximate wet stability if its Index of Retained Strength (IRS) is 82%?", "options": ["a. 2,542 lbs.", "b. 3,780 lbs.", "c. 5,702 lbs.", "d. 6,953 lbs."], "answer": "a. 2,542 lbs."}, {"q": "454. Cement which has been in storage for so long a period that there is already doubt as to its quality should:", "options": ["a. Not be used", "b. Be allowed to be used", "c. Be retested prior to use", "d. Be reprocessed prior to used"], "answer": "c. Be retested prior to use"}, {"q": "455. Specimens for compressive or flexural strength tests shall be removed from the molds at the end of 24 hours and stored in a moist condition at a temperature range of ____ until the time of test.", "options": ["a. 22\u00b0C to 28\u00b0C", "b. 22\u00b0C to 26\u00b0C", "c. 18\u00b0C to 26\u00b0C", "d. 18\u00b0C to 48\u00b0C"], "answer": "c. 18\u00b0C to 26\u00b0C"}, {"q": "456. The test that determine the purity of asphalt cement is called:", "options": ["a. Ductility", "b. Specific gravity", "c. Viscosity", "d. Solubility"], "answer": "d. Solubility"}, {"q": "457. What is the best temperature to begin rolling (compaction) of the bituminous mix?", "options": ["a. Maximum temperature at which the mix will support the roller without moving horizontally", "b. Maximum temperature at which the mix can be compacted without watering the roller", "c. The minimum temperature at which densification can take place", "d. The minimum temperature at which the mix can be compacted without cracking"], "answer": "d. The minimum temperature at which the mix can be compacted without cracking"}, {"q": "458. What is used to measure pavement deflection?", "options": ["a. Falling weight deflectometer equipment", "b. Profile deflectometer", "c. Dynamic cone penetrometer apparatus", "d. 3-meter straight edge"], "answer": "a. Falling weight deflectometer equipment"}, {"q": "459. What is the significance of the loss on ignition of cement?", "options": ["a. It is a measure of the heat generated when cement is mixed with water", "b. It signifies pre-hydration of moisture uptake of cement while is shelved", "c. It is a  measure of the resistance of cement when exposed to fire", "d. None of the above"], "answer": "b. It signifies pre-hydration of moisture uptake of cement while is shelved"}, {"q": "460. Accurate sampling of aggregates in pits or quarry and stockpiles requires skill and judgement. The samples to be of any value must therefore be:", "options": ["a. Of no considerable variation in the size of grain", "b. Consisting of loosely arranged bundles of particles", "c. Free from other impurities"], "answer": "c. Free from other impurities"}, {"q": "461. The workability of a bituminous mix is dependent on the:", "options": ["a. Gradation of aggregates", "b. Temperature of mix", "c. Asphalt content", "d. Shape and texture of aggregates"], "answer": "a. Gradation of aggregates"}, {"q": "462. The most basic criteria that can be applied for rejection of asphalt mixture delivered to the site is:", "options": ["a. Asphalt content", "b. Grading of mixture", "c. Temperature of mixture", "d. All of the above"], "answer": "c. Temperature of mixture"}, {"q": "463. The following are the measurements (in cm.) of the concrete core taken for thickness determination at Sta. 0.+100: 28.5, 28, 28.5, 28, 28.8, 29, 28.5, 29. Actual measurement of the core at the center is 28cm. the designed thickness is 28 cm. What is the average thickness of the core?", "options": ["a. 28.23 cm.", "b. 28.33 cm.", "c. 28.38 cm.", "d. 28.48 cm."], "answer": "b. 28.33 cm."}, {"q": "464. The upper limit of grain for determining the Atterberg limits of soils is:", "options": ["a. No. 10 sieve", "b. No. 40 sieve", "c. No. 100 sieve", "d. No. 200 sieve"], "answer": "b. No. 40 sieve"}, {"q": "465. What test determines the silt clay of soil?", "options": ["a. Liquid limit test", "b. Plastic limit test", "c. Shrinkage limit test", "d. Hydrometer test"], "answer": "d. Hydrometer test"}, {"q": "466.What is the function of emulsifiers in liquid asphalt?", "options": ["a. To increase mixing ability with aggregates", "b. To retain water in asphalt for longer periods", "c. To prevent asphalt from hardening", "d. To enable asphalt and water to mix"], "answer": "d. To enable asphalt and water to mix"}, {"q": "467. What test is used to determine the index of retained strength of a bituminous mix?", "options": ["a. Marshall Stability", "b. Immersion-Compression test", "c. Extraction and grading tests", "d. Stability test"], "answer": "b. Immersion-Compression test"}, {"q": "468. What differentiates the comparison of Item 201-Aggregate Base Course from Item 200-Aggregate Subbase Course?", "options": ["a. Item 201 contains less binder and smaller size of gravel than Item 200", "b. Item 201 contains more binder and biggerr size of gravel than Item 200", "c. Item 201 contains sand and gravel only", "d. Item 201 contains sand and fine-gained soils only"], "answer": "a. Item 201 contains less binder and smaller size of gravel than Item 200"}, {"q": "469. It is a single procedure to determine the suitability of an asphaltic concrete mix.", "options": ["a. Penetration", "b. Extraction", "c. Marshall Stability", "d. Immersion-Compression"], "answer": "c. Marshall Stability"}, {"q": "470. The California Bearing Ratio (CBR) value indicates:", "options": ["a. The relative ease at which the subgrade or base materials can be compacted", "b. The relative strength of a subgrade soil, subbase, or base course materials", "c. All of the above", "d. None of the above"], "answer": "b. The relative strength of a subgrade soil, subbase, or base course materials"}, {"q": "471. ASTM C-150 requires that the 28-day strength of mortar made from Type I Portland Cements be at least 27.6 MPa. Three specimens were tested: Two passed but one failed by more than 20%. As Materials Engineer, what will be your conclusion?", "options": ["a. Discard the failed result and conclude that the particular cement passed the specification", "b. Perform a re-test since the data is inclusive", "c. Get the average of the three and if the average is more than 27.6MPa, conclude that the particular cement passed the specification", "d. Conclude that the cement did not pass the specification since it failed to give consistent result"], "answer": "b. Perform a re-test since the data is inclusive"}, {"q": "472. A transit mixer for road construction was found to have a 6-inches slump of fresh concrete instead of the required 3-inches slump. What will you recommend if you are assigned as Materials Engineer?", "options": ["a. Add Portland cement to attain the required 3-inches slump", "b. Add Portland cement and fine aggregate to attain the required 3-inches slump", "c. Reject the cement mixture", "d. Let the concrete mix diverted for pouring on a prepared column for retaining wall of the same project"], "answer": "c. Reject the cement mixture"}, {"q": "473. A concrete core specimen for the thickness determination shall have a diameter of at least:", "options": ["a. 75 mm", "b. 100 mm", "c. 125 mm", "d. 150 mm"], "answer": "b. 100 mm"}, {"q": "474. If two concrete cylinders A and B are tested in uniaxial compression, and if cylinder A is completely saturated while cylinder B is dry, which of the following is true?", "options": ["a. Both cylinders will yield the same compressive strength provided that all other factors are the same", "b. Whether Cylinder A will yield a higher compressive strength over Cylinder B (or cylinder B over cylinder A) is unpredictable", "c. Cylinder A will yield a higher compressive strength", "d. Cylinder B will yield a higher compressive strength"], "answer": "d. Cylinder B will yield a higher compressive strength"}, {"q": "475. How many pipes should be tested for strength, absorption and dimension on 300 pieces of reinforced concrete culvert pipe?", "options": ["a. One", "b. Two", "c. Four", "d. Six"], "answer": "d. Six"}, {"q": "476. In testing bituminous mix sample for Immersion-Compression Stability the specimen for wet stability is soaked in a water bath for _____ hours prior to testing.", "options": ["a. 24", "b. 48", "c. 72", "d. 96"], "answer": "a. 24"}, {"q": "477. The moisture-density curve is different for each soil. Which of the following statements is/are true?", "options": ["a. Granular, well-graded soils generally have fairly high maximum densities at low optimum moisture content (OMC)", "b. Clay soils have lower densities at OMC than granular, well-graded soils", "c. Granular, well-graded soils have higher densities than uniform soils at OMC", "d. All of the above"], "answer": "d. All of the above"}, {"q": "478. What apparatus measures the specific gravity of hydraulic Portland cement?", "options": ["a. Blaine-aire permeability apparatus", "b. La Chatelier flask apparatus", "c. Autoclave expansion apparatus", "d. Vicat apparatus"], "answer": "b. La Chatelier flask apparatus"}, {"q": "479. As materials engineer, when is the right time to start sampling and testing of aggregate base course material?", "options": ["a. Once the materials is delivered and stockpiled", "b. As construction work progress", "c. Once the source is identified", "d. After the material was incorporated into the pwrk"], "answer": "c. Once the source is identified"}, {"q": "480. Embankment materials are classified as unsuitable materials if:", "options": ["a. The natural moisture content is 50%.", "b. The liquid limit is 40%", "c. The plasticity index is 60%", "d. The natural density is 1200 kilogram per cubic meter"], "answer": "c. The plasticity index is 60%"}, {"q": "481. A concrete core sample having a maximum height of less than ____ of its diameter before capping or a height less that its diameter after capping shall not be tested.", "options": ["a. 93%", "b. 94%", "c. 95%", "d. 96%"], "answer": "c. 95%"}, {"q": "482. Which of the following are the qualitative requirements for reflective thermoplastic stripping materials (solid form) intended for pavement markings under the DPWH Standard Specifications?", "options": ["a.Specific gravity and drying time", "b.Bond strength to Portland Cement Concrete after heating", "c.Cracking resistance at low temperature after heating", "d.All of the above"], "answer": "d.All of the above"}, {"q": "483. In the filed density test, the volume of the hole is equal to:", "options": ["a. The dry unit weight divided by the maximum dry density", "b. The wet unit weight divided by the moisture content", "c. The total materials taken form the hole divided by the wet unit weight", "d. The weight of sand to fill the hole divided by the unit weight of the dry sand"], "answer": "d. The weight of sand to fill the hole divided by the unit weight of the dry sand"}, {"q": "484. A subgrade with CBR value of 2 or less considered as:", "options": ["a. Weak", "b. Normal", "c. Stable", "d. Very stable"], "answer": "a. Weak"}, {"q": "485. From the materials point of view, subgrade construction consists mainly of:", "options": ["a. Identification and treatment of unsuitable material", "b. Compaction of the whole depth of material in embankments", "c. Compaction of the top layer in Cuts.", "d. All of the above"], "answer": "d. All of the above"}, {"q": "486. Before an asphalt pavement or asphalt surface treatment is placed on a newly prepared granular base, what is applied?", "options": ["a. Seal coat", "b. Tack coat", "c. Prime coat", "d. Bituminous surface treatment"], "answer": "c. Prime coat"}, {"q": "487. The frequency of sampling and testing for compacting subbase material is:", "options": ["a. 1 per 300 cubic meter", "b. 1 per 500 cubic meter", "c. 1 per 1,500 cubic meter", "d. 1 per 2,500 cubic meter"], "answer": "c. 1 per 1,500 cubic meter"}, {"q": "488. In which DPWH Item is emulsified asphalt not suitable?", "options": ["a. Item 301, Bituminous Prime Coat", "b. Item 302, Bituminous Tack Coat", "c. Item 304, Bituminous Surface Treatment", "d. Item 308, Bituminous Plant-Mix Course, Cold Laid"], "answer": "a. Item 301, Bituminous Prime Coat"}, {"q": "489.The aggregate component contributes internal friction to shear strength and stability of the bituminous mixture. The desirable shape and surface of aggregates particles are:", "options": ["a. Round and smooth aggregate particles", "b. Angular and smooth aggregate particles", "c. Round and rough-textured particles", "d. Angular and rough-textured particles"], "answer": "d. Angular and rough-textured particles"}, {"q": "490. In in-situ soil CBR strength determination, DCP means:", "options": ["a. Dynamic Cone Profiler", "b. Dynamic Compressive Performance", "c. Dynamic Cone Penetrometer", "d. Dynamic Compressive Penetrometer"], "answer": "c. Dynamic Cone Penetrometer"}, {"q": "491. Which of the following test determine the optimum moisture content of soil?", "options": ["a. Tri-axial test", "b. Proctor tests", "c. Sand-cone test", "d. Field density test"], "answer": "b. Proctor tests"}, {"q": "492. As percent asphalt increases in Marshall Stability, the air voids:", "options": ["a. Increases", "b. Decreases", "c. Remains constant", "d. Either A or B"], "answer": "b. Decreases"}, {"q": "493. When the strength test results of concrete beam samples are not acceptable, how many representative core/s shall be taken from each member or area of concrete in-place considered deficient in the newly completed concrete pavement?", "options": ["a. At least 4 cores", "b. At least 3 cores", "c. At least 2 cores", "d. Only 1 core"], "answer": "b. At least 3 cores"}, {"q": "494.Soil classification is determine by _________.", "options": ["a. Atterberg limit test", "b. Sieve analysis test", "c. Hydrometer test", "d. A and B"], "answer": "d. A and B"}, {"q": "495. Penetration test for asphalt cement is a measure of:", "options": ["a. Consistency", "b. Solubility", "c. Ductility", "d. fluidity"], "answer": "a. Consistency"}, {"q": "496. Newly fabricated bridging material/panels (U.K., Austria, Spain) were delivered DPWH depot. Aside from the Mill Certificate, what sample should be taken to check the integrity of bridge panels?", "options": ["a. Whole panel assembly", "b. Reduced section of base metal used in the fabrication.", "c. Any bracing frame form the panel assembly.", "d. Any transom from the panel assembly."], "answer": "a. Whole panel assembly"}, {"q": "497. The test which combines a load-deformation test performed in the laboratory with an empirical design chart to determine the thickness of pavement base and other layers is known as:", "options": ["a. Plate Bearing Test", "b. Moisture-Density Determination", "c. California Bearing Ratio", "d. Standard Penetration Test"], "answer": "c. California Bearing Ratio"}, {"q": "498. Suppose you have a sack of aggregate sample weighing 20 kg. but you only need 5 kg. for certain test. In the absence of sample splitter, what will be the best way to get a 5 kilogram sample?", "options": ["a. Get a 5kg. sample from the middle of the sack", "b. Remove the aggregate form the sack and lay it a pile on a clean floor then get the 5kg.", "c. Perform the quartering procedure", "d. Get a 5kg. sample direct form the sack"], "answer": "c. Perform the quartering procedure"}, {"q": "499. In compacted asphalt pavement, the small air spaces between coated aggregates are:", "options": ["a. Mineral fillers", "b. Mineral spacers", "c. Voids", "d. porosity"], "answer": "c. Voids"}, {"q": "500. A one-lane road, with a pavement width of 3.5 meters and shoulder width of 0.5 meter on each side of the pavement, was designed to have subbase and base courses with a combined thick of 300mm. if the thickness of the subbase is 125mm, the spreading and compaction of the subbase and base courses shall be carried out in:", "options": ["a. 3 layers over the full width of 4.5m", "b. 2 layers over the full width of 4.5m", "c. 1 layers over the full width of 4.5m"], "answer": "b. 2 layers over the full width of 4.5m"}, {"q": "502. An asphalt mixture in order to be acceptable should not loss more than ______ percent of its dry strength when subject to the standard immersion-compression test.", "options": ["a. 30", "b. 35", "c. 40", "d. 15"], "answer": "b. 35"}, {"q": "503. Responsible for the plastic properties of the asphalt and also imparts hardness.", "options": ["a. Maltenes", "b. Napantenes", "c. Asphaltene", "d. Petroline"], "answer": "c. Asphaltene"}, {"q": "504. The flow value for all traffic requirements for paving mixtures shall not exceed _____ when measured in 0.25 penetration.", "options": ["a. 10", "b. 18", "c. 16", "d. 12"], "answer": "c. 16"}, {"q": "505. It is an important data in the determination of the degree of compaction of a newly constructed asphalt pavement.", "options": ["a. Density of aggregates", "b. Specific gravity", "c. Thickness of asphalt mix", "d. Core test"], "answer": "c. Thickness of asphalt mix"}, {"q": "506. The rate of application for the bituminous prime coat shall be in the range of _______.", "options": ["a. 0.2 to 0.7 liters/m2", "b. 0.5 to 1.5 liters/m2", "c. 1.0 to 2.0 liters/m2", "d. 1.5 to 2.5 liters/m2"], "answer": "c. 1.0 to 2.0 liters/m2"}, {"q": "507. Minimum diameter of gabions per standard specification requirements.", "options": ["a. 2.70 mm", "b. 3.00 mm", "c. 2.50 mm", "d. 1.70 mm"], "answer": "a. 2.70 mm"}, {"q": "508. AASHTO Designation for plastic limit test.", "options": ["a. AASHTO T-89", "b. AASHTO T-99", "c. AASHTO T-90", "d. AASHTO T-91"], "answer": "c. AASHTO T-90"}, {"q": "509. Bituminous mixture will be measured be", "options": ["a. Linear meter", "b. Tones", "c. Gm/cm", "d. Sq. mtrs"], "answer": "b. Tones"}, {"q": "510. Size of asphalt core specimen for thickness and density determination.", "options": ["a. At least 150 mm X 150 mm", "b. 100 mm dia, full depth", "c. All of the above", "d. None of the above"], "answer": "c. All of the above"}, {"q": "511. Determine the bulk specific gravity at a compacted asphalt core with the given data. Weight in air\t\t=\t2.145 gm SSD\t\t\t=\t1.913 gm Weight in water\t\t=\t1000 gm", "options": ["a. 2.43", "b. 2.34", "c. 2.35", "d. None of the above"], "answer": "c. 2.35"}, {"q": "512. A core sample shall be taken for every _____ , if no core was taken at the end of each days operation.", "options": ["a. 100 lm per lane", "b. 100 lm per width", "c. 100 lm per lane or a fraction thereof", "d. All of the above"], "answer": "c. 100 lm per lane or a fraction thereof"}, {"q": "513. The moisture content corresponding to the intersection of the flow curved with the ______ shock ordinate shall be taken as the liquid limit of the soil.", "options": ["a. 20", "b. 25", "c. 15", "d. 30"], "answer": "b. 25"}, {"q": "514. Test specimen required for items 311 \u2013 Portland cement concrete pavement", "options": ["a. Concrete mold", "b. Concrete cylinder", "c. Concrete beam", "d. All of the above"], "answer": "c. Concrete beam"}, {"q": "515. Required slump of PCCP it vibrated.", "options": ["a. 40 to 75 mm", "b. 30 to 40 mm", "c. 10 to 40 mm", "d. 40 to 75 mm"], "answer": "c. 10 to 40 mm"}, {"q": "516. The prime coat shall be left undisturbed for a period of at least _____ hrs. and shall not be opened for traffic until it has penetrated and cured sufficiently.", "options": ["a. 2", "b. 12", "c. 18", "d. 24"], "answer": "d. 24"}, {"q": "517. The rate of applica
