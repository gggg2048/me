ngth determination such as test on cored samples"}, {"q": "2299. Tensile strength, yield strength and elongation are the common required test to determine the quality of:", "options": ["a. Aluminum guardrails", "b. Galvanized steel sheets and coils", "c. Reinforcing steel bars", "d. Steel pipes"], "answer": "c. Reinforcing steel bars"}, {"q": "2300. The sand used in the field density test in determining the volume of hole using sand cone method must be clean, dry and passing sieve number:", "options": ["a. 30", "b. 40", "c. 200", "d. 10"], "answer": "d. 10"}, {"q": "2301.Tensile strength, yield strength and elongation are the common required tests to determine the quality of:", "options": ["a.Aluminum guardrails", "b.Galvanized steel sheets and coils", "c.Reinforcing steel bars", "d.Steel pipes"], "answer": "c.Reinforcing steel bars"}, {"q": "2302.If the bulk specific gravity of a bituminous mix is 2.342 and the dry stability is 3,000 lbs., what is its Index of Retained Strength (IRS) if its wet stability is 2,400 lbs?", "options": ["a.34", "b.53", "c.80", "d.127"], "answer": "c.80"}, {"q": "2303.The laboratory density of a bituminous mix 2.233. What is the degree of compaction of a 5cm. asphalt overlay for which a field density of 2.010 was obtained?", "options": ["a.45%", "b.55%", "c.90%", "d.110%"], "answer": "c.90%"}, {"q": "2304.A set of three (3) core samples has the following compressive strengths: 4000 psi, 3500 psi and 2600 psi. If the required strength is 3500 psi, the area represented by the core samples is:", "options": ["a.Acceptable", "b.Not acceptable", "c.Acceptable but with adjustment in payment", "d.Subject to monitoring within the warranty period"], "answer": "b.Not acceptable"}, {"q": "2305.Sampling of soil aggregates in a big stockpile shall be done by:", "options": ["a.Taking sample from the bottom, middle and top of the stockpile", "b.Shoveling-off the surface at the bottom of the stockpile and taking full sample thereat", "c.Shoveling-off the surface at the middle of the stockpile and taking full sample thereat", "d.None of the above"], "answer": "a.Taking sample from the bottom, middle and top of the stockpile"}, {"q": "2306.When taking three (3) or more samples of aggregates to be combined for one (1) material sample,", "options": ["a.The small samples must be packed in separate sample bags", "b.The small samples must be obtained from different lots", "c.The small samples should of approximately equal size", "d.None of the above"], "answer": "b.The small samples must be obtained from different lots"}, {"q": "2307.Samples of aggregate base course material when tested for quality passed the requirements except grading. What will you recommend as Materials Engineer?", "options": ["a.Reject the material", "b.Replace the material", "c.Accept the material at an adjusted price", "d.Reprocess the material by blending"], "answer": "d.Reprocess the material by blending"}, {"q": "2308.What is the purpose of test piles?", "options": ["a.To determine the required pile length", "b.To determine the cross-sectional area of the pile", "c.To determine the actual number of piles needed", "d.None of the above"], "answer": "a.To determine the required pile length"}, {"q": "2309.Which of the following factors does not affect the strength of concrete cores drilled from the structures?", "options": ["a.Diameter of the core", "b.Length to diameter ratio", "c.Manner of drilling", "d.None of the above"], "answer": "c.Manner of drilling"}, {"q": "2310.The temperature of a 5.0 cu.m. bituminous mix delivered at the project site is 15 degrees Centigrade lower than the required compaction temperature require by the Job-Mix-Formula. As materials engineer of the project, what should you recommend?", "options": ["a.Allow the use of the delivered materials", "b.Advise the contractor to spread the mixture in one layer only", "c.Reject the delivered material", "d.Adjust the delivered material"], "answer": "c.Reject the delivered material"}, {"q": "2311.Test reports on thirteen (13) concrete beam samples indicate that loading was stopped after reaching the required flexural strength of 550 psi. This practice is:", "options": ["a.Improper because test procedure provides that the test should be carried out to failure", "b.Improper because test procedure was stopped without basis", "c.Proper because the strength specification for concrete pavement is 550 psi", "d.Proper because the test should not be carried out to failure since the machine maybe damaged"], "answer": "a.Improper because test procedure provides that the test should be carried out to failure"}, {"q": "2312.Which of the following is true regarding the rebound (Schmidt) hammer test for concrete?", "options": ["a.The test is used to determine the uniformity of concrete", "b.Can be used as a substitute to direct methods of compressive strength determination such as tests on cored samples", "c.Is a simple and versatile test method which can be used even on rough concrete surfaces", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2313.A transit mixer for road construction was found to have a 6\u201d slump of fresh concrete instead of the required 3\u201d. What will you recommend if you are the assigned Materials Engineer?", "options": ["a.Add Portland cement to attain the required 3\u201d slump", "b.Add Portland cement and fine aggregate to attain the required 3\u201d slump", "c.Reject the concrete mixture", "d.Let the concrete mix diverted for pouring on a prepared column for retaining wall of the same project"], "answer": "c.Reject the concrete mixture"}, {"q": "2314.What is the minimum compaction requirement for an embankment?", "options": ["a.80%", "b.90%", "c.95%", "d.100%"], "answer": "c.95%"}, {"q": "2315.What is not the most commonly accepted measure of the hardness of aggregates?", "options": ["a.Soundness test", "b.Los Angeles Abrasion test", "c.Petrographic test", "d.Fractured face test"], "answer": "c.Petrographic test"}, {"q": "2316.A soil compacted dry will reach a certain dry density. If compacted again with the same compactive effort, but this time with water in the soil, the dry density will be higher because:", "options": ["a.The water lubricates the grains and allows them to slide in a denser structure", "b.Air is forced out of the soil", "c.More space is left for the soil solids", "d.All of the above"], "answer": "b.Air is forced out of the soil"}, {"q": "2317.Portland cement is so called because:", "options": ["a.It mainly comes from Portland", "b.It was originally registered as a trade name in the island of Portland", "c.It resembled cement obtained by grinding natural rocks found on the Isle of Portland", "d.None of the above"], "answer": "c.It resembled cement obtained by grinding natural rocks found on the Isle of Portland"}, {"q": "2318.The purpose of capping concrete cylinders prior to testing for compression is to:", "options": ["a.Protect the ends of the cylinder from premature breaking resulting from improper application of load", "b.Provide smooth, flat ends that are perpendicular to the axis of the sample", "c.Prevent cylinder from tilting", "d.To maintain the verticality of the cylinder"], "answer": "b.Provide smooth, flat ends that are perpendicular to the axis of the sample"}, {"q": "2319.The laboratory density of a bituminous mix is 97%. If the density of the newly completed asphalt pavement is 95%, what is the degree of compaction?", "options": ["a.95%", "b.97%", "c.98%", "d.102%"], "answer": "c.98%"}, {"q": "2320.It is the class of concrete used for bedding and after each layer of stone in rubble concrete", "options": ["a.Class A", "b.Class B", "c.Class C", "d.Class D"], "answer": "b.Class B"}, {"q": "2321.The amounts of materials passing the No. 50 and No. 100 sieves are important to concrete aggregates because:", "options": ["a.The minimum amounts of these fine-sand sizes are required to ensure that the surface can be finished easily to an acceptable degree of smoothness", "b.The maximum amounts of these fine-sand sizes are required to ensure that the cement paste is sufficient to cover each particle", "c.An excessive quantity of fines would result in an uneconomical mix", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2322.Unconfined compressive strength test is usually performed on:", "options": ["a.Sandy soils", "b.Silty soils", "c.Organic soils", "d.Clayey soils"], "answer": "d.Clayey soils"}, {"q": "2323.If beam samples taken from a newly paved section failed to meet the strength requirement and it is not advisable to obtain cores from the structure due to structural considerations, as Materials Engineer what will you do if the deficiency in strength of the concrete specimens is 15%?", "options": ["a.Reject the section represented by the failed specimens", "b.Rework the section represented by the failed specimens", "c.Accept the section at an adjusted price due to strength deficiency", "d.Modify the concrete design mix"], "answer": "c.Accept the section at an adjusted price due to strength deficiency"}, {"q": "2324.The improper compaction of an embankment material will, except:", "options": ["a.Minimize compressibility", "b.Decrease soil permeability", "c.Increase shear strength and soil stability", "d.None of the above"], "answer": "d.None of the above"}, {"q": "2325.In concrete pouring, large variations in the concrete cylinder test results were observed. This shall be remedied by:", "options": ["a.Taking the average test result and ensure it is above the specifications requirement", "b.Checking the calibration of the compression machine", "c.Reviewing the mix design, materials quality and aggregate condition in the batching process", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2326.What is the significance of the loss on ignition test of cement?", "options": ["a.It is a measure of the heat generated when cement is mixed with water", "b.It signifies pre-hydration or moisture uptake of cement while it is shelved", "c.It is a measure of the resistance of cement when exposed to fire", "d.None of the above"], "answer": "b.It signifies pre-hydration or moisture uptake of cement while it is shelved"}, {"q": "2327.What test determines the resistance to deformation of a compacted asphalt concrete mix?", "options": ["a.Hardness test", "b.Marshall Stability test", "c.Ductility test", "d.Durability test"], "answer": "b.Marshall Stability test"}, {"q": "2328.What is the minimum test requirement for riprap boulders?", "options": ["a.Stone size and specific gravity", "b.Stone size or weight test and inspection report on assessment of stone soundness", "c.Stone size or weight test and abrasion test", "d.None of the above"], "answer": "a.Stone size and specific gravity"}, {"q": "2329.Consolidation test is usually performed on _____ samples.", "options": ["a.Disturbed", "b.Undisturbed", "c.Consolidated", "d.Both a and b"], "answer": "b.Undisturbed"}, {"q": "2330.Under Item 406, Prestressed Concrete Structures of the DPWH Specifications, post-tensioning of the prestressing reinforcement shall not commence until test on concrete cylinders indicate that the concrete has attained a compressive strength of at least:", "options": ["a.25 MPa", "b.30 MPa", "c.20 MPa", "d.28 MPa"], "answer": "d.28 MPa"}, {"q": "2331.Which of the following is not a type of volume change of concrete?", "options": ["a.Air content*", "b.Temperature changes", "c.Shrinkage", "d.Creep"], "answer": "b.Temperature changes"}, {"q": "2332.Which of the following are generally true in the production of high-strength concrete?", "options": ["a.Coarse aggregates should be obtained from crushed rock to give the best cement/particle bond", "b.Smaller-size aggregates are preferred as more area is available for cement bonding", "c.Admixtures include superplasticizers and retarders", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2333.The following properties of an asphalt mix can be determined in a core sample, except for:", "options": ["a.Index of Retained Strength", "b.Asphalt content", "c.Grading", "d.Specific gravity"], "answer": "a.Index of Retained Strength"}, {"q": "2334.In how many hours should concrete core samples be submerged in water before subjecting them to compression test?", "options": ["a.At least 30", "b.At least 35", "c.At least 40", "d.At least 45"], "answer": "c.At least 40"}, {"q": "2335.A concrete cylinder (6\u201d) fails at 92,000 lb. The compressive strength of the sample is:", "options": ["a.3,225 psi", "b.3,234 psi", "c.3,254 psi", "d.3,265 psi"], "answer": "c.3,254 psi"}, {"q": "2336.In the process of compaction of Item 200 (Aggregate Subbase) which contains sandy material, only 80% density was attained. What is your recommendation order to comply with the 100% minimum degree of compaction?", "options": ["a.Adjust the water content", "b.Place the material in thin layer", "c.Provide additional binder", "d.Use roller with greater compactive"], "answer": "c.Provide additional binder"}, {"q": "2337.The rate of application of emulsified asphalt used as tack coat, should be within the range of:", "options": ["a.0.2 to 0.5 liters/sq.m.", "b.0.2 to 0.7 liters/sq.m.", "c.0.15 to 0.70 liters/sq.m.", "d.1.0 to 2.0 liters/sq.m."], "answer": "b.0.2 to 0.7 liters/sq.m."}, {"q": "2338.The apparent omission of a detailed description or definition concerning the quality of materials from the plains and specifications shall be regarded to mean that:", "options": ["a.Any material can be used", "b.Materials of first class quality are to be used", "c.Materials that are recommended by the contractor can be used", "d.None of the above*"], "answer": "d.None of the above*"}, {"q": "2339.Stability of an asphalt pavement is its ability to resist shoving and rutting under traffic loads. In general, higher stability of the mix can be attained by using:", "options": ["a.More medium size sand", "b.Angular and rough aggregates", "c.More asphalt", "d.b and c"], "answer": "b.Angular and rough aggregates"}, {"q": "2340.The spot test on asphalt is used to determine:", "options": ["a.Overheating during manufacture", "b.Overheating during construction", "c.The amount of spots per unit volume", "d.The amount of spots per unit area"], "answer": "a.Overheating during manufacture"}, {"q": "2341.What is used to measure pavement surface irregularity?", "options": ["a.Falling weight deflectometer equipment", "b.Pendulum apparatus", "c.Dynamic cone penetrometer apparatus", "d.3-meter straight edge*"], "answer": "d.3-meter straight edge*"}, {"q": "2342.Before concrete paving, the base of a roadway should be kept in moist condition and saturated with water for at least:", "options": ["a.2 hrs.", "b.4 hrs.", "c.6 hrs.", "d.8 hrs."], "answer": "c.6 hrs."}, {"q": "2343.The following can be used to help stabilize earth slope except", "options": ["a.Vetiver Grass Hedgerow", "b.Legumes", "c.Grass Cover", "d.Trees"], "answer": "b.Legumes"}, {"q": "2344.The following test can be performed on disturbed samples taken from soil exploration, except for:", "options": ["a.Grading test", "b.Unit weight and quantity of organic matter", "c.Consolidation test*", "d.Liquid and plastic limit tests"], "answer": "c.Consolidation test*"}, {"q": "2345.The workability of a bituminous mix is dependent on the:", "options": ["a.Gradation of aggregates", "b.Temperature of mix", "c.Asphalt content", "d.Shape and texture of aggregates"], "answer": "a.Gradation of aggregates"}, {"q": "2346.In bituminous plant-mix surface course, the temperature of the mix shall have an allowable tolerance of:", "options": ["a.\u00b1 5\u00baC", "b.\u00b1 10\u00baC", "c.\u00b1 15\u00baC", "d.\u00b1 20\u00baC"], "answer": "b.\u00b1 10\u00baC"}, {"q": "2347.The rate of loading of the machine will somehow affect the strength of the materials being test. The rate of loading that must be observed when testing concrete cylinder specimen is:", "options": ["a.20-50 psi/sec", "b.30-60 psi/sec", "c.40-70 psi/sec", "d.50-80 psi/sec"], "answer": "a.20-50 psi/sec"}, {"q": "2348.When the top surface of a concrete specimen is rough and not truly plane, stress concentrations are introduced and the strength of the concrete is reduced by about:", "options": ["a.1/2", "b.1/3", "c.1/4", "d.1/5"], "answer": "d.1/5"}, {"q": "2349.During testing of concrete cylinders in uniaxial compression, what will happen to the result of the test if the rate of loading is rapid (i.e., way above the prescribed rate of loading)?", "options": ["a.Nothing \u2013 rate of loading has no bearing on the result of test", "b.The computed compressive strength will be lower", "c.The computed compressive strength will be higher", "d.The result will depend on the age of the specimen"], "answer": "c.The computed compressive strength will be higher"}, {"q": "2350.Which of the following is authorized to test materials for use in DPWH projects?", "options": ["a.Any DPWH-accredited private testing laboratory", "b.Any testing laboratory of a local government unit with prior clearance from DPWH implementing office", "c.Any DPWH-accredited private testing laboratory, with prior clearance from DPWH implementing office", "d.All of the above"], "answer": "a.Any DPWH-accredited private testing laboratory"}, {"q": "2351.From the following data, determine the degree of compaction.  Field density test data: Weight of material taken from hole = 4.885 Weight of sand to fill hole, kg = 3.885 Volume of hole, cu.m. = 0.0028 Wet unit weight, kg./cu.m. = 1745 Dry unit weight, kg/cu.m. = 1663 Laboratory data: Maximum dry density, kg/cu.m. = 2250 Optimum moisture content, % =8.10", "options": ["a.105", "b.95", "c.78", "d.74"], "answer": "d.74"}, {"q": "2352.ASTM C150 requires that the 28-day strength of mortar made from Type I Portland cements be at least 27.6 MPa. Three specimens were tested: two passed but one failed by more than 20%. What will be your conclusion?", "options": ["a.Discard the failed result and conclude that the particular cement passed the specification", "b.Perform a re-test since the data is inconclusive*", "c.Get the average of the three and if the average is more than 27.6 MPa, conclude that the particular cement passed the specification", "d.Conclude that the cement does not pass the specifications since it failed to give consistent results"], "answer": "b.Perform a re-test since the data is inconclusive*"}, {"q": "2353.Slurry System for Road Surface Treatment of Item 304A is a type of", "options": ["a.Cold asphalt mixture", "b.Hot mix asphalt mixture", "c.Warm mix asphalt", "d.Porous asphalt"], "answer": "a.Cold asphalt mixture"}, {"q": "2354.The fine grained soils in the field can be identified through the use of simple visual and manual tests except", "options": ["a.Dry strength", "b.Plasticity", "c.Water mobility", "d.Dry weight"], "answer": "d.Dry weight"}, {"q": "2355.Liquid Limit is usually:", "options": ["a.Greater than the plastic limit", "b.Equal to the plastic limit", "c.Less than the plastic limit", "d.None of the above"], "answer": "a.Greater than the plastic limit"}, {"q": "2356.The results of the Immersion/Compression test conducted on an asphalt mix sample are as follows: Dry stability= 2,000 kPa Wet stability= 1,000 kPa What is the resulting Index of Retained Strength? Does it meet the specification requirement of Item 310, Bituminous Concrete Surface Course?", "options": ["a.200%, Yes", "b.200%, No", "c.50%, Yes", "d.50%, No"], "answer": "d.50%, No"}, {"q": "2357.Soil sample was subjected to the following procedures at the laboratory: a) compaction at its optimum moisture content; b) application of surcharge (to the sample) to represent the estimated thickness of pavement over the subgrade; c) soaking of the sample for four days; and then d) forcing a plunger into the sample to a depth of 2.5mm. What test was conducted on the soil?", "options": ["a.Abrasion test", "b.Triaxial test", "c.Consolidation test", "d.CBR test"], "answer": "d.CBR test"}, {"q": "2358.How do you obtain the density of soil in the field?", "options": ["a.By weighing the disturbed soil removed and obtaining the volume of hole with sand or with other means", "b.By conducting in-situ CBR in the field", "c.By weighing the remaining soil in the laboratory", "d.By conducting triaxial test in the field"], "answer": "a.By weighing the disturbed soil removed and obtaining the volume of hole with sand or with other means"}, {"q": "2359.Who should take samples of materials and bring them to the laboratory for testing?", "options": ["a.DPWH material engineer", "b.Contractor\u2019s materials engineer", "c.Both DPWH and contractor\u2019s materials engineer", "d.DPWH project engineer"], "answer": "c.Both DPWH and contractor\u2019s materials engineer"}, {"q": "2360.It is essential in soil mechanics work that drying ovens are preset to a temperature of:", "options": ["a.105\u00baC to 110\u00baC", "b.110\u00baC to 220\u00baC", "c.75\u00baC to 105\u00baC", "d.75\u00baC to 110\u00baC"], "answer": "a.105\u00baC to 110\u00baC"}, {"q": "2361.Soil classification is determined by _____.", "options": ["a.Atterberg limit test", "b.Sieve analysis test", "c.Hydrometer test", "d.a and b*"], "answer": "d.a and b*"}, {"q": "2362.It is a type of emulsified asphalt that works better with wet aggregates and in cold weather.", "options": ["a.Anionic emulsion", "b.Cationic emulsion", "c.Liquid asphalt", "d.Cutback asphalt"], "answer": "b.Cationic emulsion"}, {"q": "2363.If the soil is properly compacted or compacted at maximum density, it will:", "options": ["a.Increase stability/strength", "b.Minimize future settlement", "c.Decrease permeability", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2364.Bituminous mixture shall have a minimum dry compression strength of:", "options": ["a.100 psi", "b.200 psi", "c.300 psi", "d.400 psi"], "answer": "b.200 psi"}, {"q": "2365.The following are the measurements (in cm.) of a concrete core taken for thickness determination at Sta. 0+100: 23, 24, 23, 23, 24, 24, 24, 23. Actual measurement of the core at the center is 23 cm. What is the average thickness of the core if the design thickness is 23 cm.", "options": ["a.23.50 cm.", "b.23.44 cm.", "c.23.25 cm.", "d.23.22 cm."], "answer": "d.23.22 cm."}, {"q": "2366.In pavement construction, what is the required density of the bituminous mixtures based on laboratory density of the compacted specimens?", "options": ["a.Equal or greater than 65%", "b.Equal or greater than 75%", "c.Equal or greater than 85%", "d.Equal or greater than 95%"], "answer": "d.Equal or greater than 95%"}, {"q": "2367.In the 2013 Edition of DPWH Standards Specifications for Highways, Bridges and Airports, Item 202 is about", "options": ["a.Lime Stabilized Road Mix Base Course", "b.Portland Cement Road Mix Base", "c.Asphalt Stabilized Road Mix Base Course", "d.Crushed Aggregate Base Course"], "answer": "d.Crushed Aggregate Base Course"}, {"q": "2368.The sand used in the field density test in determining the volume of hole using sand cone method must be clean, dry and passing sieve number:", "options": ["a.30", "b.40", "c.200", "d.10"], "answer": "d.10"}, {"q": "2369.Under what climatic condition(s) do we use the lower penetration grade or hard asphalts?", "options": ["a.Cold climate", "b.Hot climate*", "c.Both cold and hot climate", "d.Rainy weather"], "answer": "b.Hot climate*"}, {"q": "2370.The approval of preliminary samples from the same source shall:", "options": ["a.Be used as basis for acceptance of all materials from the source", "b.Not be considered a guarantee of acceptance of all materials from the source", "c.Be used as basis for payment of the materials", "d.Be used as basis for incorporation of the materials into the works"], "answer": "b.Not be considered a guarantee of acceptance of all materials from the source"}, {"q": "2371.The minimum testing requirement for one quality test of concrete hollow block is _____ units for every 10,000 units.", "options": ["a.3", "b.6", "c.10", "d.12"], "answer": "b.6"}, {"q": "2372.What should be done on the subbase course with existing moisture content of 10% higher than the optimum moisture of the AASHTO T180 Method D?", "options": ["a.Spread to the required loose thickness and compact", "b.Add water, spread to the required loose thickness and compact", "c.Dry out to reduce moisture, spread to the required loose thickness and compact", "d.Spread to the required loose thickness"], "answer": "c.Dry out to reduce moisture, spread to the required loose thickness and compact"}, {"q": "2373.Materials suitable for embankment shall have a plasticity index of not more than:", "options": ["a.12", "b.10", "c.8", "d.6"], "answer": "d.6"}, {"q": "2374.What is the water-cement ratio that will produce the highest strength of concrete?", "options": ["a.0.45", "b.0.48", "c.0.50", "d.0.52"], "answer": "a.0.45"}, {"q": "2375.The shape of a compaction curve in a laboratory compaction test of soil is a:", "options": ["a.Hyperbolic", "b.Parabolic", "c.Semi-circle", "d.Straight line"], "answer": "b.Parabolic"}, {"q": "2376.What penetration grade of asphaltic material is appropriate for scaling of PCCP joints?", "options": ["a.85-100", "b.120-150", "c.150-200", "d.Not exceeding 90"], "answer": "d.Not exceeding 90"}, {"q": "2377.The correctness/effectiveness of all concrete mix design can be checked by conducting a:", "options": ["a.Core test", "b.Trial mix", "c.Strength test", "d.Soundness test"], "answer": "b.Trial mix"}, {"q": "2378.Stone Mastic Asphalt shall be placed at temperature not less than", "options": ["a.107\u00baC", "b.115\u00baC", "c.125\u00baC", "d.135\u00baC"], "answer": "d.135\u00baC"}, {"q": "2379.Given:  Bulk volume of asphalt specimen = 500 cc. Weight of dry specimen in air = 1200 grams Calculate the bulk specific gravity of the asphalt specimen.", "options": ["a.2.40", "b.2.00", "c.1.00", "d.0.40"], "answer": "a.2.40"}, {"q": "2380.When using a nuclear density gauge, which of the following is not a requirement?", "options": ["a.Operator must be licensed", "b.Radiation exposure limits must be specified", "c.Operator must wear thick clothes", "d.Unit must be transported in approves cases"], "answer": "c.Operator must wear thick clothes"}, {"q": "2381.Peat and muck are considered as:", "options": ["a.Suitable soils", "b.Highly organic soils", "c.Highly plastic soils", "d.Colloids"], "answer": "b.Highly organic soils"}, {"q": "2382.Testing of concrete samples may be done at an earlier age for purposes of:", "options": ["a.payment of completed pavement", "b.determining the trend of its strength development", "c.designing the concrete mixture", "d.all of the above"], "answer": "b.determining the trend of its strength development"}, {"q": "2383.The measurement of the thickness of an asphalt core using a caliper is based on:", "options": ["a.4 sides", "b.5 sides", "c.6 sides", "d.9 sides"], "answer": "a.4 sides"}, {"q": "2384.The maximum percentage abrasion loss allowed for paving concrete coarse aggregate is:", "options": ["a.30%", "b.40%", "c.50%", "d.60%"], "answer": "b.40%"}, {"q": "2385.Permit for the procurement of chemicals used for various laboratory testing can be secured from", "options": ["a.BFAD", "b.NAPOLCOM", "c.NBI", "d.PDEA"], "answer": "d.PDEA"}, {"q": "2386.What test determines the resistance to deformation of a compacted asphalt concrete mix?", "options": ["a.Hardness test", "b.Marshall Stability test", "c.Ductility test", "d.Durability test"], "answer": "b.Marshall Stability test"}, {"q": "2387.The aggregate component contributes internal friction to shear strength and stability of the bituminous mixture. The desirable shape and surface texture of aggregate particles are:", "options": ["a.Round and smooth aggregate particles", "b.Angular and smooth aggregate particles", "c.Round and rough-textures particles", "d.Angular and rough-textured particles"], "answer": "d.Angular and rough-textured particles"}, {"q": "2388.In hot climate under sustained loading, asphalt cements behave like:", "options": ["a.Viscous liquids", "b.Viscous solids", "c.Elastic solids", "d.Soft solids"], "answer": "a.Viscous liquids"}, {"q": "2389.This is a test criterion for reinforced concrete pipe tested in a three-edge bearing test.", "options": ["a.0.3 mm crack", "b.0.4 mm crack", "c.0.5 mm crack", "d.0.6 mm crack"], "answer": "a.0.3 mm crack"}, {"q": "2390.Concrete curing refers to:", "options": ["a.procedures done to repair damages in concrete surface", "b.procedures done to promote cement hydration*", "c.procedures done to maximize concrete strength", "d.procedures done to minimize concrete cracking"], "answer": "b.procedures done to promote cement hydration*"}, {"q": "2391.The temperature of concrete during the period of mixing while in transport and/or during placing shall not be permitted to rise above", "options": ["a.25\u00baC", "b.40\u00baC", "c.36\u00baC", "d.50\u00baC"], "answer": "c.36\u00baC"}, {"q": "2392.As construction work progresses, you noticed that the materials delivered at the project site are different from the ones tested and that passed the requirements. As materials engineer, what would you do?", "options": ["a.Authorize the use of the materials", "b.Conduct immediate retesting of the materials for verification purposes", "c.Reject the materials", "d.Replace the materials"], "answer": "b.Conduct immediate retesting of the materials for verification purposes"}, {"q": "2393.The pH value of water suitable for concrete construction shall generally be between:", "options": ["a.4 and 6", "b.6 and 8", "c.8 and 10", "d.10 and 12"], "answer": "b.6 and 8"}, {"q": "2394.Which is not a type PCCP distress", "options": ["a.Scaling", "b.Crazing", "c.Ravelling", "d.Pockmarks"], "answer": "c.Ravelling"}, {"q": "2395.In concrete, rich mix means", "options": ["a.More water in the mix", "b.More aggregates in the mix", "c.More cement in the mix", "d.Higher water-cement ratio"], "answer": "c.More cement in the mix"}, {"q": "2396.Following are the results obtained from field density and laboratory compaction tests Weight of dry soil = 80 grams Weight of water in the soil sample = 16 grams Wet density of soilb = 1.92 grams per cc. Maximum dry density obtained from laboratory compaction = 1.68 grams/cc Using the above data, the moisture content of the soil is:", "options": ["a.15%", "b.20%", "c.25%", "d.30%"], "answer": "b.20%"}, {"q": "2397.What is the function of emulsifiers in liquid asphalt?", "options": ["a.To increase mixing ability with aggregates", "b.To retain water in asphalt for longer periods", "c.To prevent asphalt from hardening", "d.To enable asphalt and water to mix"], "answer": "d.To enable asphalt and water to mix"}, {"q": "2398.When the result of the second test differs from that of the first test on a sample representing the same lot of materials, a third test is done. This is referred to as:", "options": ["a.Tertiary test", "b.Verdict test", "c.Referee test", "d.Final test"], "answer": "c.Referee test"}, {"q": "2399.Which of the following is not part of the Marshall Method for preparing and evaluating trial mixes", "options": ["a.Aggregates are blended in proportion meeting the specifications", "b.The mixing and compacting temperature for the asphalt cement to be used  are obtained from the temperature-viscosity graph", "c.Density of the molded sample is measured to be able to calculate the void properties", "d.Trial mixes are conducted using various ranges of asphalt content to determine the physical properties of the samples"], "answer": "b.The mixing and compacting temperature for the asphalt cement to be used  are obtained from the temperature-viscosity graph"}, {"q": "2400.What is the permitted variation from design thickness of a layer of aggregate subbase course?", "options": ["a.Plus or minus 20mm", "b.Plus or minus 10mm", "c.Plus or minus 150mm", "d.Plus or minus 30"], "answer": "a.Plus or minus 20mm"}, {"q": "2401.Given:  Weight of dry aggregates = 950 grams Weight of asphalt =   50 grams What is the percent of asphalt by weight of total mix?", "options": ["a.5%", "b.5.26%", "c.5.55%", "d.6%"], "answer": "a.5%"}, {"q": "2402.What is the significance of the loss in ignition of cement?", "options": ["a.It is a measure of the heat generated when cement is mixed with water", "b.It signifies pre-hydration or moisture uptake of cement while it is shelved", "c.It is a measure of the resistance of cement when exposed to fire", "d.None of the above"], "answer": "b.It signifies pre-hydration or moisture uptake of cement while it is shelved"}, {"q": "2403.As percent asphalt increases in Marshall Stability test, the air voids:", "options": ["a.Increases", "b.Decreases", "c.Remains constant", "d.Either a or b"], "answer": "b.Decreases"}, {"q": "2404.Soil properties can be improved by:", "options": ["a.Adequate compaction", "b.Addition of binder", "c.Maximizing water content", "d.Stabilization"], "answer": "d.Stabilization"}, {"q": "2405.Bituminous mixture shall have a minimum dry compressive strength of:", "options": ["a.100 psi", "b.200 psi", "c.300 psi", "d.400 psi"], "answer": "b.200 psi"}, {"q": "2406.Too wet mix, oversanded mix and overworking of concrete during placing usually result in ______ of concrete pavement.", "options": ["a.Cracking", "b.Ravelling", "c.Settlement", "d.Scaling"], "answer": "d.Scaling"}, {"q": "2407.Department Order No. 47, series of 2015 requires an International Row Index (IRI) values of not more than _____ for both asphalt and pavements for National Primary Roads.", "options": ["a.2.00 m/km", "b.2.50 m/km", "c.3.00 m/km", "d.3.50 m/km"], "answer": "c.3.00 m/km"}, {"q": "2408.The maximum compacted thickness per layer for both aggregate subbase and base courses (Item 200 and 201) is _____.", "options": ["a.125 mm", "b.150 mm", "c.175 mm", "d.200 mm"], "answer": "d.200 mm"}, {"q": "2409.During asphalt compaction, the rolling speed, whether being used in the vibratory or static mode, should not exceed _____ km/hr.", "options": ["a.4-7 km/hr.", "b.5-8 km/hr.", "c.6-9 km/hr.", "d.7-10 km/hr."], "answer": "a.4-7 km/hr."}, {"q": "2410.Which is not included in the three phases of rolling operations in asphalt pavement?", "options": ["a.Breakdown rolling", "b.Primary rolling", "c.Intermediate rolling", "d.Final rolling"], "answer": "b.Primary rolling"}, {"q": "2411.Under D.O. 98, series 2016, Revised Guidelines on the Accreditation of Contractors\u2019/Consultants\u2019 Materials Engineers, which is not true in the Limits of Assignment of accredited Materials Engineers.", "options": ["a.Non-Accredited Materials Engineer - Three (3) projects with an aggregate cost of not more than P15M", "b.Materials Engineer I\t- Two (2) projects with an aggregate cost of not more than P200M", "c.Materials Engineer II - Two (2) projects with an aggregate cost of not more than P300M", "d.Materials Engineer II - Three (3) projects with an aggregate cost of not more than P250M"], "answer": "b.Materials Engineer I\t- Two (2) projects with an aggregate cost of not more than P200M"}, {"q": "2412.Slump test is the measure of work ability of concrete mixture. Which is not the type of concrete slump?", "options": ["a.Shear slump", "b.Collapse slump", "c.True slump", "d.False slump"], "answer": "d.False slump"}, {"q": "2413.The selection by a standard method of a representative portion of a material for the purpose of ascertaining its characteristics is called:", "options": ["a.Batching", "b.Sampling", "c.Quarrying", "d.Quartering"], "answer": "b.Sampling"}, {"q": "2414.From the following data, determine the degree of compaction. Field density test data: Weight of material taken from hole = 4.885 Weight of sand to fill hole, kg. = 3.885 Volume of hole, cu.m. = 0.0028 Wet unit weight, kg/cu.m. = 1745 Dry unit weight, kg/cu.m. = 1663 Laboratory data: Maximum dry density, kg/cu.m. = 2250 Optimum moisture content, % = 8.10", "options": ["a.74", "b.78", "c.95", "d.105"], "answer": "a.74"}, {"q": "2415.Concrete samples shall be shipped to the laboratory at least _____ hours prior to testing.", "options": ["a.12", "b.24", "c.36", "d.48"], "answer": "b.24"}, {"q": "2416.When the top surface of a concrete specimen is rough and not truly plane, stress concentrations are introduced and the strength of the concrete is reduced by about:", "options": ["a.1/2", "b.1/3", "c.1/4", "d.1/5"], "answer": "d.1/5"}, {"q": "2417.The sieving process (grain-size) does not provide information on:", "options": ["a.Shape of the soil grains", "b.Distribution of the grain sizes", "c.Soil classification", "d.Both b and c"], "answer": "c.Soil classification"}, {"q": "2418.Under what climatic condition(s) do we use the higher penetration grade or soft asphalts?", "options": ["a.Cold climate", "b.Hot climate", "c.Both cold and hot climate", "d.Rainy weather"], "answer": "a.Cold climate"}, {"q": "2419.Why are undisturbed samples used primarily for determining the properties of foundation materials?", "options": ["a.To retain the structure of material", "b.Because it is easier to obtain undisturbed sample than disturbed sample", "c.Because it is easier to test undisturbed samples than disturbed samples", "d.Because it represents the relative strength of the soil strata when subjected to compression test"], "answer": "d.Because it represents the relative strength of the soil strata when subjected to compression test"}, {"q": "2420.For efficient compaction, the embankment materials should at the time of rolling be:", "options": ["a.Dry", "b.Wet", "c.At optimum moisture content", "d.At maximum moisture content"], "answer": "c.At optimum moisture content"}, {"q": "2421.The best way to determine the temperature of the delivered asphalt mix is with a dial and armored stem thermometer. The stem should be inserted sufficiently into the mixture to a depth of at least:", "options": ["a.2 inches", "b.4 inches", "c.6 inches", "d.8 inches"], "answer": "c.6 inches"}, {"q": "2422.Which of the following provisions is not included in the job-mix formula?", "options": ["a.Mixing time", "b.Grading of aggregates", "c.Asphalt content", "d.Temperature at delivery"], "answer": "a.Mixing time"}, {"q": "2423.Suppose you have a sack of aggregate sample weighing 20 kg. But you only need 5 kg. for a certain test. In the absence of sample splitter, what will be the best way to get a 5 kilograms sample?", "options": ["a.Get a 5kg. sample from the middle of the sack", "b.Remove the aggregate from the sack and lay it a pile on a clean floor then get the 5kg. sample from the middle of the pile", "c.Perform the quartering procedure", "d.Get a 5kg. sample direct from the sack"], "answer": "c.Perform the quartering procedure"}, {"q": "2424.As materials engineer, when is the right time to start sampling and testing of aggregate base course material?", "options": ["a.Once the material is delivered and stockpiled", "b.As construction work progresses", "c.Once the source is identified", "d.After the material was incorporated into the work"], "answer": "c.Once the source is identified"}, {"q": "2425.Penetration test for asphalt: cement is a measure of:", "options": ["a.Consistency", "b.Solubility", "c.Ductility", "d.Fluidity"], "answer": "a.Consistency"}, {"q": "2426.Whch of the following is the thinnest and most fluid grade of medium curing cutback asphalt?", "options": ["a.MC-30", "b.MC-70", "c.MC-250", "d.MC-800"], "answer": "a.MC-30"}, {"q": "2427.What differentiates the composition of Item 201 \u2013 Aggregate Base Course from Item 200-Aggregate Subbase Course?", "options": ["a.Item 201 contains less binder and smaller size of gravel than Item 200", "b.Item 201 contains more binder and bigger size of gravel than Item 200", "c.Item 201 contains sand and gravel only", "d.Item 201 contains sand and fine-grained soils only"], "answer": "a.Item 201 contains less binder and smaller size of gravel than Item 200"}, {"q": "2428.If the bulk specific gravity of a bituminous mix is 2.243 and the dry stability is 3,100 lbs., what will be the approximate wet stability if its Index of Retained Strength (IRS) is 82%?", "options": ["a.2,542 lbs.", "b.3,780 lbs.", "c.5,702 lbs.", "d.6,953 lbs."], "answer": "a.2,542 lbs."}, {"q": "2429.Generally, acceptance of concrete pavement is based upon:", "options": ["a.Cores", "b.Beam samples", "c.Both a and b", "d.Either a or b"], "answer": "c.Both a and b"}, {"q": "2430.Specimens for compressive or flexural strength tests shall be removed from the molds at the end of 24 hours and stored in a moist condition at a temperature range of _________ until the time of test.", "options": ["a.24\u00baC to 28\u00baC", "b.22\u00baC to 26\u00baC", "c.20\u00baC to 24\u00baC", "d.18\u00baC to 22\u00baC"], "answer": "c.20\u00baC to 24\u00baC"}, {"q": "2431.Undersized reinforcing steel bars that satisfy the tensile and elongation requirements may be accepted provided that its underweight does not exceed:", "options": ["a.3%", "b.5%", "c.6%", "d.10%"], "answer": "c.6%"}, {"q": "2432.In how many equal layers should a concrete beam sample be molded?", "options": ["a.2", "b.3", "c.4", "d.5"], "answer": "a.2"}, {"q": "2433.Given: Asphalt content of bituminous mix = 5.5% Weight of specimen in air =\t1200 grams Weight of specimen in water = 700 grams Weight of specimen in SSD = 1205 grams Calculate the bulk specific gravity of the asphalt specimen.", "options": ["a.1.714", "b.1.721", "c.1.576", "d.2.376"], "answer": "d.2.376"}, {"q": "2434.What will possibly be the result of using different brands of cement in concrete paving?", "options": ["a.Different strength", "b.Different texture", "c.Different color after it has hardened", "d.No effect"], "answer": "c.Different color after it has hardened"}, {"q": "2435.Retarders are more useful during:", "options": ["a.Cold weather", "b.Hot weather", "c.Freezing weather", "d.Warm weather"], "answer": "b.Hot weather"}, {"q": "2436.A transit mixer for road construction was found to have a 6\u201d slump of fresh concrete instead of the required 3\u201d. What will you recommend if you are the assigned Materials Engineer?", "options": ["a.Add Portland cement to attain the required 3\u201d slump", "b.Add Portland cement and fine aggregate to attain the required 3\u201dslump", "c.Reject the concrete mixture", "d.Let the concrete mix diverted for pouring on a prepared column for retaining wall of the same project"], "answer": "c.Reject the concrete mixture"}, {"q": "2437.Quality of factory-produced reinforced concrete pipes may be best established through:", "options": ["a.Engineer\u2019s certification", "b.Inspection report", "c.Test of concrete cylinder samples", "d.Test of concrete pipe samples"], "answer": "d.Test of concrete pipe samples"}, {"q": "2438.Specimens for compressive or flexural strength tests shall be removed from the molds at the end of _____ hours and stored in a moist condition until the time of test.", "options": ["a.12", "b.24", "c.36", "d.48"], "answer": "b.24"}, {"q": "2439.A one lane with pavement width of 3.5 meters and shoulder width of 0.5 meter on each side of the pavement, was designed to have subbase and base courses with a combined thickness of 300mm. If the thickness of the subbase  is 125 mm, the spreading and compaction of the subbase and base coarses shall be carried out in:", "options": ["a.3 layers over the full width of 4.5m", "b.2 layers over the full width of 4.5m", "c.3 layers over the full width of 3.5m", "d.2 layers over the full width of 3.5m"], "answer": "b.2 layers over the full width of 4.5m"}, {"q": "2440.When the strength test results of concrete beam samples are not acceptable, how many representative core/s shall be taken from each member or area of concrete in-place considered deficient in the newly completed concrete pavement?", "options": ["a.At least 4 cores", "b.At least 3 cores", "c.At least 2 cores", "d.Only 1 core"], "answer": "b.At least 3 cores"}, {"q": "2441.The purpose of conducting laboratory CBR test on the fill materials for embankment is to check:", "options": ["a.Permeability of the compacted subgrade material", "b.Swelling characteristics of the subgrade material", "c.Bearing capacity of subgrade material", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2442.The workability of a bituminous mix is dependent on the:", "options": ["a.Graduation of aggregates", "b.Temperature of mix", "c.Asphalt content", "d.Shape and texture of aggregates"], "answer": "b.Temperature of mix"}, {"q": "2443.A mixture of asphalt cement and water with catalytic agent is called:", "options": ["a.Joint filler", "b.Temperature asphalt", "c.Emulsified Asphalt", "d.Asphalt cement"], "answer": "c.Emulsified Asphalt"}, {"q": "2444.ASTM C-150 requires that the 28-day strength of mortar made from Type 1 Portland Cements be at least 27.6 MPa. Three specimens were tested: two passed but one failed by more than 20%. As Materials Engineer, what will be your conclusion?", "options": ["a.Discard the failed result and conclude that the particular cement passed the specification", "b.Perform a re-test since the data is inclusive", "c.Get the average of the three and if the average is more than 27.6MPa, conclude that the particular cement passed the specification", "d.Conclude that the cement did not pass the specification since it failed to give consistent results"], "answer": "b.Perform a re-test since the data is inclusive"}, {"q": "2445.The required strength of a concrete beam sample is at least _____ when tested by mid-point method:", "options": ["a.550 psi", "b.650 psi", "c.3,000 psi", "d.3,500 psi"], "answer": "b.650 psi"}, {"q": "2446.What documentation should be maintained and kept updated by the materials engineer during project implementation?", "options": ["a.Minimum testing requirements", "b.Materials logbook", "c.Quality control handbook", "d.Materials test result"], "answer": "b.Materials logbook"}, {"q": "2447.The actual strength of concrete in-place in an area represented by failed beam samples can be determined by means of:", "options": ["a.Slump test", "b.Core test", "c.Stability test", "d.Extraction test"], "answer": "b.Core test"}, {"q": "2448.In slip-form construction, what is the slump of concrete used?", "options": ["a.Not more than 3 inches", "b.3 to 4 inches", "c.Almost zero", "d.Any of the above"], "answer": "c.Almost zero"}, {"q": "2449.From the materials point of view, subgrade construction consists mainly of:", "options": ["a.Compaction of the top of layer in cuts", "b.Compaction of the whole depth of material in embankments", "c.Identification and treatment of unsuitable material", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2450.What penetration grade of asphaltic material is appropriate for sealing of PCCP joints?", "options": ["a.85-100", "b.120-150", "c.150-200", "d.Not exceeding 90"], "answer": "d.Not exceeding 90"}, {"q": "2451.A set of three (3) beam samples representing a particular section of the concrete pavement failed to meet the flexural strength requirement. As materials engineer, what would you recommend?", "options": ["a.Monitor the pavement section with strength deficiency", "b.Adjust payment corresponding to the strength deficiency of the beam samples", "c.Conduct core test for strength determination on section represented by the failed samples to determine the actual strength of the in-placed concrete", "d.Submit new beam samples for testing"], "answer": "c.Conduct core test for strength determination on section represented by the failed samples to determine the actual strength of the in-placed concrete"}, {"q": "2452.Where do we take additional cores when the measurement of any core taken from the pavement is deficient in thickness by more than 25mm?", "options": ["a.At no less than 20 meter intervals parallel to the centerline in each direction from the affected location", "b.At no less than 15 meter intervals parallel to the centerline in each direction from the affected location", "c.At no less than 10 meter intervals parallel to the centerline in each direction from the affected location", "d.At no less than 5 meter intervals parallel to the centerline in each direction from the affected location"], "answer": "d.At no less than 5 meter intervals parallel to the centerline in each direction from the affected location"}, {"q": "2453.The asphalt material that is usually classified by its penetration grade is:", "options": ["a.Joint filler", "b.Emulsified asphalt", "c.Cutback asphalt", "d.Asphalt cement"], "answer": "d.Asphalt cement"}, {"q": "2454.The mortar proportion of stone masonry shall be:", "options": ["a.One part cement, 2 parts sand", "b.One part cement, 3 parts sand", "c.One part cement, 4 parts sand", "d.One part cement, 1 part sand"], "answer": "a.One part cement, 2 parts sand"}, {"q": "2455.How many pipes should be tested for strength, absorption and dimension in 300 pieces of reinforced culvert pipe?", "options": ["a.One", "b.Two", "c.Four", "d.Six"], "answer": "d.Six"}, {"q": "2456.The moisture-density curve is different for each soil. Which of the following statements is/are true?", "options": ["a.Granular, well-graded soils generally have fairly high maximum densities at low optimum moisture content (OMC)", "b.Clay soils have lower densities at OMC than granular, well-graded soils", "c.Granular, well-graded soils have higher densities than uniform soils at OMC", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2457.Embankment materials are classified as unsuitable materials if:", "options": ["a.The natural moisture content is 50%", "b.The liquid limit is 40%", "c.The plasticity index is 60", "d.The natural density is 1200 kilogram per cubic meter"], "answer": "c.The plasticity index is 60"}, {"q": "2458.The test which combines a load-deformation test performed in the laboratory with an empirical design chart to determine the thickness of pavement base and other layers is known as:", "options": ["a.Plate Bearing Test", "b.Moisture-Density Determination", "c.California Bearing Ratio", "d.Standard Penetration Test"], "answer": "c.California Bearing Ratio"}, {"q": "2459.If one of the measurements of a core specimen taken from a concrete pavement is 28.7 cm., what is the corrected measurement to be used in calculating the average thickness of the pavement if the design thickness is 28.0 cm?", "options": ["a.28.7 cm.", "b.28.0 cm.", "c.28.5 cm.", "d.29.0 cm."], "answer": "c.28.5 cm."}, {"q": "2460.Which of the following bituminous material is best recommended for sealing weakened plane joints?", "options": ["a.Asphalt Cement", "b.Emulsified Asphalt", "c.Cutback Asphalt", "d.Joint Filler Asphalt"], "answer": "d.Joint Filler Asphalt"}, {"q": "2461.The test to indicate the temperature wherein asphalt can be heated without catching fire is called:", "options": ["a.Loss on heating", "b.Spot test", "c.Flash point", "d.Penetration test"], "answer": "c.Flash point"}, {"q": "2462.It is a single test procedure to determine the suitability of an asphaltic concrete mix.", "options": ["a.Penetration", "b.Extraction", "c.Marshall Stability", "d.Immersion-Compression"], "answer": "c.Marshall Stability"}, {"q": "2463.The moisture-density curve is different for each soil. Which of the following statements is/are true?", "options": ["a.Granular, well-graded soils generally have fairly high maximum densities at low optimum moisture content (OMC)", "b.Clay soils have lower densities at OMC than granular, well-graded soils", "c.Granular, well-graded soils have higher densities than uniform soils at OMC", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2464.What is the frequency of core sampling required on a completed bituminous pavement?", "options": ["a.Every 100 linear meters per lane", "b.Every 200 linear meters per lane", "c.Every 300 linear meters per lane", "d.Every 500 linear meters per lane"], "answer": "a.Every 100 linear meters per lane"}, {"q": "2465.Quality control testing in a DPWH project is the responsibility of the:", "options": ["a.DPWH", "b.Contractor", "c.DPWH and Contractor", "d.Construction supervision consultant"], "answer": "b.Contractor"}, {"q": "2466.What chemical admixture is needed to produce a concrete mix with improved slump without additional water?", "options": ["a.Set accelerating admixture", "b.Set retarding admixture", "c.Water reducing admixture", "d.Fly ash"], "answer": "c.Water reducing admixture"}, {"q": "2467.Samples of aggregate base course material when tested for quality passed the requirements except grading. What will you recommend as Materials Engineer?", "options": ["a.Reject the material", "b.Replace the material", "c.Accept the material at an adjusted price", "d.Reprocess the material by blending"], "answer": "d.Reprocess the material by blending"}, {"q": "2468.Three cores taken from a pavement section poured on a single day were tested to have strengths as follows: Core Strength (psi) 1\t3650 2\t3000 (86% of 3500 psi) 3\t2450 (70% of 3500 psi) Average\t3033 (87% of 3500 psi) If the required strength is 3500 psi, concrete in the area represented by these cores:", "options": ["a.Maybe accepted, subject to price adjustment", "b.Is considered adequate", "c.Is considered inadequate", "d.May be record, at the initiative of the DPWH"], "answer": "c.Is considered inadequate"}, {"q": "2469.What is the minimum soaked CBR value required for base materials obtained at the maximum dry density determined by AASHTO T180 Method D?", "options": ["a.25", "b.50", "c.75", "d.80"], "answer": "d.80"}, {"q": "2470.An admixture that tends to reduce incidence of thermal cracking and to maintain concrete workability during large pours or long ready-mix hauls is a/an:", "options": ["a.Water-reducing admixture", "b.Retarding water-reducing admixture", "c.Air-entraining admixture", "d.Accelerating admixture"], "answer": "b.Retarding water-reducing admixture"}, {"q": "2471.Which of the following is the frequency of sampling of concrete beams required by DPWH specification?", "options": ["a.At least one set of 3 concrete beams every 50 cu.m. or fraction thereof", "b.At least one set of 3 concrete beams every 500 cu.m. or fraction thereof", "c.At least one set of 3 concrete beams every 75 cu.m. or fraction thereof", "d.At least one set of 3 concrete beams every 750 cu.m. or fraction thereof"], "answer": "c.At least one set of 3 concrete beams every 75 cu.m. or fraction thereof"}, {"q": "2472.What is the function of emulsifiers in liquid asphalt?", "options": ["a.To increase mixing ability with aggregates", "b.To retain water in asphalt for longer periods", "c.To prevent asphalt from hardening", "d.To enable asphalt and water to mix"], "answer": "d.To enable asphalt and water to mix"}, {"q": "2473.Cutback asphalt or emulsified asphalt is usually used for:", "options": ["a.Prime coating", "b.Tack coating", "c.Seal coating", "d.Either a or b"], "answer": "b.Tack coating"}, {"q": "2474.The index of retained strength of the compacted bituminous mixtures is the ratio of the compressive strength of immersed and dry bituminous mixtures. What is the minimum index of retained strength required for bituminous mixtures?", "options": ["a.40%", "b.50%", "c.60%", "d.70%"], "answer": "d.70%"}, {"q": "2475.The main problem associated with wrong practice of conveying concrete is called:", "options": ["a.Honeycomb", "b.Laitance", "c.Segregation", "d.Cracking"], "answer": "c.Segregation"}, {"q": "2476.The smaller the value of the fineness modulus the:", "options": ["a.Coarser the material", "b.Finer the material", "c.The lighter the material", "d.The drier the material"], "answer": "b.Finer the material"}, {"q": "2477.The specifications call for a 1:2:4 concrete mix. In a one bagger mixer, which of the following amount of water is most likely required for the mix?", "options": ["a.20 liters", "b.5 liters", "c.10 liters", "d.35 liters"], "answer": "a.20 liters"}, {"q": "2478.Compaction trials on embankment and base/subbase courses are carried cut to determine the:", "options": ["a.Suitable type of compaction equipment to be used", "b.Number of roller passes required", "c.Suitability of the materials", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2479.The optimum moisture content of soil is determined during:", "options": ["a.Laboratory compaction", "b.Compaction of a trial section", "c.Field compaction test", "d.Any of the above"], "answer": "a.Laboratory compaction"}, {"q": "2480.Test pitting conducted on a prepared base showed that the thickness of Item 201 (Aggregate Base Course) was deficient by 5 cm. As Materials Engineer, what will you recommend?", "options": ["a.Reject the prepared section", "b.Rework the section", "c.Accept the section at an adjusted price due to thickness deficiency", "d.Provide sand cushion to attain the thickness requirement"], "answer": "b.Rework the section"}, {"q": "2481.When taking three or more samples of aggregates to be combines for one material sample:", "options": ["a.The small samples must be packed in separate sample bags", "b.The small samples must be obtained from different lots*", "c.The small samples should be of approximately equal size", "d.None of the above"], "answer": "b.The small samples must be obtained from different lots*"}, {"q": "2482.A concrete core specimen for thickness determination shall have a diameter of at least:", "options": ["a.75mm", "b.100mm", "c.125mm", "d.150mm"], "answer": "b.100mm"}, {"q": "2483.If two concrete cylinder A and B are tested in uniaxial compression, and if cylinder A is completely saturated while cylinder B is dry, which of the following is true?", "options": ["a.Both cylinders will yield the same compressive strength provided that all other factors are the same", "b.Whether cylinder A will yield a higher compressive strength over cylinder B ( or cylinder B over cylinder A) is unpredictable", "c.Cylinder A will yield a higher compressi st not exceed _____ of the bars, except were shown on Plans.", "options": ["a.1/3", "b.2/3", "c.\u00bd", "d.\u00be"], "answer": "a.1/3"}, {"q": "2572.In Metal Structures, the minimum number of rivets/bolts for testing purposes is _____.", "options": ["a.2 pcs", "b.3 pcs", "c.4 pcs", "d.5 pcs"], "answer": "d.5 pcs"}, {"q": "2573._____ is a common timber preservative but not intended for marine use.", "options": ["a.Copper Azole (CuAz)", "b.Light Organic Solvent Preservative (LOSP)", "c.Creosote Oil", "d.None of the above"], "answer": "c.Creosote Oil"}, {"q": "2574._____ is an important part of bridge whose main function is to transfer loads or accommodate relative movement between the superstructure and its supporting structure or both while avoiding damaging strain and additional tension.", "options": ["a.Rubber Filler", "b.Base Plates", "c.Elastomeric Bearing Pads", "d.Metal Shoe"], "answer": "c.Elastomeric Bearing Pads"}, {"q": "2575.How many Elastomeric Bearing Pads shall be taken from a lot to be subjected to testing?", "options": ["a.Three", "b.Four", "c.Five", "d.Six"], "answer": "a.Three"}, {"q": "2576.The proper compaction of an embankment material will result to?", "options": ["a.Minimize compressibility", "b.Decrease soil permeability", "c.Increase shear strength and soil stability", "d.All of the above"], "answer": "d.All of the above"}, {"q": "2577.Fibers used in the manufacture of geotextiles, and the threads used in joining geotextiles by sewing, shall consist of long chain synthetic polymers, composed at least _____ by mass polyolefins, polyesters, or polyamids.", "options": ["a.75%", "b.85%", "c.45%", "d.95%"], "answer": "b.85%"}, {"q": "2578.These are permeable fabrics which, when used in association with soil, have the ability to separate, filter, reinforce, protect, or drain.", "options": ["a.Welded Wire Fabric", "b.Rip Rap", "c.Geotextiles", "d.Slope protection"], "answer": "c.Geotextiles"}, {"q": "2579.These are materials used on road signs whic pment (Rollers) to attain the required density of embankment?", "options": ["a.Conduct in-situ sampling to determine the Maximum Dry Density (MDD)", "b.Conduct a minimum 500 square meters trial section", "c.Use nuclear gauge equipment to determine the density", "d.All of the above"], "answer": "b.Conduct a minimum 500 square meters trial section"}, {"q": "2598.The required number of samples for testing Non-Reinforced Concrete pipe shall be:", "options": ["a.1 pipe per 50 pipes", "b.1 pipe per 100 pipes", "c.1 pipe per 200 pipes", "d.None of the above"], "answer": "d.None of the above"}, {"q": "2599.For Item 512 Erosion Control Mats, the maximum moisture content of straw mats, and coconut mats?", "options": ["a.10 percent", "b.15 percent", "c.20 percent", "d.25 percent"], "answer": "c.20 percent"}, {"q": "2600.The minimum Tensile stress for Item 416A Carbon Fiber Plate pull-off test is?", "options": ["a.1.279 MPa", "b.1.379 MPa", "c.1.479 MPa", "d.None of the above"], "answer": "b.1.379 MPa"}, {"q": "2701.What is the layer thickness of each shotcrete application be limited to?", "options": ["a. 75 mm", "b. 40 mm", "c. 25 mm", "d. 50 mm"], "answer": "d. 50 mm"}, {"q": "2702. The rate of application of emulsified asphalt used as tack coat, should be within the range of.", "options": ["a. 0.2 to 0.7 liters/m\u00b2", "b. 0.2 to 1.0 liters/m\u00b2", "c. 0.5 to 2.0 liters/m\u00b2", "d. 1.0 to 2.0 liters/m\u00b2"], "answer": "a. 0.2 to 0.7 liters/m\u00b2"}, {"q": "2703. The main problem associated with wrong practice of conveying/depositing concrete is called _______.", "options": ["a. Segregation", "b. Honeycomb", "c. Laitance", "d. Cracking"], "answer": "a. Segregation"}, {"q": "2704. Three cores taken from a pavement section poured on a single day were tested to have strength as follows: core strength (psi) 1 ------------ 3720 2 ------------ 3150 (90% of 3500 psi) 3 ------------ 2500 (71% of 3500 psi) average ------ 3123 (89% of 3500 psi) If the required strength is 3500 called:", "options": ["a. Permeability", "b. Stability", "c. Workability", "d. Ductility"], "answer": "a. Permeability"}, {"q": "2980. A sample of steel bar tested for quality passed the minimum yield strength but failed in minimum elongation to bar diameter after rupture and minimum modulus of elasticity. As material engineer what will you recommend?", "options": ["a. Reject the material", "b. Accept the material without payment", "c. Retest the material", "d. Accept the material at an adjusted price"], "answer": "c. Retest the material"}, {"q": "2981. If the concrete pipes are fabricated in projects located in remote areas and it is impractical to send samples to DPWH testing Laboratory or any private testing laboratory for testing, what would you do if you are the material engineer?", "options": ["a. Submit field inspection report", "b. Submit a mill certificate", "c. Submit test results on concrete cylinder samples", "d. a and c"], "answer": "d. a and c"}, {"q": "2982. Core test for concrete pavement thickness determination showed that three ( 3 ) out of nine (9) samples taken failed to meet the thickness requirement. The deficiency in the average thickness of the core is more than 5 mm. What will you do as Materials Engineer?", "options": ["a. Reject the area represented by the failed core sample", "b. Remove and replace the area represented by the failed core sample", "c. Accept the section at an adjusted price due to thickness", "d. Increase the thickness of the pavement"], "answer": "c. Accept the section at an adjusted price due to thickness"}, {"q": "2983. The sand used in the field density test in determining the volume of hole using sand cone method must be clean, dry and passing sieve number:", "options": ["a. 30", "b. 40", "c. 200", "d. 10"], "answer": "d. 10"}, {"q": "2984. Slurry seal, micro-surfacing or Slurry Surface Treatment (SST) shall not be applied if either the pavement or air temperature is below _____ degree Celsius.", "options": ["a. 25", "b. 20", "c. 15", "d. 10"], "answer": "d. 10"}, {"q": "2985. The use of thickness determination for asphalt pavement is:", "options": ["a. 75 mm", "b. 100 mm", "c. 150 mm", "d. 200 mm"], "answer": "b. 100 mm"}, {"q": "2986. When the result of the second test differs from that of the first tests on a sample representing the same lot of materials, a third test is done. This is referred to as:", "options": ["a. Tertiary test", "b. Verdict test", "c. Referee test", "d. Final test"], "answer": "c. Referee test"}, {"q": "2987. This relationship chart determines the mixing and compacting temperature of the asphalt mix.", "options": ["a. Penetration Temperature", "b. Viscosity Temperature", "c. Blown Temperature", "d. Moisture mineral aggregate"], "answer": "b. Viscosity Temperature"}, {"q": "2988. In determining the Optimum Asphalt content which criteria does not belong in the group?", "options": ["a. Air voids at 4 percent", "b. Maximum marshal stability", "c. Maximum Bulk Specific Gravity", "d. Voids in mineral aggregate"], "answer": "d. Voids in mineral aggregate"}, {"q": "2989. It is the property of asphalt mixture to resist pavement deformation.", "options": ["a. Stability", "b. Rutting resistance", "c. Blown temperature", "d. Fatigue temperature"], "answer": "b. Rutting resistance"}, {"q": "2990. Compute for the Fitness Modulus of sand with Sieve Analysis data as follows: SIEVE OPENING \tPERCENTAGE            RETAINED 12.5 mm\t\t \t                 0 9.5 mm\t\t \t                   0                                 4.75 # 4\t\t \t                  4 2.36 # 8\t\t                    35 1.18 # 16\t\t \t                40 0.6 # 30\t\t    \t               70 0.3 # 50\t\t    \t               80 0.15 # 100\t\t  \t            95 0.075 # 200              98", "options": ["a. 2.40", "b. 2.88", "c. 3.24", "d. 3.67"], "answer": "c. 3.24"}, {"q": "2991. A good grading of fine aggregates for concrete has a fineness modulus not exceeding:", "options": ["a. 2.6", "b. 2.8", "c. 3.2", "d. 3.4"], "answer": "c. 3.2"}, {"q": "2992. The grading analysis shows the Fineness modulus of sand for concrete is 3.8, can this be allowed to be used?", "options": ["a. No, it is too course", "b. No, it will cause bleeding", "c. Yes, if blended with fine sand to meet the grading requirement", "d. All of the above"], "answer": "a. No, it is too course"}, {"q": "2993. Under Item 406, Pre-Stressed Concrete Structures of DPWH Specifications, post-tensioning of the pre-stressing reinforcement shall not commence until test on concrete cylinders indicate that the concrete has attained a compressive strength of at least:", "options": ["a. 25 mPa", "b. 30 mPa", "c. 20 mPa", "d. 28 mPa"], "answer": "d. 28 mPa"}, {"q": "2994. The following are generally time in the production of high strength concrete except:", "options": ["a. Course aggregates should be obtained from crushed rock to give the best cement/particle bond.", "b. Smaller size aggregates are preferred as more area is available for cement bonding.", "c. Admixtures include accelerators and retarders", "d. Bigger size aggregates are preferred as more voids are available for cement bonding."], "answer": "d. Bigger size aggregates are preferred as more voids are available for cement bonding."}, {"q": "2995. Portland Cement is also called because:", "options": ["a. It mainly comes from Portland, Oregon, USA.", "b. It was originally registered as a trade name in the Island of Portland.", "c. It resembled cement obtained by grinding natural rocks found in the Isle of Portland.", "d. It was mainly the idea of Mr. Joseph Aspdin, the inventor."], "answer": "c. It resembled cement obtained by grinding natural rocks found in the Isle of Portland."}, {"q": "2996. The purpose of capping concrete cylinders prior to testing for compression is to:", "options": ["a. Protect the ends of the cylinder from premature breaking result from improper application of load.", "b. Provide smooth, flat ends that are perpendicular to the axis of the sample.", "c. Prevent cylinder from tilting.", "d. To maintain the vertically of the cylinder."], "answer": "b. Provide smooth, flat ends that are perpendicular to the axis of the sample."}, {"q": "2997. Accreditation of Contactor's/Consultant's Material Engineer is provided under Department Order No.,", "options": ["a. D.O. No. 26 series of 1990- Creation of Quality Assurance Units", "b. D.O. No. 36 series of 1996- Turn-over of Lab. Equipment's/Apparatus used in the implementation of Foreign Assisted Projects", "c. D.O. No. 141 series of 1999- Accreditation of Contractors/Consultant Materials Engineers", "d. D.O. No. 253 series of 2003- Accreditation on of Asphalt and Portland Cement Concrete Batching Plant"], "answer": "c. D.O. No. 141 series of 1999- Accreditation of Contractors/Consultant Materials Engineers"}, {"q": "2998. It is essential in soil mechanics work that drying ovens are preset to a temperature of,", "options": ["a. 105 degree Celsius to 110 degree Celsius", "b. 110degree Celsius to 120 degree Celsius", "c. 75 degree Celsius to 105 degree Celsius", "d. 75 degree Celsius to 110 degree Celsius"], "answer": "a. 105 degree Celsius to 110 degree Celsius"}, {"q": "2999. It is a type of emulsified asphalt that works better with wet aggregate and in cold weather.", "options": ["a. Anionic Emulsion", "b. Cationic Emulsion", "c. Liquid Asphalt", "d. Cutback Asphalt"], "answer": "b. Cationic Emulsion"}, {"q": "3000. What penetration grade of asphalt material is appropriate for sealing of PCCP joints,", "options": ["a. 82-100", "b. 120-150", "c. 150-200", "d. Not exceeding 90"], "answer": "d. Not exceeding 90"}, {"q": "3001.Laboratory report revealed that the asphalt cement used in the asphalt mix was more than what was required by the job mix. Which of the following will most likely occur?", "options": ["a. Slippage cracking", "b. Shoving", "c. Raveling", "d. Upheaval"], "answer": "b. Shoving"}, {"q": "3002.Which of the following is the least likely cause of corrugations on asphalt pavement?", "options": ["a. Excessive fines", "b. Unstable base material", "c. High air voids", "d. Plastic mixture"], "answer": "d. Plastic mixture"}, {"q": "3003.The ratio of the weight in air of a unit volume of the impermeable portion of aggregate to the water in air of an equal volume of gas-free distilled water at a stated temperature.", "options": ["a. Bulk Specific Gravity", "b. Bulk SSD Specific Gravity", "c. Apparent Specific Gravity", "d. Optimum Specific Gravity"], "answer": "c. Apparent Specific Gravity"}, {"q": "3004.Which of the following tests is NOT conducted on asphalt cement?", "options": ["a. Solubility", "b. Viscosity", "c. Flash Point", "d. Loss on Heating"], "answer": "b. Viscosity"}, {"q": "3005.Considering the express provision indicated in the DPWH Standard Specification for Item 104 \u2013 Embankment, which of the following is considered as an unsuitable material?", "options": ["a. Soil with a plasticity index of 58", "b. Soil with a natural density of 900 kg/m3", "c. Soil with a liquid limit of 70", "d. All of the above"], "answer": "a. Soil with a plasticity index of 58"}, {"q": "3006.Which of the following is the recommended cement content for stabilizing poorly graded sand?", "options": ["a. 2-4%", "b. 4-6%", "c. 6-8 %", "d. Stabilization using cement is not recommended"], "answer": "b. 4-6%"}, {"q": "3007.For Item 106 \u2013 Compaction Equipment and Density Control Strips, Control Strips shall have an area approximately _____ and shall be the same depth of the course/layer it represents.", "options": ["a. 330 sq.m.", "b. 335 sq.m.", "c. 340 sq.m.", "d. 345 sq.m."], "answer": "b. 335 sq.m."}, {"q": "3008.In asphalt pavement, the variation of the surface between any two contacts with the surface using a 3-m straight edge shall not exceed:", "options": ["a. 5 mm", "b. 9 mm", "c. 10 mm", "d. 13 mm"], "answer": "b. 9 mm"}, {"q": "3009.What type of test is generally used to obtain the maximum dry unit weight and optimum moisture content?", "options": ["a. CBR Test", "b. Proctor Test", "c. Speedy Moisture Test", "d. Field Density Test"], "answer": "b. Proctor Test"}, {"q": "3010.Which of the following prescribes the minimum dry compressive strength of Stone Mastic Asphalt (SMA) mix?", "options": ["a. 1.4 MPa", "b. 2.4 MPa", "c. 3.6 MPa", "d. 3.8 MPa"], "answer": "a. 1.4 MPa"}, {"q": "3011.Sampling conducted on asphalt pavement cores showed a deficiency in density by 3%. What will you recommend as a Materials Engineer?", "options": ["a. Accept the material as it falls within the allowable tolerance.", "b. Accept the material at adjusted price", "c. Reject the material as it falls beyond the allowable tolerance", "d. None of the above"], "answer": "c. Reject the material as it falls beyond the allowable tolerance"}, {"q": "3012.The test used to determine the amount of volatile constituents in cutback asphalt products.", "options": ["a. Extraction", "b. Distillation", "c. Centrifugation", "d. Solubility"], "answer": "b. Distillation"}, {"q": "3013.The hardened concrete pavement was tested and was found to have a coefficient of friction equal to 0.30. As a Materials Engineer, how will you decide?", "options": ["a. Accept the material as it falls within the allowable tolerance.", "b. Accept the material at adjusted price", "c. Reject the material as it falls beyond the allowable tolerance", "d. None of the above"], "answer": "a. Accept the material as it falls within the allowable tolerance."}, {"q": "3014.As soon as the concrete has hardened sufficiently, the pavement surface was tested using a 3-m straight edge. Results revealed that the departure from the correct cross section was 13mm. As a Materials Engineer, which of the following will you recommend?", "options": ["a. Accept the material as it falls within the allowable tolerance.", "b. Accept the material at adjusted price", "c. Overlay concrete to attain correct cross section", "d. Remove and replace the pavement"], "answer": "d. Remove and replace the pavement"}, {"q": "3015.A type of surface defect that is characterized by the wearing of aggregate on the pavement surface due to traffic, causing a much lower surface friction.", "options": ["a. Scaling", "b. Crazing", "c. Polishing", "d. Raveling"], "answer": "c. Polishing"}, {"q": "3016.Thickness of reflectorized thermoplastic rumble strips as prescribed under the specification:", "options": ["a. 3 mm to 12 mm", "b. 4 mm to 13 mm", "c. 5 mm to 14 mm", "d. Depending on the location of the road"], "answer": "b. 4 mm to 13 mm"}, {"q": "3017.The temperature at which bituminous material will evolve vapors that will temporarily ignite when a small flame is brought in contact with it.", "options": ["a. Ignition temperature", "b. Flash Point", "c. Threshold point", "d. Burning temperature"], "answer": "b. Flash Point"}, {"q": "3018. The phenomenon wherein the soil subgrade losses strength due to ground shaking and the presence of fine grained cohesionless soil:", "options": ["a. Settlement", "b. Liquefaction", "c. Subsidence", "d. Hydraulic Compaction"], "answer": "b. Liquefaction"}, {"q": "3019.For Portland Cement Concrete Pavement, the concrete shall not be left exposed for more than ___ between stages of curing or during the curing period", "options": ["a. 15 minutes", "b. 30 minutes", "c. 45 minutes", "d. 60 minutes"], "answer": "b. 30 minutes"}, {"q": "3020.Considering only the group index (GI) and other factors as equal, which of the following soil samples will you recommend for use as a subgrade material?", "options": ["a. Soil with computed GI = 3", "b. Soil with computed GI = 12", "c. Soil with computed GI = 18", "d. Soil with computed GI = -10"], "answer": "d. Soil with computed GI = -10"}, {"q": "3021.The grading test result of the sand sample, determine the Fineness Modulus: Sieve Size % Passing  % Retained 12.5           100                      0 9.5            100                      0 4.75            97                      2 2.36            64                      36 1.18            59                      41 0.60            35                      65 0.30            21                      79 0.15             4                      94 0.075           2                       98", "options": ["a. 3.07", "b. 3.17", "c. 3.27", "d. 3.37"], "answer": "b. 3.17"}, {"q": "3022.Which of the following materials is permitted to be used as bituminous prime coat?", "options": ["a. Asphalt cement", "b. Cationic Rapid Setting Emulsified Asphalt", "c. Rapid Curing Cut-Back Asphalt", "d. Both b and c"], "answer": "c. Rapid Curing Cut-Back Asphalt"}, {"q": "3023.Most road signs are hard to read at night. What is the specification requirement in the reduction of brightness of the reflective sheeting during night time and when totally wet by rain?", "options": ["a. Shall be less than 75% of the minimum specified reflective brightness value", "b. Shall be less than 85% of the minimum specified reflective brightness value", "c. Shall be less than 90% of the minimum specified reflective brightness value", "d. Shall be less than 50% of the minimum specified reflective brightness value"], "answer": "c. Shall be less than 90% of the minimum specified reflective brightness value"}, {"q": "3024.A sample of fine aggregate was subjected to colorimetric test for inorganic impurities. Results revealed that the color produced by the sample was darker than the standard color guide. As a Materials Engineer, how will you evaluate the material?", "options": ["a. Accept the material", "b. Reject the material", "c. Subject the material to further testing", "d. None of the above"], "answer": "c. Subject the material to further testing"}, {"q": "3025.After the placement of concrete, how long shall pre-cast concrete members be subjected to pre-steaming when it will be subjected to steam curing?", "options": ["a. Minimum of 1 hour", "b. Minimum of 2 hours", "c. Minimum of 3 hours", "d. Minimum of 4 hours"], "answer": "d. Minimum of 4 hours"}, {"q": "3026.Which of the following shall be considered when selecting a filler material to meet the grading requirements for aggregate base course?", "options": ["a. It shall not contain more than 5% of material retained on No. 4 sieve", "b. It shall not contain more than 10% of material retained on No. 4 sieve", "c. It shall not contain more than 15% of material retained on No. 4 sieve", "d. None of the above"], "answer": "c. It shall not contain more than 15% of material retained on No. 4 sieve"}, {"q": "3027.A concrete pavement for a National Primary Road registered an International Rough Index (IRI) value of 3.0 m/km. As a Materials Engineer, which of the following will you recommend?", "options": ["a. Accept the material as it falls within the allowable tolerance", "b. Accept the material at adjusted price", "c. Undertake grinding of concrete pavement", "d. Remove and replace the pavement"], "answer": "a. Accept the material as it falls within the allowable tolerance"}, {"q": "3028.What are the different tests required for soil classification?", "options": ["a. Natural Moisture Content, Gradation and Atterberg\u2019s Limit", "b. Gradation and Atterberg\u2019s Limit", "c. Gradation and Specific Gravity", "d. Gradation, Specific Gravity and Atterberg\u2019s Limit"], "answer": "b. Gradation and Atterberg\u2019s Limit"}, {"q": "3029.Plastic Limit corresponds to the moisture content of the soil", "options": ["a. at 15 shocks", "b. at 25 shocks", "c. at 30 shocks", "d. None of the above"], "answer": "d. None of the above"}, {"q": "3030.Samples of Type I Cement when tested for quality passed the requirements except for Loss of Ignition. What will you recommend as a Materials Engineer?", "options": ["a. Accept the material as loss on ignition is not a requirement for Type I cement", "b. Accept the material at adjusted price", "c. Reject the material", "d. Reprocess the material by blending"], "answer": "c. Reject the material"}, {"q": "3031.Samples
