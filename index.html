ry if the splitter is not available is to:", "options": ["a. Scoop for samples in the middle of the sack", "b. Spread the samples on the ground and take the samples in the middle", "c. Spread the samples on the ground and divide the samples into four and take two opposite parts from it", "d. Scoop for samples at the side of the sack"], "answer": "c. Spread the samples on the ground and divide the samples into four and take two opposite parts from it"}, {"q": "837. Which of the following is authorized to test materials for use in DPWH projects?", "options": ["a. Any of the DPWH-accredited private testing laboratory", "b. Any testing laboratory of a local government unit with prior clearance from DPWH implementing office", "c. Any of the DPWH-accredited private testing laboratory with prior clearance from DPWH implementing office", "d. All of the above"], "answer": "a. Any of the DPWH-accredited private testing laboratory"}, {"q": "838. A set of three (3) beam samples representing a particular section of the concrete pavement failed to meet the flexural strength requirement. As materials engineer, what would you recommend?", "options": ["a. Monitor the pavement section with strength deficiency", "b. Adjust payment corresponding to the strength deficiency of the beam samples", "c. Conduct core tests for strength determination on section represented by the failed samples to determine the actual strength of the in-placed concrete", "d. Submit new beam samples for testing"], "answer": "c. Conduct core tests for strength determination on section represented by the failed samples to determine the actual strength of the in-placed concrete"}, {"q": "839. The mass percent of wear of coarse aggregates for item 311 when tested by AASHTO 96 is not greater than _______.", "options": ["a. 40%", "b. 45%", "c. 50%"], "answer": "a. 40%"}, {"q": "840. What do you call the bituminous mixture composed of aggregates and liquid asphalt which can be used effectively during wet season?", "options": ["a. Hot mix", "b. Cold mix", "c. Slurry mix", "d. Bituminous macadam mix"], "answer": "b. Cold mix"}, {"q": "841. What is the most commonly accepted measure of the hardness of aggregate", "options": ["a. Soundness test", "b. Los Angeles abrasion test", "c. Petrographic test", "d. Fractured face test"], "answer": "b. Los Angeles abrasion test"}, {"q": "842. A steel bar is considered undersized if:", "options": ["a. Its normal diameter as determined by caliper measurement was not attained", "b. It fails to meet the variation in mass", "c. Its fails to meet the elongation requirement", "d. It fails to meet the tensile requirement"], "answer": "b. It fails to meet the variation in mass"}, {"q": "843. If the density of a newly rolled asphalt pavement is 95%, what is the percent asphalt content by:", "options": ["a. 4.75%", "b. 5.0%", "c. 5.26%", "d. 6.0%"], "answer": "b. 5.0%"}, {"q": "844. What penetration grade of asphaltic material is appropriate for stealing of PCCP joints?", "options": ["a. 85-100", "b. 120-150", "c. 150-200", "d. Not exceeding 90"], "answer": "d. Not exceeding 90"}, {"q": "845. When the plasticity index of a soil is zero, it means that:", "options": ["a. The soil is non-plastic", "b. The plastic limit is equal to the liquid limit", "c. The plastic limit is greater than the liquid limit", "d. The soil is too plastic"], "answer": "a. The soil is non-plastic"}, {"q": "846. When the strength test results of concrete beam or cylinder samples are not acceptable, how many representative core/s shall be taken from each member of area of concrete in-place considered deficiency?", "options": ["a. At least 4 cores", "b. At least 3 cores", "c. At least 2 cores", "d. Only 1 core"], "answer": "b. At least 3 cores"}, {"q": "847. The frequency of sampling and testing for compacting of subbase material is:", "options": ["a. 1 per 1500 cu.m.", "b. 1 per 2500 cu.m.", "c. 1 per 3000 cu.m"], "answer": "a. 1 per 1500 cu.m."}, {"q": "848. The minimum moisture content at which soil can be rolled into a thread of 1/8 inch in a diameter without breaking is known as _____.", "options": ["a. Liquid limit", "b. Plastic limit", "c. Shrinkage limit", "d. Atterberg limit"], "answer": "b. Plastic limit"}, {"q": "849. When taking three or more samples of aggregates to be combined for one materials sample:", "options": ["a. The small samples must be packed in separate sample bags", "b. The small samples must be obtained from different lots", "c. The small samples must be of approximately equal size", "d. None of the above"], "answer": "b. The small samples must be obtained from different lots"}, {"q": "850. Where do we take additional cores when the measurement of any core taken from the pavement is deficient in thickness by more than 25mm?", "options": ["a. At no less than 20meter intervals parallel to the centerline in each direction from the affected location", "b. At no less than 15meter intervals parallel to the centerline in each direction from the affected location", "c. At no less than 10meter intervals parallel to the centerline in each direction from the affected location", "d. At no less than 5meter intervals parallel to the centerline in each direction from the affected location"], "answer": "d. At no less than 5meter intervals parallel to the centerline in each direction from the affected location"}, {"q": "851.  Given: Weight of dry aggregates = 950 grams  Weight asphalt = 50 grams  What is the percent of asphalt by weight of total mix?", "options": ["a. 5%", "b. 5.26%", "c. 5.55%", "d. 6%"], "answer": "a. 5%"}, {"q": "852. The temperature of the concrete during the period of mixing while in transport and/or during placing shall not be permitted to rise above:", "options": ["a. 25 deg. C", "b. 40 deg. C", "c. 36 deg. C", "d. 50 deg. C"], "answer": "c. 36 deg. C"}, {"q": "853. The DPWH specifications provide _____ tolerance for asphalt pavement thickness.", "options": ["a. -5 mm", "b. +5%", "c. +10%", "d. 5 mm"], "answer": "a. -5 mm"}, {"q": "854. Quality control testing in a DPWH projects is the responsibility of the:", "options": ["a. DPWH", "b. Contractor", "c. DPWH and contractor", "d. Construction supervision consultant"], "answer": "b. Contractor"}, {"q": "855. What is the specification range for asphalt content in a bituminous concrete mix for surface course paving?", "options": ["a. 4 to 10% of the total dry aggregates mass weight", "b. 5 to 8% of the total dry aggregates mass weight", "c. 3.5 to 7.5% of the total dry aggregates mass weight", "d. 4 to 8% of the total dry aggregates mass weight"], "answer": "b. 5 to 8% of the total dry aggregates mass weight"}, {"q": "856. Angular coarse aggregates when used in concrete mix will require more:", "options": ["a. water", "b. fine aggregates", "c. cement", "d. both a and b"], "answer": "a. water"}, {"q": "857. which of the following is not a duty of the asphalt plant inspector?", "options": ["a. Knowing the procedure for property calibrating asphalt meters and aggregates feeders", "b. Monitoring plant operation to ensure uniform production of mix meeting specifications", "c. Adjusting any plant control, setting any dial, gauges or meters", "d. None of the above"], "answer": "c. Adjusting any plant control, setting any dial, gauges or meters"}, {"q": "858. Sampling of soil aggregates in a big stockpile shall be done by:", "options": ["a. Taking sample from the bottom, middle and top of the stockpile", "b. Shoveling-off the surface at the bottom of the stockpile and taking full sample thereat", "c. Shoveling-off the surface at the middle of the stockpile and taking full sample thereat", "d. None of the above"], "answer": "a. Taking sample from the bottom, middle and top of the stockpile"}, {"q": "859. Testing of steel bars may be waived for small projects located in remote areas the quantity of steel bars to be used is too small. Which of the following can be used as basis for acceptance of the material?", "options": ["a. Certificate of Materials Availability", "b. Inspection Report", "c. Certificate of Quality Control Assurance", "d. Mill Certificate"], "answer": "d. Mill Certificate"}, {"q": "860. In bituminous plant-mix surface course, the temperature of the mix shall have an allowable tolerance of:", "options": ["a. +5 deg. C", "b. +10 deg. C", "c. +15 deg. C", "d. +20 deg. C"], "answer": "b. +10 deg. C"}, {"q": "861. What other type of cement is allowed to be used for items 311 and 405 in the absence of Portland Cement?", "options": ["a. Portland cement type I", "b. Pozzoland cement", "c. Portland Pozzoland cement type IP", "d. Hydraulic cement"], "answer": "c. Portland Pozzoland cement type IP"}, {"q": "862. What is the minimum test requirement for riprap boulders?", "options": ["a. Stone size and specific gravity", "b. Stone size or weight test and inspection report on assessment of stone soundness", "c. Stone size or weight test and abrasion test", "d. None of the above"], "answer": "a. Stone size and specific gravity"}, {"q": "863. Bituminous concrete mixes contain asphalt by weight equivalent to:", "options": ["a. 10-15%", "b. 8-12%", "c. 6-10%", "d. 5-8%"], "answer": "d. 5-8%"}, {"q": "864. When does the contractor/supplier submit to the Project/Materials Engineer the job-mix formula bituminous mixes for his approval?", "options": ["a. At least one week prior to the production of the mix", "b. At least three weeks prior to the production of the mix", "c. Upon delivery of the mix", "d. Upon the request of the Project/Materials Engineer"], "answer": "b. At least three weeks prior to the production of the mix"}, {"q": "865. What differentiates the composition if item 201-A Aggregates Base Course from item 200-A Aggregates Subbase Course?", "options": ["a. Item 201 contains less binder and smaller size of gravel than item 200", "b. Item 201 contains more binder and bigger size of gravel than item 200", "c. Item 201 contains sand and gravel only", "d. Item 201 contains sand and fine-grained soils only"], "answer": "a. Item 201 contains less binder and smaller size of gravel than item 200"}, {"q": "866. The moisture density relation test determines the:", "options": ["a. Natural water content", "b. Maximum dry density", "c. Degree of compaction", "d. Organic content"], "answer": "b. Maximum dry density"}, {"q": "867. What is the function of the emulsifier water in liquid asphalt?", "options": ["a. To increase mixing ability with aggregates", "b. To retain water in asphalt for longer periods", "c. To prevent asphalt from hardening", "d. To enable asphalt and water to mix"], "answer": "d. To enable asphalt and water to mix"}, {"q": "868. Using truck mixers, the time elapsed (in minutes) from the time water is added to the mix per batch until the concrete mix is deposited in place at the sites shall not exceed:", "options": ["a. 30", "b. 60", "c. 90", "d. 120"], "answer": "c. 90"}, {"q": "869. Stability of an asphalt pavement is its ability to resist shoving and rutting under traffic loads. In general, higher stability of the mix can be attained by using:", "options": ["a. More medium size and sand", "b. Angular and rough aggregates", "c. More asphalt", "d. b and c"], "answer": "b. Angular and rough aggregates"}, {"q": "870. Asphaltic concrete binder course paving is in progress. The Project inspector or the Foreman tells you that the mix from the computer-controlled plant appears that aggregates are not fully coated with bitumen. What would you do as Materials Engineer?", "options": ["a. Increase the programmed bitumen weight", "b. Decrease the programmed aggregate weight", "c. Increase the drum mixing temperature", "d. Check for defects in the plant"], "answer": "c. Increase the drum mixing temperature"}, {"q": "871. A permit issued by the Project Engineer to ascertain that all preparatory works prior to concreting have been verified to be in accordance with the plans and specifications by the Materials Engineer and Project inspector is:", "options": ["a. Building permit", "b. Concrete pouring permit", "c. Excavation permit", "d. Occupancy permit"], "answer": "b. Concrete pouring permit"}, {"q": "872. Excessive vibration of newly-placed fresh concrete may result in:", "options": ["a. Smooth surface finish", "b. Well dense graded mix", "c. Bleeding/laitance", "d. Quick settlement"], "answer": "c. Bleeding/laitance"}, {"q": "873. The purpose of capping concrete cylinders with sulfur compound prior to testing for compression is to:", "options": ["a. Protect the ends of cylinder from premature breaking resulting from improper application of load", "b. Provide smooth, flat ends that are perpendicular to the axis of the sample", "c. Prevent cylinder from tilting", "d. To maintain the verticality of the cylinder"], "answer": "b. Provide smooth, flat ends that are perpendicular to the axis of the sample"}, {"q": "874. The aggregate component contributes internal friction to shear strength and stability of the bituminous mixture. The desirable shape and surface texture of aggregate particles are:", "options": ["a. Round and smooth aggregate particles", "b. Angular and smooth aggregate particles", "c. Round and rough-textured particles", "d. Angular and rough-textured particles"], "answer": "d. Angular and rough-textured particles"}, {"q": "875. How many cores shall be taken from thickness determination on 1 kilo-meter PCCP?", "options": ["a. 5 cores per lane", "b. 10 cores per lane", "c. 2 cores per lane", "d. 6 cores per lane"], "answer": "a. 5 cores per lane"}, {"q": "876. What is used to measure pavement surface irregularity?", "options": ["a. Falling weight deflectometer equipment", "b. Benkelmen beam apparatus", "c. Dynamic cone penetometer apparatus", "d. 3 meter straight edge"], "answer": "d. 3 meter straight edge"}, {"q": "877. Given: Liquid limit\t= 45% Plastic limit\t= 35% Calculate the Plasticity Index.", "options": ["a. 10%", "b. 17.5%", "c. 22.5%", "d. 80%"], "answer": "a. 10%"}, {"q": "878. In specifying n the subbase course with existing moisture content of 10% higher that the optimum moisture of the AASHTO T180 Method D?", "options": ["a. Spread to the required loose thickness and compact", "b. Add water, spread to the required loose thickness and compact", "c. Dry out to reduce moisture, spread of the required loose thickness and compact", "d. Spread to the required loose thickness"], "answer": "c. Dry out to reduce moisture, spread of the required loose thickness and compact"}, {"q": "900. As construction work progresses, you noticed that the materials delivered at the project site are different from the ones tested and that passes the requirements. As Materials Engineer, what would you do?", "options": ["a. Authorize the use of materials", "b. Conduct immediate retesting of the materials for verification purposes", "c. Reject the materials", "d. Replace the materials"], "answer": "b. Conduct immediate retesting of the materials for verification purposes"}, {"q": "901. The fine grained soils in the field can be identified through the use of simple visual and manual tests except", "options": ["a. Water Mobility", "b. Dry Strength", "c. Plasticity", "d. Dry weight"], "answer": "d. Dry weight"}, {"q": "902. The minimum testing requirement for one quality test of concrete hollow block is _____ units for every 10,000 units.", "options": ["a. 3", "b. 6", "c. 10", "d. 12"], "answer": "b. 6"}, {"q": "903. The most basic criterion that can be applied for rejection of asphalt mixture delivered to the site is:", "options": ["a. Asphalt content", "b. Grading of mixture", "c. Temperature of mixture", "d. All of the above"], "answer": "c. Temperature of mixture"}, {"q": "904. This is driven in order to determine the casting length of the piles", "options": ["a. Test pile", "b. Bored pile", "c. Sheet pile", "d. Batter pile"], "answer": "a. Test pile"}, {"q": "905. The aggregate component contributes internal friction to shear strength and stability of the bituminous mixture. T  Submit a field inspection report"}, {"q": "926. Core test for concrete pavement thickness determination showed that three (3) out of nine (9) samples taken failed to meet the thickness requirement. The deficiency in the average thickness of the cores is more than 25mm. What will you do as Materials Engineer?", "options": ["a. Reject the area represented by the failed core samples", "b. Remove and replace the area represented by the failed core samples", "c. Accept the section at an adjusted price due to thickness deficiency", "d. Increase the thickness of the pavement"], "answer": "b. Remove and replace the area represented by the failed core samples"}, {"q": "927. The sand used in the field density test in determining the volume of hole using sand cone method must be clean, dry and passing sieve number:", "options": ["a. 10", "b. 20", "c. 30", "d. 40"], "answer": "a. 10"}, {"q": "928. The minimum testing requirement for bituminous mix is one quality test for every _____ tonnes or fraction thereof", "options": ["a. 40", "b. 100", "c. 130", "d. 200"], "answer": "c. 130"}, {"q": "929. A set of three (3) core samples has the following compressive strengths: 4000psi, 3500psi and 2900psi. If the required strength is 3500psi, the area represented by the core samples is:", "options": ["a. Acceptable", "b. Not acceptable", "c. Acceptable but with adjustment in payment", "d. Subject to monitoring within the warranty period"], "answer": "a. Acceptable"}, {"q": "930. How do you obtain the density of soil in the field?", "options": ["a. By weighing the disturbed soil removed and obtaining the volume of hole with sand or with other means", "b. By conducting in-situ CBR in the field", "c. By weighing the remaining soil in the laboratory", "d. By conducting triaxial test in the field"], "answer": "a. By weighing the disturbed soil removed and obtaining the volume of hole with sand or with other means"}, {"q": "931. Quality test for portland cement should be carried out for every:", "options": ["a. 1,500 bags or fraction thereof", "b. 2,000 bags or fraction thereof", "c. 2,500 bags or fraction thereof", "d. 3,000 bags or fraction thereof"], "answer": "b. 2,000 bags or fraction thereof"}, {"q": "932. What is the % Variation in Mass of a 19mm dia. deformed steel bar with the following laboratory test data: Length of specimen, mm = 1,000 Mass of specimen, kg        = 2.322 Nominal Mass, kg/m         = 2.235 Nominal Areas, mm2        = 284", "options": ["a. 4% of the Nominal Mass", "b. 4% over Nominal Mass", "c. 4% under Nominal Mass", "d. None of the above"], "answer": "c. 4% under Nominal Mass"}, {"q": "933. What test is used to determine the index of retained strength of a bituminous mix?", "options": ["a. Extraction and grading test", "b. Stability test", "c. Immersion / Compression test", "d. Marshall stability"], "answer": "c. Immersion / Compression test"}, {"q": "934. Calibration of all weighing balances should be carried out on a regular basis. As Materials Engineer for calibration, would you:", "options": ["a. Use a suitable  sample weighed on all balances to find out which ones need calibration", "b. Use a set of standard calibrated weights to check each balance", "c. Calibrate one balance and use it to do the calibration of other balances", "d. None of the above"], "answer": "b. Use a set of standard calibrated weights to check each balance"}, {"q": "935. Asphaltic core binder course paving is in progress. The Project Inspector or the Foreman tells you that the mix from the computer-controlled plant appears that aggregates are not fully coated with bitumen. What would you do as Materials Engineer?", "options": ["a. Increase the programmed bitumen weight", "b. Decrease the programmed aggregate weight", "c. Increase the drum mixing temperature", "d. Check for defects in the plant"], "answer": "d. Check for defects in the plant"}, {"q": "936. How many cores shall be taken for thickness determination on a one kilometer PCCP?", "options": ["a. 5 cores per lane", "b. 10 cores per lane", "c. 2 cores per lane", "d. 6 cores per lane"], "answer": "a. 5 cores per lane"}, {"q": "937. Measuring devices on wheels that measure surface deviations:", "options": ["a. Stabilometer", "b. Profilometer", "c. Rheometer", "d. None of the above"], "answer": "b. Profilometer"}, {"q": "938. In the determination of bulk specific gravity of bituminous core samples, how long should the samples be immersed or soaked in water?", "options": ["a. less than 3 minutes", "b. 3 minutes", "c. 5 minutes", "d. 3 to 5 minutes"], "answer": "d. 3 to 5 minutes"}, {"q": "939. It is a condition applied to bituminous mix wherein the bitumen film separates from the aggregate surface primarily due to the action of moisture.", "options": ["a. Raveling", "b. Unbonding", "c. Doffing", "d. Stripping"], "answer": "d. Stripping"}, {"q": "940. One significance and/or use of thickness determination for asphalt pavement is:", "options": ["a. For quantitative compliance", "b. For skid resistance", "c. For asphalt content determination", "d. For compression strength"], "answer": "a. For quantitative compliance"}, {"q": "941. It is possible to measure the thickness from four-sided rectangular sawed specimen from the pavement?", "options": ["a. Not allowed", "b. Allowed", "c. Absolutely Banned", "d. Upon the justification of the PE"], "answer": "b. Allowed"}, {"q": "942. Describe what happens to the asphaltic core sample while immersed or soaked in water.", "options": ["a. The asphalt core sample absorbs water", "b. The asphalt core samples float due to bouyancy", "c. Water penetrates the voids of the sample", "d. Bubbles are released from the sample"], "answer": "c. Water penetrates the voids of the sample"}, {"q": "943. Determine tge Bulk Specific Gravity of laboratory compacted asphalt specimen. Wt. in air = 1,254g Wt. in water = 737.3g Wt. in SSD = 1,258.40g", "options": ["a. 2.431", "b. 2.480", "c. 2.341", "d. 2.408"], "answer": "d. 2.408"}, {"q": "94 "}, {"q": "2223. If beam samples taken from a newly paved section failed to meet the strength requirement and it is not advisable to obtain cores from the structure due to structural consideration, as Materials Engineer what will you do if the deficiency in strength of the concrete specimen is 15%?", "options": ["a. Reject the section represented by the failed specimen.", "b. Rework the section represented  by the failed specimen.", "c. Accept the section at an adjusted price due to strength deficiency.", "d. Modify the concrete design mix."], "answer": "c. Accept the section at an adjusted price due to strength deficiency."}, {"q": "2224. The improper compaction of an embankment material will _________, except:", "options": ["a. Minimize compressibility", "b. Decrease soil permeability", "c. Increase shear strength soil stability", "d. all of the above"], "answer": "d. all of the above"}, {"q": "2225. The following properties of an asphalt mix can be determined in a core sample except for:", "options": ["a. Index of retained strength", "b. Asphalt content", "c. Grading", "d. Specific gravity"], "answer": "a. Index of retained strength"}, {"q": "2226. In how many hours should concrete core samples be submerged in water subjecting them to compression test?", "options": ["a. At least 30", "b. At least 35", "c. At least 40 hrs.", "d. At least 48"], "answer": "c. At least 40 hrs."}, {"q": "2227. A concrete beam fails within the middle third at 7,000 lbs. The flexural strength of the sample is:", "options": ["a. 248 psi", "b. 583 psi", "c. 680 psi", "d. 3,500 psi"], "answer": "b. 583 psi"}, {"q": "2228. In the process of the compaction of Item 200 ( Aggregate Sub-base ) which contains sandy material only 80% density was attained. What is your recommendation in order to comply with the 100% minimum degree of compaction?", "options": ["a. Adjust the water content", "b. Place the material in thin layer", "c. Provide additional binder", "d. Use roller with greater compactive
